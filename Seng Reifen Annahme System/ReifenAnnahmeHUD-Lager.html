<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/gh/dymosoftware/dymo-connect-framework@master/dymo.connect.framework.js"></script>
<style>
  body { 
    background: #0d1117; 
    color: #c9d1d9; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    padding: 20px; 
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    min-height: 100vh; 
    box-sizing: border-box; 
    overflow-y: auto;
    overflow-x: hidden;
  }
  .header { 
    font-size: 20px; 
    font-weight: bold; 
    margin-bottom: 20px; 
    letter-spacing: 1px; 
    color: #ffffff; 
    text-align: center;
  }
  .autocomplete {
    position: relative;
    display: inline-block;
    width: 100%;
    margin-bottom: 15px;
  }
  input { 
    width: 100%; 
    background: #161b22; 
    color: #58a6ff; 
    border: 2px solid #30363d; 
    padding: 15px; 
    font-size: 24px; 
    text-transform: uppercase; 
    box-sizing: border-box; 
    outline: none; 
    text-align: center; 
    font-weight: bold; 
    border-radius: 6px; 
    transition: 0.3s; 
  }
  input:focus { 
    border-color: #58a6ff; 
    box-shadow: 0 0 12px rgba(88, 166, 255, 0.3); 
  }
  .autocomplete-items {
    position: absolute;
    border: 2px solid #30363d;
    border-top: none;
    z-index: 99;
    top: 100%;
    left: 0;
    right: 0;
    background-color: #161b22;
    border-radius: 0 0 6px 6px;
    max-height: 180px;
    overflow-y: auto;
    display: none;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
  }
  .autocomplete-items div {
    padding: 12px;
    cursor: pointer;
    background-color: #161b22;
    border-bottom: 1px solid #21262d;
    color: #8b949e;
    font-weight: bold;
    font-size: 18px;
    text-align: center;
    transition: 0.2s;
  }
  .autocomplete-items div:hover {
    background-color: #30363d;
    color: #ffffff;
  }
  .btn-check { 
    width: 100%; 
    background: #21262d; 
    color: #c9d1d9; 
    padding: 12px; 
    font-size: 14px; 
    font-weight: bold; 
    letter-spacing: 1px;
    border: 1px solid #30363d; 
    border-radius: 6px; 
    cursor: pointer; 
    margin-bottom: 25px; 
    transition: 0.2s; 
  }
  .btn-check:hover { background: #30363d; color: #ffffff; }
  .btn-check:active { transform: scale(0.98); }
  
  .action-btns { display: flex; gap: 10px; margin-bottom: 15px; }
  
  .btn-action { 
    flex: 1; 
    padding: 15px; 
    font-size: 16px; 
    font-weight: bold; 
    border: none; 
    border-radius: 6px; 
    transition: 0.3s; 
    background: #21262d; 
    color: #484f58; 
    cursor: not-allowed; 
  }
  
  .btn-action.active-ja { 
    background: #238636; 
    color: #ffffff; 
    cursor: pointer; 
    box-shadow: 0 4px 15px rgba(35, 134, 54, 0.4);
  }
  .btn-action.active-ja:hover { background: #2ea043; }
  .btn-action.active-ja:active { transform: scale(0.96); }
  
  .btn-action.active-nein { 
    background: #da3633; 
    color: #ffffff; 
    cursor: pointer; 
    box-shadow: 0 4px 15px rgba(218, 54, 51, 0.4);
  }
  .btn-action.active-nein:hover { background: #f85149; }
  .btn-action.active-nein:active { transform: scale(0.96); }

  #status { 
    font-size: 13px; 
    min-height: 40px; 
    text-align: center; 
    line-height: 1.4; 
    font-weight: 500;
  }
  .status-wait { color: #8b949e; }
  .status-loading { color: #f2cc60; }
  .status-success { color: #56d364; }
  .status-error { color: #f85149; }

  #dymo-container {
    display: none;
    margin-top: 10px;
    margin-bottom: 15px;
    background: #161b22;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #30363d;
  }
  
  #locationInfo {
    color: #e3b341;
    font-size: 14px;
    text-align: center;
    margin-bottom: 15px;
    font-weight: bold;
    background: #2d230e;
    padding: 10px;
    border-radius: 4px;
    border: 1px solid #e3b341;
  }

  .dymo-title {
    font-size: 11px;
    color: #8b949e;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .copy-box {
    background: #21262d;
    border: 1px dashed #58a6ff;
    color: #58a6ff;
    padding: 10px;
    margin-bottom: 8px;
    text-align: center;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: 0.2s;
  }
  .copy-box:hover {
    background: #30363d;
    color: #ffffff;
    border-color: #58a6ff;
  }
  .copy-box:active { transform: scale(0.98); }

  .footer { 
    margin-top: auto; 
    text-align: center; 
    font-size: 17px; 
    color: #FFD700; 
    letter-spacing: 2px; 
    font-family: monospace;
    font-weight: bold;
    padding-top: 15px;
  }

  #carol-popup {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(13, 17, 23, 0.9);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  .popup-content {
    background: #161b22;
    padding: 25px;
    border-radius: 8px;
    border: 2px solid #58a6ff;
    text-align: center;
    width: 85%;
    box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
  }
  .popup-text {
    font-size: 18px;
    margin-bottom: 20px;
    font-weight: bold;
    color: #c9d1d9;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="header">LAGER ANNAHME SYSTEM</div>
  
  <div class="autocomplete">
    <input type="text" id="stockId" placeholder="STOCK ID EINGEBEN" autocomplete="off">
    <div id="autocomplete-list" class="autocomplete-items"></div>
  </div>
  
  <button class="btn-check" id="btnCheck" onclick="verifyStock()">ID PRÜFEN (ENTER)</button>
  
  <div class="action-btns">
    <button class="btn-action" id="btnJa" onclick="executeAction(true)">✅ DA (JA)</button>
    <button class="btn-action" id="btnNein" onclick="executeAction(false)">❌ FEHLT (NEIN)</button>
  </div>
  
  <div id="status" class="status-wait">Bitte Stock-ID eingeben...</div>

  <div id="dymo-container">
    <div id="locationInfo"></div>
    <div class="dymo-title">FALLS AUTO-DRUCK FEHLSCHLÄGT (KOPIEREN):</div>
    <div class="copy-box" id="boxStock" onclick="copyToClipboard(this)"></div>
    <div class="copy-box" id="boxTire" onclick="copyToClipboard(this)"></div>
  </div>
  
  <div class="footer">SYSTEM BY ARASAKA</div>

  <div id="carol-popup">
    <div class="popup-content">
      <div class="popup-text">
        Ist der Auftrag Fertig zum Herausgeben?<br>
        <span style="color:#8b949e;font-size:14px;font-weight:normal;">(Bitte Refurbishment Liste checken)</span>
      </div>
      <div class="action-btns" style="margin-bottom:0;">
        <button class="btn-action active-ja" onclick="openCarol()">✅ JA</button>
        <button class="btn-action active-nein" onclick="closeCarolPopup()">❌ NEIN</button>
      </div>
    </div>
  </div>

  <script>
    var stockInput = document.getElementById('stockId');
    var btnCheck = document.getElementById('btnCheck');
    var btnJa = document.getElementById('btnJa');
    var btnNein = document.getElementById('btnNein');
    var statusDiv = document.getElementById('status');
    var dymoContainer = document.getElementById('dymo-container');
    var boxStock = document.getElementById('boxStock');
    var boxTire = document.getElementById('boxTire');
    var locationInfo = document.getElementById('locationInfo');
    
    var currentVerifiedStock = "";
    var cachedStockIds = [];
    var currentCarolUrl = "";

    google.script.run.withSuccessHandler(function(ids) {
        cachedStockIds = ids;
    }).getAvailableStockIds();

    stockInput.focus();

    stockInput.addEventListener('input', function() {
      currentVerifiedStock = "";
      btnJa.className = "btn-action";
      btnNein.className = "btn-action";
      statusDiv.className = "status-wait";
      statusDiv.innerText = "Bitte Stock-ID prüfen...";
      dymoContainer.style.display = "none";
      
      var val = this.value.toUpperCase();
      closeAllLists();
      if (!val) return false;
      
      var list = document.getElementById("autocomplete-list");
      list.style.display = "block";
      
      var count = 0;
      for (var i = 0; i < cachedStockIds.length; i++) {
        if (cachedStockIds[i].indexOf(val) !== -1) {
          var item = document.createElement("DIV");
          item.innerHTML = cachedStockIds[i].replace(val, "<span style='color:#58a6ff;'>" + val + "</span>");
          item.innerHTML += "<input type='hidden' value='" + cachedStockIds[i] + "'>";
          item.addEventListener("click", function(e) {
              stockInput.value = this.getElementsByTagName("input")[0].value;
              closeAllLists();
              verifyStock();
          });
          list.appendChild(item);
          count++;
          if(count >= 30) break;
        }
      }
      if(count === 0) list.style.display = "none";
    });

    stockInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        closeAllLists();
        verifyStock();
      }
    });

    function closeAllLists() {
      var list = document.getElementById("autocomplete-list");
      list.innerHTML = '';
      list.style.display = "none";
    }

    document.addEventListener("click", function (e) {
        if (e.target !== stockInput) {
            closeAllLists();
        }
    });

    function resetButtons() {
      currentVerifiedStock = "";
      btnJa.className = "btn-action";
      btnNein.className = "btn-action";
      dymoContainer.style.display = "none";
    }

    function copyToClipboard(element) {
      var textToCopy = element.getAttribute("data-value");
      var tempInput = document.createElement("textarea");
      tempInput.value = textToCopy;
      document.body.appendChild(tempInput);
      tempInput.select();
      document.execCommand("copy");
      document.body.removeChild(tempInput);
      
      var originalText = element.innerText;
      element.innerText = "✓ KOPIERT!";
      element.style.background = "#238636";
      element.style.color = "#ffffff";
      element.style.borderColor = "#2ea043";
      
      setTimeout(function() {
        element.innerText = originalText;
        element.style.background = "";
        element.style.color = "";
        element.style.borderColor = "";
      }, 1200);
    }

        function printDymoLabels(stockId, tireInfo, mengeStr) {
        console.log("--- DYMO DRUCK WIRD GESTARTET ---");
        try {
            if (typeof dymo === 'undefined' || !dymo.label || !dymo.label.framework) {
                console.log("❌ FEHLER: DYMO Framework wurde vom Browser blockiert oder nicht geladen!");
                return;
            }
            
            var printers = dymo.label.framework.getPrinters();
            console.log("Gefundene Drucker im System: ", printers);
            
            if (printers.length === 0) {
                console.log("❌ FEHLER: Das DYMO-Programm läuft, aber es meldet 0 verbundene Drucker an den Browser!");
                return;
            }
            
            var printerName = printers[0].name;
            console.log("✅ Nutze Drucker: " + printerName);

            var menge = parseInt(mengeStr);
            if (isNaN(menge) || menge < 1) menge = 1;

            var xml = '<?xml version="1.0" encoding="utf-8"?><DieCutLabel Version="8.0" Units="twips"><PaperOrientation>Landscape</PaperOrientation><Id>LargeAddress</Id><PaperName>30321 Large Address</PaperName><DrawCommands/><ObjectInfo><TextObject><Name>TEXT</Name><ForeColor Alpha="255" Red="0" Green="0" Blue="0" /><BackColor Alpha="0" Red="255" Green="255" Blue="255" /><LinkedObjectName></LinkedObjectName><Rotation>Rotation0</Rotation><IsMirrored>False</IsMirrored><IsVariable>True</IsVariable><HorizontalAlignment>Center</HorizontalAlignment><VerticalAlignment>Middle</VerticalAlignment><TextFitMode>ShrinkToFit</TextFitMode><UseFullFontHeight>True</UseFullFontHeight><Verticalized>False</Verticalized><StyledText><Element><String>TEXT</String><Attributes><Font Family="Arial" Size="24" Bold="True" Italic="False" Underline="False" Strikeout="False" /><ForeColor Alpha="255" Red="0" Green="0" Blue="0" /></Attributes></Element></StyledText></TextObject><Bounds X="332" Y="150" Width="4455" Height="1260" /></ObjectInfo></DieCutLabel>';

            console.log("Öffne XML Vorlage...");
            var label = dymo.label.framework.openLabelXml(xml);
            
            console.log("Sende Druckauftrag 1 (Stock ID) - Menge: " + menge);
            label.setObjectText("TEXT", stockId);
            var printParamsStock = dymo.label.framework.createLabelWriterPrintParamsXml({ copies: menge });
            label.print(printerName, printParamsStock);

            console.log("Sende Druckauftrag 2 (Reifengröße) - Menge: 1");
            label.setObjectText("TEXT", tireInfo);
            var printParamsTire = dymo.label.framework.createLabelWriterPrintParamsXml({ copies: 1 });
            label.print(printerName, printParamsTire);
            
            console.log("✅ DRUCK ERFOLGREICH AN DYMO GESENDET!");

        } catch (err) {
            console.log("❌ DYMO SYSTEMFEHLER: ", err);
        }
        }

    function verifyStock() {
      var stockId = stockInput.value.trim().toUpperCase();
      if (!stockId) return;

      resetButtons();
      statusDiv.className = "status-loading";
      statusDiv.innerText = "Suche " + stockId + " in den Listen...";
      
      stockInput.disabled = true;
      btnCheck.disabled = true;

      google.script.run
        .withSuccessHandler(function(res) {
           stockInput.disabled = false;
           btnCheck.disabled = false;
           
           if (res.found) {
               currentVerifiedStock = stockId;
               statusDiv.className = "status-success";
               statusDiv.innerText = res.message;
               
               btnJa.className = "btn-action active-ja";
               btnNein.className = "btn-action active-nein";
           } else {
               statusDiv.className = "status-error";
               statusDiv.innerText = res.message;
               stockInput.focus();
           }
        })
        .withFailureHandler(function(err) {
           stockInput.disabled = false;
           btnCheck.disabled = false;
           statusDiv.className = "status-error";
           statusDiv.innerText = "SYSTEMFEHLER: " + err.message;
        })
        .checkStock(stockId);
    }

    function executeAction(isDelivered) {
      if (!currentVerifiedStock) return;

      var actionText = isDelivered ? "als DA" : "als FEHLEND";
      var processingStock = currentVerifiedStock; 
      
      statusDiv.className = "status-loading";
      statusDiv.innerText = "Buche " + processingStock + " " + actionText + " ...";
      
      btnJa.className = "btn-action";
      btnNein.className = "btn-action";
      stockInput.disabled = true;

      google.script.run
        .withSuccessHandler(function(res) {
           stockInput.disabled = false;
           stockInput.value = '';
           stockInput.focus();
           resetButtons();
           
           if (res.success) {
               statusDiv.className = "status-success";
               statusDiv.innerText = "► " + processingStock + ": " + res.message;
               
               if (res.stockId && res.tireInfo) {
                   boxStock.innerText = res.stockId;
                   boxStock.setAttribute("data-value", res.stockId);
                   boxTire.innerText = res.tireInfo;
                   boxTire.setAttribute("data-value", res.tireInfo);
                   locationInfo.innerText = res.locationText || "";
                   dymoContainer.style.display = "block";

                   if (isDelivered) {
                       printDymoLabels(res.stockId, res.tireInfo, res.menge);
                       
                       if (res.carolUrl && res.carolUrl.indexOf("http") !== -1) {
                           currentCarolUrl = res.carolUrl;
                           document.getElementById('carol-popup').style.display = 'flex';
                       }
                   }
               }
               
               google.script.run.withSuccessHandler(function(ids) {
                   cachedStockIds = ids;
               }).getAvailableStockIds();

           } else {
               statusDiv.className = "status-error";
               statusDiv.innerText = "► FEHLER bei " + processingStock + ": " + res.message;
           }
        })
        .withFailureHandler(function(err) {
           stockInput.disabled = false;
           stockInput.value = '';
           stockInput.focus();
           resetButtons();
           statusDiv.className = "status-error";
           statusDiv.innerText = "SYSTEMFEHLER: " + err.message;
        })
        .processStock(processingStock, isDelivered);
    }

    function closeCarolPopup() {
        document.getElementById('carol-popup').style.display = 'none';
        currentCarolUrl = "";
        stockInput.focus();
    }

    function openCarol() {
        if (currentCarolUrl) {
            var autoUrl = currentCarolUrl + (currentCarolUrl.indexOf('?') !== -1 ? '&' : '?') + 'arasaka_auto=1';
            window.open(autoUrl, '_blank');
        }
        closeCarolPopup();
    }
  </script>
</body>
</html>
