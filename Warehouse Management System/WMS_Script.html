    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'reifen-batch-item' + (reifenBatchItemIncomplete(it) ? ' is-warn' : '');
      var sizeLabel = it.deliveredSize ? it.deliveredSize : reifenTireLabel(it.groesseRaw, it.lastindex, it.gwindex);
      var meta = it.tab + (sizeLabel ? ' · ' + sizeLabel : '');
      var expected = normalizeReifenMengeExpected(it.mengeExpected);
      var scanned = parseInt(it.tyresScanned, 10) || 0;
      var qtyLabel = expected + ' bestellt / ' + scanned + ' hier';
      var pk = it.paketTotal ? ((it.packetsSeen || []).length + '/' + it.paketTotal) : '';
      var stockSpan = document.createElement('span');
      stockSpan.className = 'reifen-batch-stock';
      stockSpan.textContent = it.stockId;
      var metaSpan = document.createElement('span');
      metaSpan.className = 'reifen-batch-meta';
      metaSpan.textContent = meta;
      var qtySpan = document.createElement('span');
      qtySpan.className = 'reifen-batch-qty' + (scanned < expected ? ' is-warn' : ' is-ok');
      qtySpan.textContent = qtyLabel;
      btn.appendChild(stockSpan);
      btn.appendChild(metaSpan);
      btn.appendChild(qtySpan);
      if (pk) {
        var pkSpan = document.createElement('span');
        pkSpan.className = 'reifen-batch-pk';
        pkSpan.textContent = pk;
        btn.appendChild(pkSpan);
      }
      (function(stockId, tab) {
        btn.addEventListener('click', function() { workDownReifenBatchItem(stockId, tab); });
      })(it.stockId, it.tab);
      list.appendChild(btn);
    }
    panel.style.display = 'flex';
  }

    }
    currentReifenTab = tab;

    loadStockIdsForTab(tab);

    var rows = reifenUnbookedRowsForStock(stockId, tab);
    reifenExpectedSizes = [];

      var canon = canonicalTireSize(rows[i].groesse);
      if (canon && reifenExpectedSizes.indexOf(canon) === -1) reifenExpectedSizes.push(canon);
      var lbl = reifenTireLabel(rows[i].groesse, rows[i].lastindex, rows[i].gwindex);
      if (lbl && labels.indexOf(lbl) === -1) labels.push(lbl);
    }
    reifenExpectedSizeRaw = labels.length ? labels.join('   /   ') : (groesseRaw || "");
    reifenExpectedSize = reifenExpectedSizes.length ? reifenExpectedSizes[0] : canonicalTireSize(groesseRaw);
    reifenCurrentDelivered = deliveredSize || "";
    setReifenActionState(true);
    hideReifenScanChoices();
    renderReifenScanPanel();
  }

  function workDownReifenBatchItem(stockId, tab) {
    var item = findReifenBatchItem(stockId, tab);
    if (!item) return;
    if (!reifenTyresComplete(item)) {
      var expected = normalizeReifenMengeExpected(item.mengeExpected);
      var scanned = parseInt(item.tyresScanned, 10) || 0;
      setReifenStatus("⚠️ '" + item.stockId + "': erst alle Reifen scannen (" + scanned + " von " + expected + ").", "#F27420");
      reifenStockInput.focus();
      return;
    }
    applyReifenSelection(item.tab, item.stockId, item.groesseRaw, item.deliveredSize || '');
    setReifenStatus("Bearbeite '" + item.stockId + "' aus Sammel-Scan. DA / FEHLT drücken.", "#3FA0DB");
  }

  function canonicalTireSize(str) {
    var m = String(str || '').match(/(\d{3})\s*\/\s*(\d{2})\s*[A-Z]{0,2}\s*R?\s*(\d{2})/i);
    return m ? (m[1] + '/' + m[2] + '/' + m[3]) : '';
  }

  function parseReifenQrPayload(raw) {
    var s = String(raw || '');
    var paket = s.match(/Paket\s+(\d+)\s+von\s+(\d+)/i);
    var sizeM = s.match(/(\d{3})\s*\/\s*(\d{2})\s*[A-Z]{0,2}\s*R?\s*(\d{2})[^\d]*\d{0,3}\s*(?:\([A-Z]\))?\s*[A-Z]?/i);
    var looksQr = !!paket || /firma|gmbh/i.test(s) || (!!sizeM && s.length > 20);
    if (!looksQr) return null;
    var out = { raw: s, size: '', sizeCanon: '', beleg: '', packstueck: '', paketIndex: 0, paketTotal: 0 };
    if (sizeM) {
      out.size = sizeM[0].replace(/\s+/g, ' ').trim();
      out.sizeCanon = sizeM[1] + '/' + sizeM[2] + '/' + sizeM[3];
    }
    if (paket) {
      out.paketIndex = parseInt(paket[1], 10) || 0;
      out.paketTotal = parseInt(paket[2], 10) || 0;
    }
    var head = s.split(/Paket/i)[0];
    var digM = head.match(/(\d{7,})\s*$/);
    if (digM && digM[1]) {
      var digits = digM[1];
      if (digits.length > 7) {
        out.beleg = digits.slice(0, 7);
        out.packstueck = digits.slice(7);
      } else {
        out.beleg = digits;
      }
    }
    return out;
  }

  function findReifenStockAcrossTabs(stockId) {
    ensureReifenHudShape();
    var sid = normalizeStockIdJs(stockId);
    var out = { unbooked: [], booked: [] };
    if (!sid) return out;
    var byTab = reifenHudCache.stocksByTab || {};
    var tabOrder = (reifenHudCache.tabs && reifenHudCache.tabs.length) ? reifenHudCache.tabs : Object.keys(byTab);
    for (var t = 0; t < tabOrder.length; t++) {
      var tab = tabOrder[t];
      var list = byTab[tab];
      if (!list || !list.length) continue;
      var unbookedEntries = [];
      var bookedFound = false;
      for (var i = 0; i < list.length; i++) {
        var entry = list[i];
        var idVal = entry && entry.id !== undefined ? entry.id : entry;
        if (!cellMatchesStockIdJs(idVal, sid)) continue;
        var st = entry && entry.status !== undefined ? String(entry.status || '').trim().toLowerCase() : '';
        if (st === 'ja' || st === 'nein') bookedFound = true;
        else unbookedEntries.push(entry);
      }
      if (unbookedEntries.length) out.unbooked.push({ tab: tab, entry: unbookedEntries[0], entries: unbookedEntries });
      else if (bookedFound) out.booked.push({ tab: tab, entry: null });
    }
    return out;
  }

  function clearReifenScanInputForNext() {
    reifenStockInput.value = "";
    currentVerifiedReifenStock = "";
    reifenExpectedSize = "";
    reifenExpectedSizeRaw = "";
    reifenExpectedSizes = [];
    reifenCurrentDelivered = "";
    setReifenActionState(false);
    hideReifenInfo();
    renderReifenScanPanel();
    reifenStockInput.focus();
  }

  function handleReifenScan(raw) {
    var rawStr = String(raw || '').trim();
    closeReifenAutocomplete();
    if (!rawStr) { setReifenStatus("❌ Bitte Barcode/QR scannen.", "#f85149"); return; }
    var qr = parseReifenQrPayload(rawStr);
    if (qr) {
      reifenStockInput.value = "";
      handleReifenQrScan(qr);
      return;
    }
    var stockId = normalizeStockInput(rawStr);
    if (reifenMode !== 'scan') reifenStockInput.value = stockId;
    currentVerifiedReifenStock = "";
    reifenExpectedSize = "";
    reifenExpectedSizeRaw = "";
    reifenExpectedSizes = [];
    reifenCurrentDelivered = "";
    setReifenActionState(false);
    hideReifenInfo();
    hideReifenScanChoices();
    if (!stockId) { setReifenStatus("❌ Bitte eine Stock-ID scannen.", "#f85149"); clearReifenScanInputForNext(); return; }
    var res = findReifenStockAcrossTabs(stockId);
    if (res.unbooked.length === 1) {
      selectReifenMatch(res.unbooked[0].tab, stockId, res.unbooked[0].entry, true);
    } else if (res.unbooked.length > 1) {
      renderReifenScanChoices(stockId, res.unbooked);
      setReifenStatus("⚠️ '" + stockId + "' in mehreren Blättern offen – bitte wählen.", "#F27420");
      clearReifenScanInputForNext();
    } else if (res.booked.length) {
      var tabs = res.booked.map(function(b) { return b.tab; }).join(', ');
      setReifenStatus("❌ '" + stockId + "' bereits verbucht (" + tabs + ").", "#f85149");
      clearReifenScanInputForNext();
    } else {
      setReifenStatus("❌ '" + stockId + "' in keinem Blatt (heute + 7 Tage) gefunden.", "#f85149");
      clearReifenScanInputForNext();
    }
  }

  function selectReifenMatch(tab, stockId, entry, useBatch) {
    var groesseRaw = entry && entry.groesse ? String(entry.groesse) : "";
    var lastindex = entry && entry.lastindex ? String(entry.lastindex) : "";
    var gwindex = entry && entry.gwindex ? String(entry.gwindex) : "";
    var mengeExpected = entry && entry.menge !== undefined ? entry.menge : 0;
    if (useBatch) {
      var existing = findReifenBatchItem(stockId, tab);
      if (existing && reifenTyresComplete(existing)) {
        setReifenStatus("ℹ️ '" + stockId + "' bereits vollständig gescannt (" + normalizeReifenMengeExpected(existing.mengeExpected) + "/" + normalizeReifenMengeExpected(existing.mengeExpected) + "). Nächsten Barcode scannen.", "#8b949e");
        clearReifenScanInputForNext();
        return;
      }
      var item = upsertReifenBatchItem({
        stockId: stockId, tab: tab, groesseRaw: groesseRaw, lastindex: lastindex, gwindex: gwindex,
        sizeCanon: canonicalTireSize(groesseRaw), mengeExpected: mengeExpected, incrementTyre: true
      });
      var expected = normalizeReifenMengeExpected(item.mengeExpected);
      var scanned = parseInt(item.tyresScanned, 10) || 0;
      if (scanned >= expected) {
        setReifenStatus("✅ '" + stockId + "' vollständig (" + expected + " von " + expected + " Reifen). In Liste antippen für DA/FEHLT.", "#56d364");
      } else {
        setReifenStatus("📷 '" + stockId + "': " + scanned + " von " + expected + " Reifen gescannt – weiter scannen.", "#F27420");
      }
      clearReifenScanInputForNext();
      return;
    }
    applyReifenSelection(tab, stockId, groesseRaw, "");
    setReifenStatus("✅ '" + stockId + "' gefunden in '" + tab + "'. Bitte Status auswählen.", "#56d364");
    reifenStockInput.focus();
  }

  function selectReifenScanMatch(tab, stockId, entry) {
    selectReifenMatch(tab, stockId, entry, true);
  }

  function renderReifenScanChoices(stockId, list) {
    var box = document.getElementById('reifenScanChoices');
    if (!box) return;
    if (!list || !list.length) { hideReifenScanChoices(); return; }
    box.innerHTML = '<div class="reifen-scan-choices-title">Mehrere Treffer für ' + escapeHtml(stockId) + ' – Blatt wählen:</div>';
    for (var i = 0; i < list.length; i++) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'reifen-scan-choice-btn';
      btn.textContent = list[i].tab;
      (function(tab, entry) {
        btn.addEventListener('click', function() { selectReifenMatch(tab, stockId, entry, reifenMode === 'scan'); });
      })(list[i].tab, list[i].entry);
      box.appendChild(btn);
    }
    box.style.display = 'flex';
  }

  function hideReifenScanChoices() {
    var box = document.getElementById('reifenScanChoices');
    if (box) { box.style.display = 'none'; box.innerHTML = ''; }
  }

  function handleReifenQrScan(qr) {
    reifenCurrentDelivered = qr.size || reifenCurrentDelivered;
    if (!currentVerifiedReifenStock) {
      setReifenStatus("ℹ️ Erst Stock-ID (Barcode) scannen, dann QR (QR: " + (qr.size || '?') + ").", "#F27420");
      renderReifenScanPanel();
      reifenStockInput.focus();
      return;
    }
    var item = findReifenBatchItem(currentVerifiedReifenStock, currentReifenTab);
    if (!item) {
      var rows = reifenUnbookedRowsForStock(currentVerifiedReifenStock, currentReifenTab);
      var entry = rows.length ? rows[0] : null;
      item = upsertReifenBatchItem({
        stockId: currentVerifiedReifenStock, tab: currentReifenTab,
        groesseRaw: reifenExpectedSizeRaw, sizeCanon: reifenExpectedSize,
        mengeExpected: entry && entry.menge !== undefined ? entry.menge : 2
      });
    }
    if (qr.paketTotal) item.paketTotal = Math.max(item.paketTotal || 0, qr.paketTotal);
    if (qr.paketIndex) {
      item.packetsSeen = item.packetsSeen || [];
      if (item.packetsSeen.indexOf(qr.paketIndex) === -1) item.packetsSeen.push(qr.paketIndex);
    }
    if (qr.beleg) item.beleg = qr.beleg;
    if (qr.size) item.deliveredSize = qr.size;
    var msgs = [];
    var warn = false;
    var expectedList = reifenExpectedSizes.length ? reifenExpectedSizes : (reifenExpectedSize ? [reifenExpectedSize] : []);
    if (qr.sizeCanon && expectedList.length) {
      item.sizeMismatch = (expectedList.indexOf(qr.sizeCanon) === -1);
      if (item.sizeMismatch) { warn = true; msgs.push("⚠️ Größe weicht ab! Geliefert " + qr.sizeCanon + " ≠ erwartet " + expectedList.join(" / ")); }
      else msgs.push("✅ Größe passt (" + qr.size + ")");
    } else if (qr.sizeCanon) {
      msgs.push("ℹ️ Geliefert: " + qr.size);
    }
    if (item.paketTotal) {
      var c = (item.packetsSeen || []).length;
      msgs.push((c < item.paketTotal ? "⚠️ " : "✅ ") + c + " von " + item.paketTotal + " Paketen");
      if (c < item.paketTotal) warn = true;
    }
    saveReifenBatch();
    renderReifenBatchList();
    renderReifenScanPanel();
    setReifenStatus(msgs.join("  •  ") || "QR gescannt.", warn ? "#F27420" : "#56d364");
    reifenStockInput.focus();
  }

  function renderReifenScanPanel() {
    var panel = document.getElementById('reifenScanPanel');
    if (!panel) return;
    if (reifenMode !== 'scan') { panel.style.display = 'none'; return; }
    var item = currentVerifiedReifenStock ? findReifenBatchItem(currentVerifiedReifenStock, currentReifenTab) : null;
    var html = '';
    if (reifenCurrentDelivered) {
      var mismatchCls = (item && item.sizeMismatch) ? ' is-warn' : (reifenExpectedSize ? ' is-ok' : '');
      html += '<div class="reifen-scan-row' + mismatchCls + '"><span class="reifen-scan-lbl">Geliefert</span><span class="reifen-scan-val">' + escapeHtml(reifenCurrentDelivered) + '</span></div>';
    }
    if (reifenExpectedSizeRaw) {
      html += '<div class="reifen-scan-row"><span class="reifen-scan-lbl">Erwartet</span><span class="reifen-scan-val">' + escapeHtml(reifenExpectedSizeRaw) + '</span></div>';
    }
    if (item && item.mengeExpected) {
      var expectedTyres = normalizeReifenMengeExpected(item.mengeExpected);
      var scannedTyres = parseInt(item.tyresScanned, 10) || 0;
      var tyresComplete = scannedTyres >= expectedTyres;
      html += '<div class="reifen-scan-row ' + (tyresComplete ? 'is-ok' : 'is-warn') + '">'
        + '<span class="reifen-scan-lbl">Reifen</span>'
        + '<span class="reifen-scan-val">' + (tyresComplete ? '✅ ' : '⚠️ ') + expectedTyres + ' bestellt / ' + scannedTyres + ' hier</span>'
        + '</div>';
    }
    if (item && item.paketTotal) {
      var seen = (item.packetsSeen || []).length;
      var complete = seen >= item.paketTotal;
      html += '<div class="reifen-scan-row ' + (complete ? 'is-ok' : 'is-warn') + '">'
        + '<span class="reifen-scan-lbl">Pakete</span>'
        + '<span class="reifen-scan-val">' + (complete ? '✅ ' : '⚠️ ') + seen + ' von ' + item.paketTotal + ' gescannt</span>'
        + '</div>';
    }
    if (!html) { panel.style.display = 'none'; panel.innerHTML = ''; return; }
    panel.innerHTML = html;
    panel.style.display = 'flex';
  }

  function reifenTyreCountStatusForStock(stockId) {
    var item = findReifenBatchItem(stockId, currentReifenTab) || findReifenBatchItem(stockId, null);
    if (!item) return null;
    return {
      count: parseInt(item.tyresScanned, 10) || 0,
      total: normalizeReifenMengeExpected(item.mengeExpected)
    };
  }

  function reifenPacketStatusForStock(stockId) {
    var item = findReifenBatchItem(stockId, currentReifenTab) || findReifenBatchItem(stockId, null);
    if (!item || !item.paketTotal) return null;
    return { count: (item.packetsSeen || []).length, total: item.paketTotal };
  }

  function showReifenQtyConfirm(stockId, count, total) {
    var el = document.getElementById('reifenQtyConfirmText');
    if (el) {
      el.innerHTML = "Für <b>" + escapeHtml(stockId) + "</b> wurden nur <b>" + count + " von " + total + "</b> Paketen gescannt.<br>"
        + "<span class=\"reifen-confirm-sub\">Sind wirklich " + total + " Reifen vorhanden?</span>";
    }
    document.getElementById('reifenQtyConfirmModal').classList.add('open');
  }

  function confirmReifenQty(yes) {
    document.getElementById('reifenQtyConfirmModal').classList.remove('open');
    if (yes) {
      reifenSkipQtyCheck = true;
      executeReifenAction(true);
    } else {
      setReifenActionState(true);
      setReifenStatus("❌ Buchung abgebrochen – bitte Reifen nachzählen.", "#f85149");
      reifenStockInput.focus();
    }
  }

  function checkReifenStockFromCache(tab, stockId) {
    if (!reifenHudCache || !reifenHudCache.stocksByTab) return null;
    var list = reifenHudCache.stocksByTab[tab];
    if (list === undefined) return null;
    var sid = normalizeStockIdJs(stockId);
    if (!sid) return null;
    var anyMatch = false;
    var anyUnbooked = false;
    for (var i = 0; i < list.length; i++) {
      var entry = list[i];
      var idVal = entry && entry.id !== undefined ? entry.id : entry;
      if (!cellMatchesStockIdJs(idVal, sid)) continue;
      anyMatch = true;
      var st = entry && entry.status !== undefined ? String(entry.status || "").trim().toLowerCase() : "";
      if (st !== "ja" && st !== "nein") { anyUnbooked = true; break; }
    }
    if (!anyMatch) return { found: false, message: "Stock-ID '" + stockId + "' in '" + tab + "' nicht gefunden!" };
    if (!anyUnbooked) return { found: false, message: "Stock-ID '" + stockId + "' wurde in '" + tab + "' bereits verbucht!" };
    return { found: true, message: "Stock-ID gefunden! Bitte Status auswählen:" };
  }

  function reifenUnbookedRowsForStock(stockId, tab) {
    ensureReifenHudShape();
    var sid = normalizeStockIdJs(stockId);
    var list = (reifenHudCache.stocksByTab && reifenHudCache.stocksByTab[tab]) ? reifenHudCache.stocksByTab[tab] : [];
    var out = [];
    for (var i = 0; i < list.length; i++) {
      var entry = list[i];
      var idVal = entry && entry.id !== undefined ? entry.id : entry;
      if (!cellMatchesStockIdJs(idVal, sid)) continue;
      var st = entry && entry.status !== undefined ? String(entry.status || "").trim().toLowerCase() : "";
      if (st === "ja" || st === "nein") continue;
      out.push(entry);
    }
    return out;
  }

  function reifenTireLabel(size, last, gw) {
    var s = String(size || "").trim();
    var extra = [String(last || "").trim(), String(gw || "").trim()].filter(function(x) { return x; }).join(" ");
    return extra ? (s + (s ? " · " : "") + extra) : s;
  }

  function verifyReifenStock() {
    if (reifenMode === 'scan') { handleReifenScan(reifenStockInput.value); return; }
    var stockId = normalizeStockInput(reifenStockInput.value);
    closeReifenAutocomplete();
    reifenStockInput.value = stockId;
    currentVerifiedReifenStock = "";
    reifenExpectedSize = "";
    reifenExpectedSizeRaw = "";
    reifenExpectedSizes = [];
    reifenCurrentDelivered = "";
    setReifenActionState(false);
    hideReifenInfo();
    hideReifenScanChoices();
    if(!stockId) return setReifenStatus("❌ Bitte eine Stock-ID eingeben.", "#f85149");
    var res = findReifenStockAcrossTabs(stockId);
    if (res.unbooked.length === 1) {
      selectReifenMatch(res.unbooked[0].tab, stockId, res.unbooked[0].entry, false);
    } else if (res.unbooked.length > 1) {
      renderReifenScanChoices(stockId, res.unbooked);
      setReifenStatus("⚠️ '" + stockId + "' in mehreren Blättern offen – bitte wählen.", "#F27420");
    } else if (res.booked.length) {
      var tabs = res.booked.map(function(b) { return b.tab; }).join(', ');
      setReifenStatus("❌ '" + stockId + "' bereits verbucht (" + tabs + ").", "#f85149");
      reifenStockInput.focus();
    } else {
      setReifenStatus("❌ '" + stockId + "' in keinem Blatt (heute + 7 Tage) gefunden.", "#f85149");
      reifenStockInput.focus();
    }
  }

  function executeReifenAction(isDelivered) {
    var tab = currentReifenTab;
    var stockId = currentVerifiedReifenStock || normalizeStockInput(reifenStockInput.value);
    if(!tab) return setReifenStatus("❌ Stock-ID zuerst suchen (nicht gefunden oder nicht gewählt).", "#f85149");
    if(!stockId) return setReifenStatus("❌ Bitte zuerst eine Stock-ID prüfen.", "#f85149");
    var skipQty = reifenSkipQtyCheck;
    reifenSkipQtyCheck = false;
    if (reifenMode === 'scan') {
      var tyreStatus = reifenTyreCountStatusForStock(stockId);
      if (tyreStatus && tyreStatus.count < tyreStatus.total) {
        setReifenStatus("❌ '" + stockId + "': erst alle Reifen scannen (" + tyreStatus.count + " von " + tyreStatus.total + ").", "#f85149");
        setReifenActionState(true);
        reifenStockInput.focus();
        return;
      }
    }
    if (reifenMode === 'scan' && isDelivered && !skipQty) {
      var pk = reifenPacketStatusForStock(stockId);
      if (pk && pk.total > 0 && pk.count < pk.total) {
        showReifenQtyConfirm(stockId, pk.count, pk.total);
        return;
      }
    }
    setReifenActionState(false);
    setReifenStatus((isDelivered ? "Buche Reifen als DA…" : "Buche Reifen als FEHLT…"), "#F27420", true);
    google.script.run
      .withSuccessHandler(function(res) {
        if(!res.success) {
          setReifenStatus("❌ " + res.message, "#f85149");
          return;
        }
        currentReifenResult = res;
        showReifenInfo(res);
        var finalMessage = "✅ " + res.message;
        if (reifenMode === 'scan') {
          if (res.remainingUnbooked && res.remainingUnbooked > 0) {
            var bit = findReifenBatchItem(res.stockId || stockId, tab);
            if (bit) {
              bit.groesseRaw = res.remainingSize || "";
              bit.lastindex = res.remainingLast || "";
              bit.gwindex = res.remainingGw || "";
              bit.sizeCanon = canonicalTireSize(res.remainingSize || "");
              bit.deliveredSize = "";
              bit.sizeMismatch = false;
              bit.paketTotal = 0;
              bit.packetsSeen = [];
              bit.mengeExpected = normalizeReifenMengeExpected(res.remainingMenge || res.menge || bit.mengeExpected);
              bit.tyresScanned = 0;
              saveReifenBatch();
              renderReifenBatchList();
            }
            finalMessage += " ⚠️ Noch " + res.remainingUnbooked + " weitere Position für " + (res.stockId || stockId) + (res.remainingSize ? " (" + reifenTireLabel(res.remainingSize, res.remainingLast, res.remainingGw) + ")" : "") + ".";
          } else {
            removeReifenBatchItem(res.stockId || stockId, tab);
          }
        }
        if(isDelivered) {
          var printResult = printReifenDymoLabels(res.stockId, res.tireInfo, res.menge, res.regal || '');
          if(printResult.success) {
            finalMessage += " DYMO Druck gesendet.";
          } else {
            finalMessage += " DYMO Fehler: " + printResult.message;
          }
          document.getElementById('reifenConfirmModal').classList.add('open');
        } else {
          reifenStockInput.value = "";
          reifenStockInput.focus();
        }
        setReifenStatus(finalMessage, "#56d364");
        loadRefurbishmentCache(true);
        refreshReifenAfterMutation();
      })
      .withFailureHandler(function(err) {
        setReifenStatus("❌ Systemfehler: " + (err.message || String(err)), "#f85149");
      })
      .processReifenStock(tab, stockId, isDelivered, reifenMode === 'scan' ? (reifenCurrentDelivered || "") : "");
  }

  function copyReifenValue(element) {
    var value = String(element.innerText || "").trim();
    if(!value) return;
    navigator.clipboard.writeText(value).then(function() {
      setReifenStatus("📋 Kopiert: " + value, "#3FA0DB");
    }).catch(function() {
      setReifenStatus("❌ Kopieren fehlgeschlagen.", "#f85149");
    });
  }

  function confirmReifenFinished(openInWms) {
    var stockId = "";
    if(currentReifenResult && currentReifenResult.stockId) {
      stockId = String(currentReifenResult.stockId).trim();
    }
    if(!stockId) {
      stockId = String(document.getElementById('reifenCopyStock').innerText || "").trim();
    }
    if(!stockId) {
      stockId = normalizeStockInput(reifenStockInput.value);
    }
    closeReifenConfirm();
    resetReifenState(false);
    if(openInWms && stockId) {
      closeReifenModal();
      document.getElementById('searchInput').value = stockId;
      loadRefurbishmentCache(true, function() { loadData(); });
      return;
    }
    setReifenStatus("Nächste Stock-ID scannen...", "#3FA0DB");
    reifenStockInput.focus();
  }

  function escapeHtml(text) {
    return String(text || "")
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normalizeMatchWord(word) {
    return String(word || "").toLowerCase();
  }

  function isHighlightableWord(word) {
    var normalized = normalizeMatchWord(word);
    if (forcedGreenWords[normalized]) return true;
    return normalized.length >= 4 && !ignoredHighlightWords[normalized] && !/^\d+$/.test(normalized);
  }

  function extractWords(text) {
    return String(text || "").match(/[A-Za-z0-9ÄÖÜäöüß]+/g) || [];
  }

  function getMatchedWords(schaedenText, commentText) {
    var schaedenWords = {};
    var matched = {};
    extractWords(schaedenText).forEach(function(word) {
      if(isHighlightableWord(word)) {
        schaedenWords[normalizeMatchWord(word)] = true;
      }
    });
    extractWords(commentText).forEach(function(word) {
      var key = normalizeMatchWord(word);
      if(isHighlightableWord(word) && schaedenWords[key]) matched[key] = true;
    });
    return matched;
  }

  function commentHasWssDaMarker() {
    return /wss\s+da\b/i.test(getCommentText());
  }

  function applyWordHighlightsToHtml(html, matchedWords) {
    return html.split(/(<[^>]+>)/g).map(function(part) {
      if(part.indexOf('<') === 0) return part;
      return part.replace(/[A-Za-z0-9ÄÖÜäöüß]+/g, function(word) {
        var normalized = normalizeMatchWord(word);
        if(normalized === 'wss') {
          if(/wss\s*ers/i.test(currentSchaedenText || '')) {
            return commentHasWssDaMarker()
              ? '<span class="highlight-green">' + word + '</span>'
              : '<span class="highlight-red">' + word + '</span>';
          }
          return '<span class="highlight-green">' + word + '</span>';
        }
        if(forcedGreenWords[normalized]) return '<span class="highlight-green">' + word + '</span>';
        return isHighlightableWord(word) && matchedWords[normalized] ? '<span class="highlight-green">' + word + '</span>' : word;
      });
    }).join('');
  }

  var anliefSupplierWords = {
    wm: true,
    knoll: true,
    alfah: true,
    sta: true,
    seng: true,
    stahlgruber: true
  };

  var anliefPartJunkWords = {
    bestellt: true,
    bestellung: true,
    extern: true,
    intern: true,
    plus: true,
    inkl: true,
    ggf: true,
    nachbestellen: true,
    reparieren: true,
    erneuern: true,
    ersetzen: true,
    hinten: true,
    vorne: true,
    links: true,
    rechts: true,
    und: true,
    mit: true,
    der: true,
    die: true,
    das: true,
    fuer: true,
    für: true,
    da: true
  };

  function isAnliefSupplierWord(word) {
    return !!anliefSupplierWords[normalizeMatchWord(word)];
  }

  function isAnliefOrderToken(word) {
    var w = String(word || '');
    if (/^n4p/i.test(w)) return true;
    if (/^\d{5,}$/.test(w)) return true;
    return false;
  }

  function isAnliefDateToken(word) {
    return /^\d{1,2}\.\d{1,2}/.test(String(word || ''));
  }

  function cleanAnliefPartSegment(seg) {
    seg = String(seg || '').trim();
    seg = seg.replace(/^(?:N4P[A-Za-z0-9]+|\d{5,})\s*/i, '').trim();
    if (!seg) return '';
    var words = seg.split(/\s+/).filter(function(w) {
      var n = normalizeMatchWord(w);
      if (!n) return false;
      if (isAnliefOrderToken(w)) return false;
      if (isAnliefDateToken(w)) return false;
      if (isAnliefSupplierWord(w)) return false;
      if (anliefPartJunkWords[n]) return false;
      if (ignoredHighlightWords[n] && n !== 'öl' && n !== 'oel') return false;
      return true;
    });
    if (!words.length) return '';
    return words.join(' ');
  }

  function extractBestellungParts(text) {
    var raw = String(text || '');
    if (!raw.trim()) return [];
    var chunks = raw.split(/\n+|\/\//);
    var parts = [];
    var seen = {};
    var supplierRe = /\b(wm|knoll|alfah|sta|seng|stahlgruber)\b/ig;

    chunks.forEach(function(chunk) {
      chunk = String(chunk || '').replace(/^\s*[-–—]\s*/, '').trim();
      if (!chunk) return;
      chunk = chunk.replace(/\s*[-–—]\s+[^-–—]*$/, '').trim();
      if (!chunk) return;

      var partRegion = '';
      var bestelltMatch = /\bbestellt\b/i.exec(chunk);
      if (bestelltMatch) {
        partRegion = chunk.slice(0, bestelltMatch.index).trim();
      } else {
        var lastSup = null;
        var m;
        supplierRe.lastIndex = 0;
        while ((m = supplierRe.exec(chunk)) !== null) lastSup = m;
        if (lastSup && lastSup.index > 0) {
          partRegion = chunk.slice(0, lastSup.index).trim();
        }
      }
      if (!partRegion) return;

      partRegion.split(/\s*[,+&]\s*/).forEach(function(seg) {
        var partName = cleanAnliefPartSegment(seg);
        if (!partName) return;
        if (partName.length < 2) return;
        var key = normalizeMatchWord(partName);
        if (seen[key]) return;
        seen[key] = true;
        parts.push(partName);
      });
    });

    return parts;
  }

  function getBestellungSuggestParts() {
    return extractBestellungParts(currentBestellungText);
  }

  function anliefPartInComment(partName, commentText) {
    var commentWords = {};
    extractWords(commentText).forEach(function(w) {
      commentWords[normalizeMatchWord(w)] = true;
    });
    var main = null;
    extractWords(partName).forEach(function(w) {
      var n = normalizeMatchWord(w);
      if (n === 'va' || n === 'ha') return;
      if (!main) main = n;
    });
    return !!(main && commentWords[main]);
  }

  function getTokenBeforeCaret(text, caret) {
    var before = String(text || '').slice(0, caret);
    var m = before.match(/[A-Za-z0-9ÄÖÜäöüß]+$/);
    return m ? m[0] : '';
  }

  var anliefFixedParts = [
    'Service',
    'Bremse',
    'Bremsen',
    'Innenraumfilter',
    'Luftfilter',
    'Zündkerzen',
    'Keilrippenriemen',
    'Zahnriemen',
    'Wasserpumpe',
    'Ölfilter',
    'Ölablassschraube'
  ];

  function getAnlieferungSuggest(token, commentText) {
    if (!token) return null;
    var parts = getBestellungSuggestParts();
    var norm = normalizeMatchWord(token);

    if (norm === 'alles') {
      if (!parts.length) return null;
      var list = [];
      parts.forEach(function(p) {
        if (!anliefPartInComment(p, commentText)) list.push(p + ' da //');
      });
      if (!list.length) return null;
      var allText = list.join(' ');
      return { replaceLen: token.length, insertText: allText, ghostText: ' ' + allText };
    }

    if (norm.length < 2) return null;

    var candidates = parts.slice();
    var seen = {};
    candidates.forEach(function(p) {
      seen[normalizeMatchWord(p)] = true;
    });
    anliefFixedParts.forEach(function(fixed) {
      var key = normalizeMatchWord(fixed);
      if (seen[key]) return;
      if (key.indexOf(norm) !== 0) return;
      seen[key] = true;
      candidates.push(fixed);
    });

    if (!candidates.length) return null;

    var best = null;
    var bestLen = Infinity;
    candidates.forEach(function(p) {
      var pn = normalizeMatchWord(p);
      var first = normalizeMatchWord((p.split(/\s+/)[0]) || '');
      if (pn.indexOf(norm) !== 0 && first.indexOf(norm) !== 0) return;
      if (pn.length < bestLen) {
        bestLen = pn.length;
        best = p;
      }
    });
    if (!best) return null;
    return {
      replaceLen: token.length,
      insertText: best + ' da //',
      ghostText: buildAnliefGhost(token, best)
    };
  }

  function buildAnliefGhost(token, partName) {
    var t = String(token || '');
    var p = String(partName || '');
    var tl = t.length;
    if (normalizeMatchWord(p).indexOf(normalizeMatchWord(t)) === 0) {
      return p.substring(tl) + ' da //';
    }
    var first = p.split(/\s+/)[0] || p;
    if (normalizeMatchWord(first).indexOf(normalizeMatchWord(t)) === 0) {
      return first.substring(tl) + p.slice(first.length) + ' da //';
    }
    return p.substring(tl) + ' da //';
  }

  function clearAnlieferungGhost() {
    anliefSuggest = null;
    if (!commentEditor) return;
    var ghosts = commentEditor.querySelectorAll('.anlief-ghost');
    for (var i = 0; i < ghosts.length; i++) {
      if (ghosts[i].parentNode) ghosts[i].parentNode.removeChild(ghosts[i]);
    }
  }

  function injectAnlieferungGhost(ghostText) {
    if (!ghostText || !commentEditor) return;
    var selection = window.getSelection();
    if (!selection.rangeCount) return;
    var range = selection.getRangeAt(0);
    if (!commentEditor.contains(range.commonAncestorContainer)) return;
    var span = document.createElement('span');
    span.className = 'anlief-ghost';
    span.setAttribute('contenteditable', 'false');
    span.setAttribute('aria-hidden', 'true');
    span.textContent = ghostText;
    range.insertNode(span);
    range.setStartBefore(span);
    range.collapse(true);
    selection.removeAllRanges();
    selection.addRange(range);
  }

  function updateAnlieferungSuggest() {
    clearAnlieferungGhost();
    if (!commentEditor || document.activeElement !== commentEditor) return;
    if (!currentBestellungText || !String(currentBestellungText).trim()) return;
    var text = getCommentText();
    var caret = getCaretOffset(commentEditor);
    var after = text.slice(caret);
    if (/^[A-Za-z0-9ÄÖÜäöüß]/.test(after)) return;
    var token = getTokenBeforeCaret(text, caret);
    var suggest = getAnlieferungSuggest(token, text);
    if (!suggest || !suggest.ghostText) return;
    anliefSuggest = suggest;
    injectAnlieferungGhost(suggest.ghostText);
  }

  function acceptAnlieferungSuggest() {
    if (!anliefSuggest) return false;
    var s = anliefSuggest;
    clearAnlieferungGhost();
    var text = getCommentText();
    var caret = getCaretOffset(commentEditor);
    var start = caret - s.replaceLen;
    if (start < 0) return false;
    var newText = text.slice(0, start) + s.insertText + text.slice(caret);
    var newCaret = start + s.insertText.length;
    var matchedWords = getMatchedWords(currentBestellungText, newText);
    document.getElementById('infoSchaeden').innerHTML = formatSchaeden(currentSchaedenText);
    document.getElementById('infoBestellung').innerHTML = formatBestellung(currentBestellungText, matchedWords);
    renderCommentEditor(newText, matchedWords, false);
    setCaretOffset(commentEditor, newCaret);
    return true;
  }

  function getCommentText() {
    if (!commentEditor.querySelector('.anlief-ghost')) {
      return commentEditor.innerText.replace(/\r/g, '');
    }
    var clone = commentEditor.cloneNode(true);
    var ghosts = clone.querySelectorAll('.anlief-ghost');
    for (var i = 0; i < ghosts.length; i++) {
      if (ghosts[i].parentNode) ghosts[i].parentNode.removeChild(ghosts[i]);
    }
    return String(clone.innerText || '').replace(/\r/g, '');
  }

  function setCommentText(text) {
    clearAnlieferungGhost();
    commentEditor.textContent = text || "";
    refreshCrossHighlights(false);
  }

  function getCaretOffset(element) {
    var selection = window.getSelection();
    if (!selection.rangeCount) return 0;
    var range = selection.getRangeAt(0);
    if (!element.contains(range.endContainer)) return 0;
    var count = 0;
    var walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null);
    var n;
    while ((n = walker.nextNode())) {
      if (n.parentNode && n.parentNode.classList && n.parentNode.classList.contains('anlief-ghost')) continue;
      if (n === range.endContainer) return count + range.endOffset;
      count += n.textContent.length;
    }
    return count;
  }

  function setCaretOffset(element, offset) {
    var selection = window.getSelection();
    var range = document.createRange();
    var stack = [element];
    var node;
    var remaining = offset;

    while (stack.length) {
      node = stack.pop();
      if (node.nodeType === 3) {
        if (node.parentNode && node.parentNode.classList && node.parentNode.classList.contains('anlief-ghost')) continue;
        var textLength = node.textContent.length;
        if (remaining <= textLength) {
          range.setStart(node, remaining);
          range.collapse(true);
          selection.removeAllRanges();
          selection.addRange(range);
          return;
        }
        remaining -= textLength;
      } else {
        if (node.classList && node.classList.contains('anlief-ghost')) continue;
        for (var i = node.childNodes.length - 1; i >= 0; i--) {
          stack.push(node.childNodes[i]);
        }
      }
    }

    range.selectNodeContents(element);
    range.collapse(false);
    selection.removeAllRanges();
    selection.addRange(range);
  }

  function renderCommentEditor(text, matchedWords, preserveCaret) {
    var caretOffset = preserveCaret ? getCaretOffset(commentEditor) : 0;
    var html = escapeHtml(text || "").replace(/\n/g, '<br>');
    commentEditor.innerHTML = applyWordHighlightsToHtml(html, matchedWords);
    if(!text) commentEditor.innerHTML = "";
    if(preserveCaret) setCaretOffset(commentEditor, caretOffset);
  }

  function refreshCrossHighlights(preserveCaret) {
    clearAnlieferungGhost();
    var commentText = getCommentText();
    var matchedWords = getMatchedWords(currentBestellungText, commentText);
    document.getElementById('infoSchaeden').innerHTML = formatSchaeden(currentSchaedenText);
    document.getElementById('infoBestellung').innerHTML = formatBestellung(currentBestellungText, matchedWords);
    renderCommentEditor(commentText, matchedWords, preserveCaret);
    if (preserveCaret && document.activeElement === commentEditor) updateAnlieferungSuggest();
  }

  function schaedenNeedsReifen(text) {
    var s = String(text || '');
    if (/(Reifen VA ersetzen|Reifen HA ersetzen|Reifen \(2\) ersetzen|Reifen \(4\) ersetzen)/i.test(s)) return true;
    if (/Reifen\s+(?:vorne|hinten)\s+(?:links?|rechts?)\s+(?:erneuern|ersetzen)/i.test(s)) return true;
    return false;
  }

  function highlightReifenSchaedenHtml(html) {
    html = html.replace(/(Reifen VA ersetzen|Reifen HA ersetzen|Reifen \(2\) ersetzen|Reifen \(4\) ersetzen)/gi, '<span class="highlight-red">$1</span>');
    html = html.replace(/(Reifen\s+(?:vorne|hinten)\s+(?:links?|rechts?)\s+(?:erneuern|ersetzen))/gi, '<span class="highlight-red">$1</span>');
    return html;
  }

  function formatSchaeden(text) {
    if(!text || !text.trim()) return "-";
    var reifenHighlight = function(s) {
      return highlightReifenSchaedenHtml(escapeHtml(s));
    };
    var parts = text.split(/\n+/).map(function(p) { return p.trim(); }).filter(Boolean);
    if(parts.length <= 1) {
      parts = text.split(/\s{2,}/).map(function(p) { return p.trim(); }).filter(Boolean);
    }
    if(parts.length <= 1) {
      return reifenHighlight(text);
    }
    var html = '<ul>';
    parts.forEach(function(p) {
      html += '<li>' + reifenHighlight(p) + '</li>';
    });
    html += '</ul>';
    return html;
  }

  function formatBestellung(text, matchedWords) {
    if(!text || !text.trim()) return "-";
    var parts = text.split(/\n+/).map(function(p) { return p.trim(); }).filter(Boolean);
    if(parts.length <= 1) {
      return applyWordHighlightsToHtml(
        escapeHtml(text).replace(/(Reifen Seng)/gi, '<span class="highlight-red">$1</span>'),
        matchedWords || {}
      );
    }
    var html = '<ul>';
    parts.forEach(function(p) {
      html += '<li>' + applyWordHighlightsToHtml(
        escapeHtml(p).replace(/(Reifen Seng)/gi, '<span class="highlight-red">$1</span>'),
        matchedWords || {}
      ) + '</li>';
    });
    html += '</ul>';
    return html;
  }

  function isStockIdFormat(val) {
    return /^[A-Z]{2}\d{3,}/i.test(val.replace(/\s+/g, ''));
  }

  function isTireSizeQuery(val) {
    var s = String(val || '').trim();
    if (s.length < 5) return false;
    return /\d{3}\s*\/\s*\d{2}/.test(s);
  }

  function normalizeStockIdJs(value) {
    return String(value || '').replace(/\s+/g, '').toUpperCase();
  }

  function cellMatchesStockIdJs(cellVal, stockId) {
    var cv = normalizeStockIdJs(cellVal);
    var sid = normalizeStockIdJs(stockId);
    return sid !== '' && cv === sid;
  }

  function computeWmsFromCache(stockId, cache) {
    if (!cache || !cache.rows) return null;
    var sid = normalizeStockIdJs(stockId);
    if (!sid) return { success: false, message: 'Keine Stock-ID' };
    var rows = cache.rows;
    var hitIdx = -1;
    for (var s = 0; s < rows.length; s++) {
      if (cellMatchesStockIdJs(rows[s][0], sid)) {
        hitIdx = s;
        break;
      }
    }
    var result = { success: false };
    if (hitIdx >= 0) {
      var rowData = rows[hitIdx];
      result.success = true;
      result.carolUrl = String(rowData[1] || '');
      result.schaeden = String(rowData[2] || '');
      result.kommBestellung = String(rowData[3] || '');
      result.kommAnlieferung = String(rowData[4] || '');
      result.status = String(rowData[5] || '');
      result.regal = String(rowData[6] || '');
      result.reifenStatus = String(rowData[7] || '');
      result.markeModel = String(rowData[8] || '');
    } else {
      result.message = 'Stock-ID in Refurbisment List nicht gefunden!';
    }
    return result;
  }

  function searchByOrderNumberFromCache(query, cache) {
    if (!cache || (!cache.rows && !cache.gmailLookup)) return null;
    query = String(query || '').replace(/\s+/g, '').toUpperCase();
    if (!query) return { found: false, message: 'Keine Suchanfrage' };
    var cleanQuery = query.replace(/^N4P/i, '');
    if (!cleanQuery || cleanQuery.length < 4) return { found: false, message: 'Suchanfrage zu kurz (min. 4 Zeichen)' };

    var rows = cache.rows || [];
    for (var i = 0; i < rows.length; i++) {
      var cellText = String(rows[i][3] || '').replace(/\s+/g, '').toUpperCase();
      if (!cellText) continue;
      if (cellText.indexOf(cleanQuery) !== -1 || cellText.indexOf(query) !== -1) {
        var st = String(rows[i][0] || '').trim();
        if (st) {
          return { found: true, stockId: st, message: 'Gefunden via Bestellnummer in Kommentar Ersatzteile Bestellung', source: 'sheet' };
        }
      }
    }

    var gmailRows = cache.gmailLookup || [];
    for (var g = 0; g < gmailRows.length; g++) {
      var key = String(gmailRows[g][0] || '').replace(/\s+/g, '').toUpperCase();
      if (!key || (key !== query && key !== cleanQuery)) continue;
      var stockId = String(gmailRows[g][1] || '').trim();
      if (!stockId) continue;
      return { found: true, stockId: stockId, message: 'Gefunden via Gmail Lookup', source: 'gmail' };
    }

    return { found: false, message: "Bestellnummer '" + query + "' weder im Sheet noch in Gmail Lookup gefunden." };
  }

  function clearRefurbCacheProgressTimer() {

  function startRefurbCacheProgressUi() {

    var dot = document.getElementById('cachePulseDot');
    var label = document.getElementById('cacheStatusText');
    if (spin) spin.hidden = false;

      label.className = 'topbar-cache-live-label topbar-cache-live-label--loading';
    }
    var pct = 0;
    refurbCacheProgressTimer = setInterval(function() {
      var delta = (94 - pct) * (0.1 + Math.random() * 0.07);
      pct = Math.min(94, pct + delta);
      var r = Math.round(pct);
      if (label) label.textContent = 'Cache lädt ' + r + '%';
    }, 90);
  }

  function finishRefurbCacheProgressUi(ok, onDone) {

    var spin = document.getElementById('cacheLoadSpinner');
    var dot = document.getElementById('cachePulseDot');
    var label = document.getElementById('cacheStatusText');
    if (spin) spin.hidden = true;

    google.script.run.withSuccessHandler(function(res) {

        raAllEntries = res.entries || [];
        raSessionActive = true;
        raDataReady = true;
      }
      doneOne();
    }).withFailureHandler(function() { doneOne(); }).getHeutigeReifenausgabe();
    google.script.run.withSuccessHandler(function(res) {

  function loadRefurbishmentCache(force, onDone) {
    if (refurbCacheLoading && !force) {
      if (typeof onDone === 'function') onDone();
      return;
    }
    var showLoadUi = !refurbCache;
    refurbCacheLoading = true;
    if (showLoadUi) startRefurbCacheProgressUi();
    google.script.run
      .withSuccessHandler(function(res) {
        refurbCacheLoading = false;
        var ok = !!(res && res.success);
        if (ok) refurbCache = res;
        if (showLoadUi) {
          finishRefurbCacheProgressUi(ok, function() {
            updateRefurbCacheHud(ok);
            if (typeof onDone === 'function') onDone();
            if (ok) scheduleMenuPanelPrefetch();
          });
        } else {
          updateRefurbCacheHud(ok);
          if (typeof onDone === 'function') onDone();
          if (ok) scheduleMenuPanelPrefetch();
        }
      })
      .withFailureHandler(function() {
        refurbCacheLoading = false;
        if (showLoadUi) {
          finishRefurbCacheProgressUi(false, function() {
            updateRefurbCacheHud(false);
            if (typeof onDone === 'function') onDone();
          });
        } else {
          updateRefurbCacheHud(false);
          if (typeof onDone === 'function') onDone();
        }
      })
      .getRefurbishmentCachePayload();
  }

  function formatVerlaufTsDisplay(ts) {
    if (!ts) return '';
    var s = String(ts).trim();
    if (/^\d{2}\.\d{2}\.\d{4} \d{2}:\d{2}$/.test(s)) return s;
    try {
      var d = new Date(s);
      if (!isNaN(d.getTime())) {
        return d.toLocaleString('de-DE', {
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Europe/Berlin'
        }).replace(',', '');
      }
    } catch (e) {}
    return s.replace(/\s*GMT[^\)]*(\([^)]*\))?/gi, '').trim();
  }

  function applyFetchWmsResult(res, id) {
    if (res.success) {
      var prevStock = normalizeStockIdJs(currentStock);
      currentStock = normalizeStockInput(id);
      var loadedStock = normalizeStockIdJs(currentStock);
      if (prevStock && prevStock !== loadedStock) {
        releaseStockEditLockClient(prevStock);
      }
      if (stockLockBlocked && stockLockBlockedId !== loadedStock) {
        hideStockLockBlock();
      }
      currentCarolUrl = res.carolUrl;
      currentSchaedenText = res.schaeden || '';
      currentBestellungText = res.kommBestellung || '';
      currentMarkeModel = res.markeModel || '';

      setCommentText(res.kommAnlieferung || '');
      var regalVal = (res.regal || '').trim();
      setBaselines(res.kommAnlieferung || '', regalVal);
      if (isRegalTagesliste(regalVal)) {
        document.getElementById('currentShelfLabel').innerText = '';
      } else {
        document.getElementById('currentShelfLabel').innerText = 'Aktuell: ' + (res.regal || 'LEER');
      }

      var badge = document.getElementById('badgeReifen');
      var sengPattern = /(Reifen Seng)/i;
      var hasTires = schaedenNeedsReifen(res.schaeden) || sengPattern.test(res.kommBestellung);

      if (hasTires) {
        badge.style.display = 'inline-block';
        var rStatus = (res.reifenStatus || '').toLowerCase().replace(/\s/g, '');
        if (rStatus === 'werkstatt1') {
          badge.innerText = 'REIFEN: SIND DA';
          badge.style.background = 'rgba(86, 211, 100, 0.15)';
          badge.style.color = '#56d364';
        } else {
          badge.innerText = 'REIFEN: FEHLEN';
          badge.style.background = 'rgba(248, 81, 73, 0.15)';
          badge.style.color = '#f85149';
        }
      } else {
        badge.style.display = 'none';
      }

      var badgeWss = document.getElementById('badgeWss');
      var wssAct = document.getElementById('wssCardAction');
      var wssPat = /wss\s*ers/i;
      var hasWss = wssPat.test(res.schaeden || '');
      var anl = String(res.kommAnlieferung || '');
      var wssBooked = /wss\s+da\b/i.test(anl);
      if (hasWss) {
        badgeWss.style.display = 'inline-block';
        wssAct.style.display = 'flex';
        if (wssBooked) {
          badgeWss.innerText = 'WSS: EINGETRAGEN';
          badgeWss.style.background = 'rgba(86, 211, 100, 0.15)';
          badgeWss.style.color = '#56d364';
        } else {
          badgeWss.innerText = 'WSS: VASOLD OFFEN';
          badgeWss.style.background = 'rgba(242, 116, 32, 0.14)';
          badgeWss.style.color = '#F27420';
        }
      } else {
        badgeWss.style.display = 'none';
        wssAct.style.display = 'none';
      }

      updateB2a1KandidatBadgeFromSchaeden(res.schaeden || '');

      var sel = document.getElementById('shelfSelect');
      var currentRegal = (res.regal || '').trim();
      shelfSelectIgnoreChange = true;
      sel.dataset.serverRegal = currentRegal;
      sel.innerHTML = '';
      var allShelves = allRegalShelfList();
      currentShelves = allShelves.map(function(name) { return { name: name }; });
      if (isRegalTagesliste(currentRegal)) {
        sel.innerHTML += '<option value="Tagesliste" selected>Tagesliste</option>';
      } else if (!currentRegal) {
        sel.innerHTML += '<option value="" selected>-- REGAL WÄHLEN --</option>';
      } else if (allShelves.indexOf(currentRegal) === -1) {
        sel.innerHTML += '<option value="' + currentRegal + '" selected>' + currentRegal + '</option>';
      }
      allShelves.forEach(function(name) {
        var selAttr = (name === currentRegal) ? ' selected' : '';
        sel.innerHTML += '<option value="' + name + '"' + selAttr + '>' + name + '</option>';
      });
      applyTageslisteShelfUi(currentRegal);
      shelfSelectIgnoreChange = false;

      document.getElementById('btnCarol').disabled = !res.carolUrl;
      var btnVerlauf = document.getElementById('btnVerlauf');
      if (btnVerlauf) btnVerlauf.disabled = false;

      if (pendingWarning) {
        setStatus(pendingWarning.msg, pendingWarning.color);
        pendingWarning = null;
      } else {
        setStatus('✅ Daten für ' + id + ' geladen!', '#56d364');
      }
      toggleUI(true);

      updatePzContext(id, res.kommBestellung);
      maybeShowNbChooser(id);
      claimStockEditLockForCurrent(loadedStock);
    } else {
      updateB2a1KandidatBadgeFromSchaeden('');
      hidePzContext();
      toggleUI(true);
      var btnVerlaufFail = document.getElementById('btnVerlauf');
      if (btnVerlaufFail) btnVerlaufFail.disabled = true;
      handleNotFoundNbCheck(id, res.message);
    }

  function searchBelegeFallback(res) {
    var q = document.getElementById('searchInput').value.trim();
    if(q.replace(/\s+/g, '').length < 4) {
      setHudBusy(false);
      setStatus("❌ " + (res.message || "Nicht gefunden"), "#f85149");
      toggleUI(true);
      return;
    }
    setStatus("🔍 Suche in Belegen (Packzettel/PDFs)…", "#F27420");
    setHudBusy(true, 'Suche in Belegen…');
    google.script.run.withSuccessHandler(function(pz) {
      setHudBusy(false);
      var entries = (pz && pz.success && pz.entries) ? pz.entries : [];
      if(!entries.length) {
        setStatus("❌ " + (res.message || "Nicht gefunden"), "#f85149");
        toggleUI(true);
        return;
      }
      var stocks = {};
      for(var i = 0; i < entries.length; i++) {
        var s = String(entries[i].stockId || '').replace(/\s+/g, '').toUpperCase();
        if(s) stocks[s] = true;
      }
      var stockList = Object.keys(stocks);
      var qNorm = q.replace(/\s+/g, '').toUpperCase();
      if(stockList.length === 1 && stockList[0] !== qNorm) {
        setStatus("✅ Gefunden via Belege → " + stockList[0], "#56d364");
        document.getElementById('searchInput').value = stockList[0];
        setHudBusy(true, 'Lade Auftrag…');
        setTimeout(function() { loadData(); }, 600);
        return;
      }
      toggleUI(true);
      setStatus("📄 " + entries.length + " Belege gefunden – bitte auswählen", "#3FA0DB");
      pzOpenWithEntries(q, entries);
    }).withFailureHandler(function() {
      setHudBusy(false);
      setStatus("❌ " + (res.message || "Nicht gefunden"), "#f85149");
      toggleUI(true);
    }).getPackzettelList(q);
  }

  function loadData() {
    var id = document.getElementById('searchInput').value.trim();
    if(!id) return;

    if (isTireSizeQuery(id)) {
      openReifenModalWithSizeSearch(id);
      return;
    }

    if(!isStockIdFormat(id)) {
      setStatus("🔍 Suche Bestellnummer '" + id + "'...", "#F27420");
      toggleUI(false);
      setHudBusy(true, 'Suche Bestellnummer…');
      var orderLocal = searchByOrderNumberFromCache(id, refurbCache);
      if (orderLocal !== null) {
        handleOrderNumberSearchResult(orderLocal);
        return;
      }
      requestOrderNumberSearch(id);
      return;
    }

    setStatus("Scanne Datenbank...", "#F27420");
    toggleUI(false);
    setHudBusy(true, 'Scanne Datenbank…');

    var fromCache = computeWmsFromCache(id, refurbCache);
    if (fromCache !== null) {
      applyFetchWmsResult(fromCache, id);
      return;
    }

    google.script.run.withSuccessHandler(function(res) {
      applyFetchWmsResult(res, id);
    }).withFailureHandler(function(err) {
      setStatus("❌ Serverfehler: " + (err.message || String(err)), "#f85149");
      toggleUI(true);
    }).fetchWmsData(id);
  }

  function saveKommentarUndRegalFlow() {
    var text = getCommentText().trim();
    var regal = String(document.getElementById('shelfSelect').value || '').trim();
    var stockId = normalizeStockIdJs(currentStock);
    var expectedKommentar = baselineKommentar;
    var expectedRegal = baselineRegal;
    if (!stockId) return setStatus("❌ Keine Stock-ID geladen – zuerst Auftrag laden.", "#f85149");
    if (isStockEditBlocked(stockId)) {
      return setStatus("❌ Auftrag gesperrt – Kollege arbeitet noch daran.", "#f85149");
    }
    if (!text) return setStatus("❌ Bitte erst Kommentar eintragen!", "#f85149");
    if (saveKommentarRegalInflight[stockId]) {
      setStatus("⏳ Speichern für " + stockId + " läuft bereits im Hintergrund…", "#F27420");
      return;
    }

    var token = String(Date.now()) + '-' + Math.random().toString(36).slice(2, 8);
    var noRegal = !regal;
    setStatus(
      noRegal
        ? "💾 Speichere Kommentar im Hintergrund (kein Regal)…"
        : "💾 Speichere Kommentar + Regal im Hintergrund…",
      "#F27420"
    );
    patchRefurbCacheKommentarRegal(stockId, text, regal);
    applyLocalSaveUiIfCurrent(stockId, regal);

    var timerId = setTimeout(function() {
      if (!finishSaveKommentarRegalJob(stockId, token)) return;
      setStatus("⚠️ Speichern unklar / Timeout – " + stockId, "#f85149");
      showStickyToast(
        'err',
        'Speichern unklar / Timeout',
        stockId + ' — Bitte neu öffnen und erneut speichern.'
      );
    }, SAVE_BG_TIMEOUT_MS);

    saveKommentarRegalInflight[stockId] = { token: token, timerId: timerId };

    google.script.run.withSuccessHandler(function(res) {
      if (!finishSaveKommentarRegalJob(stockId, token)) return;
      if (res && res.conflict) {
        handleSaveConcurrencyConflict(res, stockId);
        return;
      }
      if (res && res.success) {
        var savedRegal = regal || expectedRegal;
        if (res.savedRegal != null && String(res.savedRegal).trim() !== "") {
          savedRegal = String(res.savedRegal).trim();
        } else if (!regal) {
          savedRegal = expectedRegal;
        }
        setBaselines(text, savedRegal);
        handleVerlaufSaveSuccess(res);
        patchRefurbCacheKommentarRegal(stockId, text, savedRegal);
        applyLocalSaveUiIfCurrent(stockId, savedRegal);
        if (normalizeStockIdJs(currentStock) === stockId) {
          var selOk = document.getElementById('shelfSelect');
          if (selOk && savedRegal) selOk.dataset.serverRegal = savedRegal;
        }
        loadRefurbishmentCache(true);
        loadKommentarVerlaufCache(true);
        if (noRegal) {
          setStatus("✅ " + res.message + " ⚠️ Kein Regal vergeben!", "#F27420");
          showStickyToast(
            'ok',
            '✅ Kommentar gespeichert — ' + stockId,
            (res.message || 'Gespeichert.') + ' ⚠️ Kein Regal vergeben!'
          );
        } else {
          setStatus("✅ " + res.message, "#56d364");
          showStickyToast(
            'ok',
            '✅ Kommentar + Regal gespeichert — ' + stockId,
            res.message || 'Gespeichert.'
          );
        }
      } else {
        patchRefurbCacheKommentarRegal(stockId, expectedKommentar, expectedRegal);
        var errMsg = (res && res.message) ? res.message : 'Unbekannter Fehler';
        setStatus("❌ " + errMsg, "#f85149");
        showStickyToast('err', '❌ Speichern fehlgeschlagen — ' + stockId, errMsg);
      }
    }).withFailureHandler(function(err) {
      if (!finishSaveKommentarRegalJob(stockId, token)) return;
      patchRefurbCacheKommentarRegal(stockId, expectedKommentar, expectedRegal);

  function sendDymoPrint(options) {
    var opts = options || {};
    var rawMenge = opts.copies != null && opts.copies !== '' ? parseInt(opts.copies, 10) : parseInt(document.getElementById('dymoCount').value, 10);
    var menge = isNaN(rawMenge) ? 1 : Math.max(0, rawMenge);
    if(menge === 0) {
      if(!opts.silent) setStatus("ℹ️ DYMO Druck übersprungen (0 Etiketten).", "#9da7b3");
      return { success: true, skipped: true, message: "DYMO Druck übersprungen." };
    }
    var typedInitials = document.getElementById('dymoInitials').value.trim();
    if(opts.requireInitials && !typedInitials) {
      return { success: false, skipped: true };
    }
    var initials = (typedInitials || "LAGER").toUpperCase();
    localStorage.setItem('arasaka_dymo_initials', initials);
    var stockForLabel = currentStock;
    if (opts.stockId != null && String(opts.stockId).replace(/\s+/g, '') !== '') {
      stockForLabel = String(opts.stockId).trim();
    }
    stockForLabel = normalizeStockInput(stockForLabel);
    if (!stockForLabel) {
      if(!opts.silent) setStatus("❌ Keine Stock-ID für DYMO.", "#f85149");
      return { success: false, skipped: false, message: "Keine Stock-ID" };
    }
    if(!opts.silent) {
      setStatus("🖨️ Sende an Dymo...", "#3FA0DB");
    }
    try {
      if (typeof dymo === 'undefined' || !dymo.label || !dymo.label.framework) {
          if(!opts.silent) setStatus("❌ FEHLER: DYMO Framework fehlt!", "#f85149");
          return { success: false, skipped: false, message: "DYMO Framework fehlt!" };
      }
      
      var dymoCtx = requireDymoLabelPrinter();
      if (!dymoCtx.ok) {
          if(!opts.silent) setStatus("❌ FEHLER: " + dymoCtx.message, "#f85149");
          return { success: false, skipped: false, message: dymoCtx.message };
      }

      printDymoLabelToPrinter(stockForLabel, initials, menge, dymoCtx.printerName, dymoCtx.variant);
      if(!opts.silent) {
        setStatus("✅ Erfolgreich an DYMO gesendet! (" + dymoCtx.printerName + ")", "#56d364");
      }
      return { success: true, skipped: false };

    } catch (err) {
      if(!opts.silent) setStatus("❌ DYMO SYSTEMFEHLER: " + err.message, "#f85149");
      return { success: false, skipped: false, message: err.message };
    }
  }

  function fireCarol() {
    if(!currentCarolUrl || !currentStock) return;
    var text = getCommentText().trim();
    if(!text) return setStatus("❌ Bitte erst Kommentar eintragen!", "#f85149");
    var stockId = normalizeStockIdJs(currentStock);
    if (!stockId) return setStatus("❌ Keine Stock-ID geladen – zuerst Auftrag laden.", "#f85149");
    if (isStockEditBlocked(stockId)) {
      return setStatus("❌ Auftrag gesperrt – Kollege arbeitet noch daran.", "#f85149");
    }
    if (carolMissionInflight[stockId]) {
      setStatus("⏳ Carol für " + stockId + " läuft bereits im Hintergrund…", "#F27420");
      return;
    }

    var dymoResult = sendDymoPrint({ silent: true, requireInitials: true });
    var autoUrl = currentCarolUrl + (currentCarolUrl.indexOf('?') !== -1 ? '&' : '?') + 'arasaka_auto=1';
    var carolWindow = window.open(autoUrl, '_blank');
    if(!carolWindow) {
      setStatus("❌ Carol-Popup wurde blockiert!", "#f85149");
      return;
    }
    registerCarolWindow(carolWindow);
    document.getElementById('btnCarol').disabled = true;
    carolReturnClearStock = stockId;

    var token = String(Date.now()) + '-' + Math.random().toString(36).slice(2, 8);
    setStatus("🚀 Carol gestartet. Tagesliste läuft im Hintergrund…", "#3FA0DB");

    var timerId = setTimeout(function() {
      if (!finishCarolMissionJob(stockId, token)) return;
      if (normalizeStockIdJs(currentStock) === stockId) {
        document.getElementById('btnCarol').disabled = false;
      }
      setStatus("⚠️ Speichern unklar / Timeout – " + stockId, "#f85149");
      showStickyToast(
        'err',
        'Speichern unklar / Timeout',
        stockId + ' — Tagesliste/Carol: Bitte neu öffnen und erneut speichern.'
      );
    }, CAROL_BG_TIMEOUT_MS);

    carolMissionInflight[stockId] = { token: token, timerId: timerId };

    var carolExpectedKommentar = baselineKommentar;
    var carolExpectedRegal = baselineRegal;

    google.script.run
      .withSuccessHandler(function(res) {
        var job = carolMissionInflight[stockId];
        if (!job || job.token !== token) return;
        if (res && res.conflict) {
          finishCarolMissionJob(stockId, token);
          if (normalizeStockIdJs(currentStock) === stockId) {
            document.getElementById('btnCarol').disabled = false;
          }
          handleSaveConcurrencyConflict(res, stockId);
          return;
        }
        if(!res || !res.success) {
          finishCarolMissionJob(stockId, token);
          if (normalizeStockIdJs(currentStock) === stockId) {
            document.getElementById('btnCarol').disabled = false;
          }
          var errMsg = (res && res.message) ? res.message : 'Unbekannter Fehler';
          setStatus("❌ FEHLER: " + errMsg, "#f85149");
          showStickyToast('err', '❌ Carol Speichern fehlgeschlagen — ' + stockId, errMsg);
          return;
        }
        setBaselines(text, carolExpectedRegal);
        handleVerlaufSaveSuccess(res);
        setStatus("🚀 Setze Tagesliste im Hintergrund…", "#9B59B6");

        google.script.run
          .withSuccessHandler(function(res2) {
            if (!finishCarolMissionJob(stockId, token)) return;
            if(res2 && res2.success) {
              showOldRegalModal(res2.oldRegal, stockId);
              var finalStatus = "✅ Kommentar gespeichert. Auftrag auf Tagesliste gesetzt.";
              if(dymoResult.skipped) finalStatus += " DYMO übersprungen.";
              else if(dymoResult.success) finalStatus += " DYMO Druck gesendet.";
              if(!dymoResult.success && !dymoResult.skipped) finalStatus += " DYMO Fehler: " + dymoResult.message;
              setStatus(finalStatus, "#56d364");
              showStickyToast('ok', '✅ Tagesliste & Carol — ' + stockId, finalStatus);
              loadRefurbishmentCache(true);
              loadKommentarVerlaufCache(true);
              if (normalizeStockIdJs(currentStock) === stockId || !currentStock) {
                resetWmsHudForNextOrder(finalStatus);
              }
            } else {
              if (normalizeStockIdJs(currentStock) === stockId) {
                document.getElementById('btnCarol').disabled = false;
              }
              var failMsg = (res2 && res2.message) ? res2.message : 'Unbekannter Fehler';
              setStatus("❌ FEHLER: " + failMsg, "#f85149");
              showStickyToast('err', '❌ Tagesliste fehlgeschlagen — ' + stockId, failMsg);
            }
          })
          .withFailureHandler(function(err) {
            if (!finishCarolMissionJob(stockId, token)) return;
            if (normalizeStockIdJs(currentStock) === stockId) {
              document.getElementById('btnCarol').disabled = false;
            }
            var failMsg = err && err.message ? err.message : String(err || 'Serverfehler');
            setStatus("❌ Serverfehler: " + failMsg, "#f85149");
            showStickyToast('err', '❌ Tagesliste fehlgeschlagen — ' + stockId, failMsg);
          })
          .triggerCarolMission(stockId);
      })
      .withFailureHandler(function(err) {
        if (!finishCarolMissionJob(stockId, token)) return;
        if (normalizeStockIdJs(currentStock) === stockId) {
          document.getElementById('btnCarol').disabled = false;
        }
        var failMsg = err && err.message ? err.message : String(err || 'Serverfehler');
        setStatus("❌ Kommentarfehler: " + failMsg, "#f85149");
        showStickyToast('err', '❌ Carol Speichern fehlgeschlagen — ' + stockId, failMsg);
      })
      .saveKommentar(stockId, text, "carol", carolExpectedKommentar, carolExpectedRegal);
  }

    function computeSnap(x, y) {
      var vw = window.innerWidth, vh = window.innerHeight;
      var halfW = Math.floor(vw / 2);
      var availTop = NAV_CLEARANCE + 4;
      var availH = vh - availTop - 10;
      var halfH = Math.floor(availH / 2);
      var inTopBand = y < NAV_CLEARANCE + SNAP_CORNER;
      var inBottomBand = y > vh - SNAP_CORNER;
      var onLeft = x < SNAP_CORNER;
      var onRight = x > vw - SNAP_CORNER;
      if (onLeft && inTopBand)    return { left: 4, top: availTop, width: halfW - 6, height: halfH, label: 'Oben links' };
      if (onRight && inTopBand)   return { left: halfW + 2, top: availTop, width: halfW - 6, height: halfH, label: 'Oben rechts' };
      if (onLeft && inBottomBand) return { left: 4, top: availTop + halfH + 2, width: halfW - 6, height: halfH - 4, label: 'Unten links' };
      if (onRight && inBottomBand)return { left: halfW + 2, top: availTop + halfH + 2, width: halfW - 6, height: halfH - 4, label: 'Unten rechts' };
      if (y < NAV_CLEARANCE + SNAP_EDGE) return { left: 4, top: availTop, width: vw - 8, height: availH - 6, label: 'Maximieren' };
      if (x < SNAP_EDGE)           return { left: 4, top: availTop, width: halfW - 6, height: availH - 6, label: 'Linke Hälfte' };
      if (x > vw - SNAP_EDGE)      return { left: halfW + 2, top: availTop, width: halfW - 6, height: availH - 6, label: 'Rechte Hälfte' };

    function startDrag(e, dialog, cfg) {

    function startResize(e, dialog, cfg, dir) {

    function renderTaskbar() {

    function minimizeAll() {

        '- Jede Aktion wird dem Nutzer VOR der Ausführung zur Bestätigung angezeigt; er kann ablehnen. Führe nur aus, was der Nutzer möchte. Bei Unklarheit frage zuerst nach, statt zu raten.',
        '- Nach Ausführung erhältst du das Ergebnis (success/message) und fasst es dem Nutzer kurz zusammen. Bei Misserfolg erkläre den Grund.',
        '- Reine Informationsfragen beantwortest du normal als Text, ohne eine Funktion aufzurufen.'
      ]);
    } else {
      base = base.concat([
        '',
        'NUR-LESEN-MODUS (AGENT-MODUS AUS):',
        '- Der Agent-Modus ist aktuell deaktiviert. Du kannst KEINE Änderungen im WMS vornehmen.',

      ]);
    }
    return base.join('\n');
  }

  function buildAiDataContext() {
    var out = [];
    var i, e, parts;

    if (refurbCache && refurbCache.rows && refurbCache.rows.length) {
      out.push('### REFURBISHMENT (' + refurbCache.rows.length + ' Aufträge)');

      for (i = 0; i < rows.length; i++) {

        out.push([

          aiClean(r[6]) || '-',
          aiClean(r[7]) || '-',
          aiClean(r[2]) || '-',
          aiClean(r[3]) || '-',

        e = nbAllEntries[i];

    if (raAllEntries && raAllEntries.length) {

    if (refurbCache && refurbCache.gmailLookup && refurbCache.gmailLookup.length) {
      out.push('### GMAIL-LOOKUP Bestellnummer -> Stock-ID (' + refurbCache.gmailLookup.length + ')');
      var gl = refurbCache.gmailLookup;
      for (i = 0; i < gl.length; i++) {
        var ordNo = aiClean(gl[i][0]);

          aiClean(p.lastindex) || '-',
          aiClean(p.gwIndex) || '-',
          aiClean(p.menge) || '-'
        ].join(' | '));
      }
      out.push('');
    }

    if (lagerKistenCache && ((lagerKistenCache.items && lagerKistenCache.items.length) || (lagerKistenCache.notes && lagerKistenCache.notes.length))) {
      var lkItems = lagerKistenCache.items || [];
      out.push('### LAGER KISTEN (Tab "LAGER", Regal-Übersicht der Kisten · ' + lkItems.length + ')');
      out.push('Format: Stock-ID | Regal | Kategorie(Farbe) | Notiz');
      for (i = 0; i < lkItems.length; i++) {
        e = lkItems[i];
        out.push([
          aiClean(e.stockId) || '-',
          aiClean(e.regal) || '-',
          aiClean(e.kategorie) || '-',
          aiClean(e.note) || '-'
        ].join(' | '));
      }
      var lkNotes = lagerKistenCache.notes || [];
      if (lkNotes.length) {
        out.push('LAGER-KISTEN NOTIZEN/KLÄRFÄLLE:');

          var nReg = aiClean(lkNotes[i].regal);
          out.push('- ' + (nReg ? '(' + nReg + ') ' : '') + aiClean(lkNotes[i].text));
        }
      }
      out.push('');
    }

    if (nbStatusOptions && nbStatusOptions.length) {
      out.push('### ERLAUBTE NACHBESTELLUNG-STATUS (gültige Werte für updateNachbestellung feld=status)');
      out.push(nbStatusOptions.join(' | '));

      out.push('');
    }

    if (!out.length) {
      return 'LIVE-DATEN: (noch keine Daten geladen — bitte WMS-Cache laden lassen)';
    }
    return 'LIVE-DATEN (Stand jetzt):\n\n' + out.join('\n');
  }

  function aiRenderInline(text) {
    var safe = escapeHtml(String(text == null ? '' : text));
    safe = safe.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
    return safe;
  }

  function aiFindFunctionCall(parts) {
    if (!parts) return null;
    for (var i = 0; i < parts.length; i++) {
      if (parts[i] && parts[i].functionCall) return parts[i].functionCall;
    }
    return null;
  }

  function aiExtractText(parts) {
    var t = '';
    if (parts) {
      for (var i = 0; i < parts.length; i++) {
        if (parts[i] && parts[i].text) t += parts[i].text;
      }
    }
    return t;
  }

  function aiFindRefurbRow(stockId) {
    if (!refurbCache || !refurbCache.rows) return null;
    var sid = normalizeStockIdJs(stockId);
    for (var i = 0; i < refurbCache.rows.length; i++) {
      if (cellMatchesStockIdJs(refurbCache.rows[i][0], sid)) return refurbCache.rows[i];
    }
    return null;
  }

  function aiResolveNbEntry(stockId, artikelNr) {
    if (!nbAllEntries || !nbAllEntries.length) return { error: 'Keine Nachbestellungen geladen.' };
    var sid = normalizeStockIdJs(stockId);
    var matches = [];
    for (var i = 0; i < nbAllEntries.length; i++) {
      if (normalizeStockIdJs(nbAllEntries[i].stockId) === sid) matches.push(nbAllEntries[i]);
    }
    if (!matches.length) return { error: 'Keine offene Nachbestellung mit Stock-ID ' + sid + ' gefunden.' };
    if (matches.length > 1 && artikelNr) {
      var an = String(artikelNr).replace(/\s+/g, '').toLowerCase();
      var f = matches.filter(function(m) {
        return String(m.artikel || '').replace(/\s+/g, '').toLowerCase().indexOf(an) !== -1;
      });
      if (f.length === 1) return { entry: f[0] };
      if (f.length > 1) return { error: 'Mehrere Positionen passen zu Artikel-Nr ' + artikelNr + '.' };
      return { error: 'Keine Position mit Artikel-Nr ' + artikelNr + ' für ' + sid + '.' };
    }
    if (matches.length > 1) {
      var arts = matches.map(function(m) { return m.artikel || (m.teil || '(ohne Artikel-Nr)'); });
      return { error: 'Mehrere offene Nachbestellungen für ' + sid + ' (' + matches.length + '). Bitte Artikel-Nr angeben. Optionen: ' + arts.join(', ') };
    }
    return { entry: matches[0] };
  }

  function aiRunServer(fnName, argsArr) {
    return new Promise(function(resolve) {
      var runner = google.script.run
        .withSuccessHandler(function(r) { resolve(r || { success: true }); })
        .withFailureHandler(function(err) { resolve({ success: false, message: (err && err.message) || 'Serverfehler' }); });
      runner[fnName].apply(runner, argsArr);
    });
  }

  function aiExecuteTool(name, args) {
    args = args || {};
    try {
      switch (name) {
        case 'appendRefurbKommentar': {
          var row = aiFindRefurbRow(args.stockId);
          if (!row) return Promise.resolve({ success: false, message: 'Stock-ID ' + args.stockId + ' nicht in Refurbishment gefunden.' });
          var cur = String(row[4] || '').trim();
          var combined = cur ? (cur + ' // ' + String(args.zusatz || '')) : String(args.zusatz || '');
          return aiRunServer('saveKommentar', [args.stockId, combined]);
        }
        case 'setRefurbKommentar':
          return aiRunServer('saveKommentar', [args.stockId, String(args.text || '')]);
        case 'saveRefurbKommentarUndRegal':
          return aiRunServer('saveKommentarUndRegal', [args.stockId, String(args.text || ''), String(args.regal || '')]);
        case 'einlagern':
          return aiRunServer('einlagern', [args.stockId, String(args.regal || '')]);
        case 'updateNachbestellung': {
          var res = aiResolveNbEntry(args.stockId, args.artikelNr);
          if (res.error) return Promise.resolve({ success: false, message: res.error });
          var en = res.entry;
          return aiRunServer('updateNachbestellung', [en.row, String(args.feld || ''), String(args.wert || ''), en.stockId, en.entryId]);
        }
        case 'triggerCarolMission':
          return aiRunServer('triggerCarolMission', [args.stockId]);
        case 'processReifenStock':
          return aiRunServer('processReifenStock', [String(args.tabName || ''), args.stockId, !!args.angeliefert]);
        case 'processNachbestellVasoldWss':
          return aiRunServer('processNachbestellVasoldWss', [args.stockId, !!args.wssJa, !!args.gummi]);
        default:
          return Promise.resolve({ success: false, message: 'Unbekannte Aktion: ' + name });
      }
    } catch (e) {
      return Promise.resolve({ success: false, message: 'Fehler: ' + (e && e.message ? e.message : e) });
    }
  }

      default:

    }
  }

        '<div class="ai-tool-actions">' +
          '<button type="button" class="ai-tool-btn ai-tool-run" onclick="aiConfirmPendingTool()">✅ Ausführen</button>' +
          '<button type="button" class="ai-tool-btn ai-tool-cancel" onclick="aiCancelPendingTool()">✖ Abbrechen</button>' +
        '</div>' +
        '<div class="ai-tool-result" style="display:none;"></div>' +
      '</div>';
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    aiPendingTool.cardEl = wrap;
    aiRefreshSendBtn();
  }

  function aiShowToolResult(card, result) {
    if (!card) return;
    var acts = card.querySelector('.ai-tool-actions');
    if (acts) acts.style.display = 'none';
    var box = card.querySelector('.ai-tool-result');
    if (box) {
      var ok = !!(result && result.success);
      box.style.display = 'block';
      box.className = 'ai-tool-result ' + (ok ? 'ai-tool-result--ok' : 'ai-tool-result--err');
      box.innerHTML = (ok ? '✅ ' : '⚠️ ') + aiRenderInline(String((result && result.message) || (ok ? 'Erledigt.' : 'Fehlgeschlagen.')));
    }
  }

  function aiConfirmPendingTool() {
    if (!aiPendingTool) return;
    var pend = aiPendingTool;
    aiPendingTool = null;
    aiRefreshSendBtn();
    var card = pend.cardEl;
    if (card) {
      var acts = card.querySelector('.ai-tool-actions');
      if (acts) acts.innerHTML = '<span class="ai-tool-running"><span class="hud-spin hud-spin--sm"></span> wird ausgeführt…</span>';
    }
    aiExecuteTool(pend.name, pend.args).then(function(result) {
      aiShowToolResult(card, result);
      aiChatHistory.push({ role: 'user', parts: [{ functionResponse: { name: pend.name, response: (result && typeof result === 'object') ? result : { value: String(result) } } }] });
      aiRunTurn();
    });
  }

  function aiCancelPendingTool() {
    if (!aiPendingTool) return;
    var pend = aiPendingTool;
    aiPendingTool = null;
    aiRefreshSendBtn();
    var card = pend.cardEl;
    if (card) {
      var acts = card.querySelector('.ai-tool-actions');
      if (acts) acts.innerHTML = '<span class="ai-tool-cancelled">✖ Abgebrochen</span>';
    }
    aiChatHistory.push({ role: 'user', parts: [{ functionResponse: { name: pend.name, response: { status: 'abgebrochen', message: 'Der Nutzer hat die Aktion abgelehnt.' } } }] });
    aiRunTurn();
  }

  function aiRunTurn() {
    setAiBusy(true);
    var typing = aiShowTyping();
    var systemText = buildAiSystemPrompt() + '\n\n' + buildAiDataContext();
    var payload = {
      system_instruction: { parts: [{ text: systemText }] },
      contents: aiChatHistory.slice(-24),
      generationConfig: {
        temperature: 0.2,
        maxOutputTokens: 8192,
        thinkingConfig: { thinkingBudget: 0 }
      }
    };
    if (aiAgentMode) {
      payload.tools = [{ functionDeclarations: AI_AGENT_TOOLS }];
    }

    fetch(GEMINI_API_BASE + GEMINI_MODEL + ':generateContent', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-goog-api-key': GEMINI_API_KEY
      },
      body: JSON.stringify(payload)
    }).then(function(resp) {
      return resp.json().then(function(data) { return { ok: resp.ok, status: resp.status, data: data }; });
    }).then(function(res) {
      if (typing && typing.parentNode) typing.parentNode.removeChild(typing);
      setAiBusy(false);
      if (!res.ok) {
        var errMsg = (res.data && res.data.error && res.data.error.message) ? res.data.error.message : ('HTTP ' + res.status);
        aiAppendMessage('bot', '⚠️ Fehler von Gemini: ' + errMsg);
        return;
      }
      var cand = res.data.candidates && res.data.candidates[0];
      var content = (cand && cand.content) ? cand.content : { parts: [] };
      var fnCall = aiFindFunctionCall(content.parts);
      if (fnCall) {
        aiChatHistory.push({ role: 'model', parts: content.parts });
        aiRequestToolConfirmation(fnCall.name, fnCall.args || {});
        return;
      }
      var answer = aiExtractText(content.parts);
      if (!answer && cand && cand.finishReason && cand.finishReason !== 'STOP') {
        answer = '(Keine Antwort — Grund: ' + cand.finishReason + ')';
      } else if (answer && cand && cand.finishReason === 'MAX_TOKENS') {
        answer += '\n\n… (Antwort gekürzt — frag gern weiter für mehr Details)';
      }
      if (!answer) answer = '⚠️ Keine Antwort erhalten.';
      aiAppendMessage('bot', answer);
      aiChatHistory.push({ role: 'model', parts: [{ text: answer }] });
    }).catch(function(err) {
      if (typing && typing.parentNode) typing.parentNode.removeChild(typing);
      setAiBusy(false);
      aiAppendMessage('bot', '⚠️ Verbindungsfehler: ' + (err && err.message ? err.message : err));
    });
  }

  function sendAiChatMessage() {
    if (aiChatBusy || aiPendingTool) return;
    var inp = document.getElementById('aiChatInput');
    if (!inp) return;
    var text = String(inp.value || '').trim();
    if (!text) return;

    inp.value = '';
    autoGrowAiInput();
    var suggest = document.getElementById('aiSuggest');
    if (suggest) suggest.style.display = 'none';
    aiAppendMessage('user', text);
    aiChatHistory.push({ role: 'user', parts: [{ text: text }] });
    aiRunTurn();
  }
</script>
