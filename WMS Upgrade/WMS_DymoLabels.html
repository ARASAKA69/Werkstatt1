function resolveDymoLabelVariant(printerName) {
  var manual = localStorage.getItem('arasaka_dymo_variant') || 'auto';
  if (manual === '450' || manual === '550') return manual;
  var name = String(printerName || '').toLowerCase();
  if (/550|labelwriter\s*5\s*50/.test(name)) return '550';
  if (/450|duo|labelwriter\s*4\s*50/.test(name)) return '450';
  return '550';
}

function normalizeDymoPrinters(printers) {
  var list = [];
  if (!printers) return list;
  if (typeof printers.length === 'number') {
    for (var i = 0; i < printers.length; i++) {
      if (printers[i]) list.push(printers[i]);
    }
    return list;
  }
  for (var k in printers) {
    if (Object.prototype.hasOwnProperty.call(printers, k) && printers[k] && typeof printers[k] === 'object' && printers[k].name) {
      list.push(printers[k]);
    }
  }
  return list;
}

function isDymoLabelSidePrinter(printer) {
  if (!printer || !printer.name) return false;
  if (printer.printerType === 'TapePrinter') return false;
  var name = String(printer.name).toLowerCase();
  if (/\btape\b/.test(name) && !/\blabel\b/.test(name)) return false;
  if (printer.printerType === 'LabelWriterPrinter') return true;
  return /labelwriter|label writer/.test(name);
}

function scoreDymoLabelPrinter(printer) {
  var name = String(printer.name || '').toLowerCase();
  var score = 0;
  if (printer.isConnected !== false) score += 100;
  if (printer.printerType === 'LabelWriterPrinter') score += 80;
  if (/\blabel\b/.test(name)) score += 60;
  if (/duo/.test(name) && /\blabel\b/.test(name)) score += 40;
  if (/450/.test(name)) score += 20;
  if (/\btape\b/.test(name)) score -= 500;
  if (printer.printerType === 'TapePrinter') score -= 500;
  return score;
}

function pickDymoLabelPrinter(printers) {
  var list = normalizeDymoPrinters(printers);
  if (!list.length) return null;
  var saved = localStorage.getItem('arasaka_dymo_printer') || '';
  if (saved) {
    for (var i = 0; i < list.length; i++) {
      if (list[i].name === saved) return list[i];
    }
  }
  var candidates = [];
  for (var j = 0; j < list.length; j++) {
    if (isDymoLabelSidePrinter(list[j])) candidates.push(list[j]);
  }
  if (!candidates.length) candidates = list.slice();
  candidates.sort(function(a, b) { return scoreDymoLabelPrinter(b) - scoreDymoLabelPrinter(a); });
  return candidates[0] || null;
}

function refreshDymoPrinterSelect() {
  var sel = document.getElementById('dymoPrinterSelect');
  if (!sel) return;
  if (typeof dymo === 'undefined' || !dymo.label || !dymo.label.framework) {
    sel.innerHTML = '<option value="">DYMO Connect nicht verfügbar</option>';
    return;
  }
  var list = normalizeDymoPrinters(dymo.label.framework.getPrinters());
  if (!list.length) {
    sel.innerHTML = '<option value="">Kein DYMO Drucker gefunden</option>';
    return;
  }
  var saved = localStorage.getItem('arasaka_dymo_printer') || '';
  var prev = sel.value || saved;
  sel.innerHTML = '';
  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var opt = document.createElement('option');
    opt.value = p.name;
    var suffix = p.printerType === 'TapePrinter' ? ' [Band/Tape]' : ' [Etikett/Label]';
    if (p.isConnected === false) suffix += ' (offline?)';
    opt.textContent = p.name + suffix;
    sel.appendChild(opt);
  }
  if (prev && list.some(function(p) { return p.name === prev; })) {
    sel.value = prev;
  } else {
    var pick = pickDymoLabelPrinter(list);
    if (pick) sel.value = pick.name;
  }
  if (sel.value) localStorage.setItem('arasaka_dymo_printer', sel.value);
}

function getDymoPrinterForPrint() {
  refreshDymoPrinterSelect();
  var list = normalizeDymoPrinters(dymo.label.framework.getPrinters());
  if (!list.length) return null;
  var sel = document.getElementById('dymoPrinterSelect');
  var wanted = sel && sel.value ? sel.value : (localStorage.getItem('arasaka_dymo_printer') || '');
  if (wanted) {
    for (var i = 0; i < list.length; i++) {
      if (list[i].name === wanted) return list[i];
    }
  }
  return pickDymoLabelPrinter(list);
}

function requireDymoLabelPrinter() {
  if (typeof dymo === 'undefined' || !dymo.label || !dymo.label.framework) {
    return { ok: false, message: 'DYMO Framework fehlt!' };
  }
  var printer = getDymoPrinterForPrint();
  if (!printer) {
    return { ok: false, message: 'Kein DYMO Drucker gefunden!' };
  }
  if (!isDymoLabelSidePrinter(printer)) {
    return { ok: false, message: 'Falscher Drucker: "' + printer.name + '" ist Band/Tape. Bitte "DUO Label" wählen.' };
  }
  return {
    ok: true,
    printer: printer,
    printerName: printer.name,
    variant: resolveDymoLabelVariant(printer.name)
  };
}

function getDymoStockLabelTemplate(variant) {
  return variant === '450' ? DYMO_LABEL_XML_450 : DYMO_LABEL_XML_550;
}

function buildDymoStockLabelXml(stockId, dateString, initials, variant) {
  var safeStock = String(stockId || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  var safeDate = String(dateString || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  var safeUser = String(initials || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return getDymoStockLabelTemplate(variant)
    .replace(/__STOCKID__/g, safeStock)
    .replace(/__DATE__/g, safeDate)
    .replace(/__USER__/g, safeUser);
}

function prepareDymoLabelXmlForOpen(xml, variant) {
  var payload = String(xml || '');
  if (variant === '550') payload = payload
    .replace(/<HasFixedLength>[^<]*<\/HasFixedLength>/gi, '')
    .replace(/<FixedLengthValue>[^<]*<\/FixedLengthValue>/gi, '')
    .replace(/<IsStatic>[^<]*<\/IsStatic>/gi, '')
    .replace(/<StaticDateTime>[^<]*<\/StaticDateTime>/gi, '');
  return payload;
}

function getDymoLabelDateString() {
  return new Date().toLocaleDateString('de-DE');
}

function printDymoLabelToPrinter(stockId, initials, copies, printerName, variant) {
  var xml = buildDymoStockLabelXml(stockId, getDymoLabelDateString(), initials, variant);
  var payload = prepareDymoLabelXmlForOpen(xml, variant);
  var printParams = dymo.label.framework.createLabelWriterPrintParamsXml({ copies: copies });
  var label = dymo.label.framework.openLabelXml(payload);
  if (label && typeof label.isValidLabel === 'function' && !label.isValidLabel()) {
    throw new Error('Label-XML wird von DYMO Connect abgelehnt.');
  }
  label.print(printerName, printParams);
}
