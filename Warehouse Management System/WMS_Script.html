  function downloadBridgeFile(url, filename) {
    fetch(url, { mode: 'cors', cache: 'no-store' }).then(function(r) {
      if(!r.ok) throw new Error('bad');
      return r.blob();
    }).then(function(blob) {
      var href = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = href;
      a.download = filename;
      a.style.position = 'fixed';
      a.style.left = '-9999px';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(href); }, 5000);
    }).catch(function() {
      var w = window.open(url, '_blank', 'noopener,noreferrer');
      if(!w) window.location.href = url;
    });
  }

      if(!r.ok) throw new Error('bridge http');
      return r.json();
    }).then(function(data) {
      if(!data.success || !data.printers || !data.printers.length) throw new Error('no printers');
      setBridgeHelpVisible(false);
      dot.style.background = '#56d364';
      txt.textContent = 'Online';
      sel.innerHTML = '';
      var saved = localStorage.getItem('arasaka_brother_printer') || '';
      data.printers.forEach(function(p) {
        var opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        if(p === saved) opt.selected = true;
        sel.appendChild(opt);
      });
      if(!saved && sel.value) {
        localStorage.setItem('arasaka_brother_printer', sel.value);
        setBridgePrinter(sel.value);
      }
      if(saved) setBridgePrinter(saved);
    }).catch(function() {
      dot.style.background = '#f85149';
      txt.textContent = 'Offline - Bridge starten!';
      sel.innerHTML = '<option value="">Bridge nicht verbunden</option>';
      setBridgeHelpVisible(true);

  function wmsHrefHasJunk(href) {
    return /[?&](_wms_v|wmsboot)=/i.test(String(href || ''));

  function showWmsUpdateBlock(info) {
    wmsUpdateForced = true;
    wmsUpdateTargetVersion = String((info && info.latestVersion) || '');
    var el = document.getElementById('wmsUpdateOverlay');
    var verEl = document.getElementById('wmsUpdateVersion');
    var logEl = document.getElementById('wmsUpdateChangelog');
    if (verEl) {
      var fromV = String((info && info.clientVersion) || window.WMS_CLIENT_VERSION || '?');
      var toV = String((info && info.latestVersion) || '?');
      verEl.textContent = fromV + '  →  ' + toV;
    }
    if (logEl) {
      var notes = String((info && info.changelog) || '').trim();
      if (notes.length) {
        logEl.hidden = false;
        logEl.style.display = '';
        logEl.textContent = notes;
      } else {
        logEl.hidden = true;
        logEl.style.display = 'none';
        logEl.textContent = '';
      }
    }
    if (el) {
      el.classList.add('open');
      el.setAttribute('aria-hidden', 'false');
    }
  }

  function applyWmsAppUpdate() {
    var btn = document.getElementById('wmsUpdateNowBtn');
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Aktualisiere…';
    }
    var base = getCleanWmsUrl();
    var expect = String(wmsUpdateTargetVersion || window.WMS_CLIENT_VERSION || '').trim();
    try {
      sessionStorage.setItem('wms_expect_ver', expect);
      sessionStorage.setItem('wms_boot_tries', '0');
    } catch (e) {}
    if (!base) {
      try {
        if (window.top && window.top !== window) {
          window.top.location.reload();
          return;
        }
      } catch (e2) {}
      window.location.reload();
      return;
    }
    navigateWmsTop(base + '?mode=standalone&wmsboot=' + Date.now());
  }

  function resolveWmsBootNavigation() {
    var baked = String(window.WMS_CLIENT_VERSION || '').trim();
    var clean = getCleanWmsUrl();
    var href = wmsTopHref();
    var junk = wmsHrefHasJunk(href);
    var expect = '';
    var tries = 0;
    try {
      expect = String(sessionStorage.getItem('wms_expect_ver') || '').trim();
      tries = parseInt(sessionStorage.getItem('wms_boot_tries') || '0', 10) || 0;
    } catch (e) {}

    if (expect) {
      if (baked && baked === expect) {
        try {
          sessionStorage.removeItem('wms_expect_ver');
          sessionStorage.removeItem('wms_boot_tries');
        } catch (e3) {}
        if (junk && clean) {
          navigateWmsTop(clean);
          return true;
        }
        return false;
      }
      if (clean && tries < 1) {
        try { sessionStorage.setItem('wms_boot_tries', String(tries + 1)); } catch (e4) {}
        navigateWmsTop(clean + '?mode=standalone&wmsboot=' + Date.now());
        return true;
      }
      try {
        sessionStorage.removeItem('wms_expect_ver');
        sessionStorage.removeItem('wms_boot_tries');
      } catch (e5) {}
      return false;
    }

    if (junk && clean) {
      var mark = '';
      try { mark = String(sessionStorage.getItem('wms_junk_cleared') || ''); } catch (e6) {}
      if (mark !== baked) {
        try { sessionStorage.setItem('wms_junk_cleared', baked); } catch (e7) {}
        navigateWmsTop(clean);
        return true;
      }
    }
    return false;
  }

  function runWmsAppUpdateCheck() {
    if (wmsUpdateForced || wmsUpdateCheckBusy) return;
    if (typeof google === 'undefined' || !google.script || !google.script.run) return;
    wmsUpdateCheckBusy = true;
    var clientVersion = String(window.WMS_CLIENT_VERSION || '');
    google.script.run.withSuccessHandler(function(res) {
      wmsUpdateCheckBusy = false;
      if (res && res.updateAvailable) showWmsUpdateBlock(res);
    }).withFailureHandler(function() {
      wmsUpdateCheckBusy = false;
    }).checkWmsAppUpdate(clientVersion);
  }

  if (!resolveWmsBootNavigation()) {

  function formatShelfDdLabelHtml(raw) {
    var s = String(raw == null ? '' : raw);
    var m = s.match(/^(.*?)(\((?:AKTUELL )?(\d+|\?)\/(\d+|\?)\))$/);
    if(m) {
      var frac = m[2];
      var nStr = m[3];
      var dStr = m[4];
      var mod = ' shelf-dd-count--open';
      if(nStr !== '?' && dStr !== '?') {
        var n = parseInt(nStr, 10);
        var d = parseInt(dStr, 10);
        if(d > 0 && n === d) mod = ' shelf-dd-count--full';
      }
      return escapeHtml(m[1]) + '<span class="shelf-dd-count' + mod + '">' + escapeHtml(frac) + '</span>';
    }
    return escapeHtml(s);
  }

  function rebuildShelfCustomOptions() {
    var sel = document.getElementById('shelfSelect');
    var scroll = document.getElementById('shelfDdScroll');
    if(!sel || !scroll) return;
    var val = sel.value;
    scroll.innerHTML = '';
    for(var i = 0; i < sel.options.length; i++) {
      var opt = sel.options[i];
      var div = document.createElement('div');
      div.className = 'shelf-dd-item' + (opt.value === val ? ' is-selected' : '');
      div.setAttribute('role', 'option');
      div.setAttribute('data-value', opt.value);
      div.innerHTML = formatShelfDdLabelHtml(opt.text);
      div.addEventListener('click', function(ev) {
        ev.stopPropagation();
        var v = this.getAttribute('data-value');
        sel.value = v;
        syncShelfTriggerFromNative();
        closeShelfDd();
        sel.dispatchEvent(new Event('change', { bubbles: true }));
      });
      scroll.appendChild(div);
    }
    syncShelfTriggerFromNative();
  }

  function allRegalShelfList() {
    var arr = [];
    for (var i = 1; i <= 9; i++) {
      for (var j = 1; j <= 8; j++) {
        arr.push('Regal ' + i + '.' + j);

    }

  function compareRegalShelfNames(nameA, nameB) {
    var mA = String(nameA || '').match(/^Regal\s+(\d+)\.(\d+)$/i);
    var mB = String(nameB || '').match(/^Regal\s+(\d+)\.(\d+)$/i);
    if (mA && mB) {
      var x1 = parseInt(mA[1], 10);
      var x2 = parseInt(mA[2], 10);
      var y1 = parseInt(mB[1], 10);
      var y2 = parseInt(mB[2], 10);
      if (x1 !== y1) return x1 - y1;
      return x2 - y2;
    }
    if (mA && !mB) return -1;
    if (!mA && mB) return 1;
    return String(nameA || '').localeCompare(String(nameB || ''), 'de');
  }

      pill.style.display = '';
    }
  }

  function normalizeScannedRegal(raw) {
    var s = String(raw == null ? '' : raw).trim();
    if(!s) return '';
    var m = s.match(/(\d+)\s*\.\s*(\d+)/);
    if(!m) return '';
    var day = parseInt(m[1], 10);
    var slot = parseInt(m[2], 10);
    if(isNaN(day) || isNaN(slot)) return '';
    if(day < 1 || day > 9 || slot < 1 || slot > 8) return '';
    return 'Regal ' + day + '.' + slot;
  }

  function nbFindRegalOptionValue(regal, sel) {
    if(!sel || !regal) return '';
    for(var i = 0; i < sel.options.length; i++) {
      var optVal = sel.options[i].value;
      if(nbLagerortOptionsMatch(regal, optVal)) return optVal;
    }
    var m = String(regal || '').match(/^Regal\s+(\d+)\.(\d+)$/i);
    if(m) {
      var shortVal = parseInt(m[1], 10) + '.' + parseInt(m[2], 10);
      for(var j = 0; j < sel.options.length; j++) {
        if(sel.options[j].value === shortVal) return shortVal;
      }
    }
    return '';
  }

  function applyScannedRegalAndSave(raw) {
    var regal = normalizeScannedRegal(raw);
    if(!regal) {
      setRegalScanStatus("❌ Ungültiger Regal-Barcode: '" + String(raw || '').trim() + "'", '#f85149');
      var bad = document.getElementById('regalScanInput');
      if(bad) { bad.value = ''; bad.focus(); }
      return;
    }
    if(regalScanNbTarget) {
      var nbTarget = regalScanNbTarget;
      var nbSel = document.getElementById('nb-regal-sel-' + nbTarget.index);
      if(!nbSel) {
        setRegalScanStatus('❌ Regal-Auswahl nicht gefunden', '#f85149');
        return;
      }
      var nbOptVal = nbFindRegalOptionValue(regal, nbSel);
      if(!nbOptVal) {
        setRegalScanStatus('❌ ' + regal + ' nicht in der Regal-Liste', '#f85149');
        var nbBad = document.getElementById('regalScanInput');
        if(nbBad) { nbBad.value = ''; nbBad.focus(); }
        return;
      }
      nbSel.value = nbOptVal;
      setRegalScanStatus('✅ ' + regal + ' erkannt – speichere…', '#56d364');
      closeRegalScan();
      saveNbRegal({ stopPropagation: function() {}, preventDefault: function() {}, target: nbSel }, nbTarget.sheetRow, nbTarget.index);
      return;
    }
    var sel = document.getElementById('shelfSelect');
    if(sel) {
      if(allRegalShelfList().indexOf(regal) === -1) {
        sel.innerHTML += '<option value="' + regal + '">' + regal + '</option>';
      }
      sel.value = regal;
      syncShelfTriggerFromNative();
      sel.dispatchEvent(new Event('change', { bubbles: true }));
    }
    setRegalScanStatus("✅ " + regal + " erkannt – speichere…", '#56d364');
    closeRegalScan();
  }

  function stepQty(inputId, delta) {
    var inp = document.getElementById(inputId);
    if(!inp) return;
    var val = parseInt(inp.value, 10);
    if(isNaN(val)) val = 0;
    val = Math.max(0, val + delta);
    inp.value = val;
  }

  function setStatus(msg, color) {
    var el = document.getElementById('globalStatus');
    if (!el) return;
    el.innerText = msg;
    var isError = color === '#f85149' || /FEHLER|nicht gefunden|Nicht gefunden/i.test(String(msg || ''));
    el.className = isError ? 'global-status--error' : '';
    el.style.color = isError ? '' : (color || '#3FA0DB');

  function showStickyToast(type, title, message) {
    var stack = document.getElementById('wmsToastStack');
    if (!stack) return;
    var toast = document.createElement('div');
    toast.className = 'wms-toast wms-toast--' + (type === 'ok' ? 'ok' : 'err');
    toast.setAttribute('role', type === 'ok' ? 'status' : 'alert');
    toast.innerHTML =
      '<div class="wms-toast-body">' +
        '<div class="wms-toast-title">' + escapeHtml(title || '') + '</div>' +
        '<div class="wms-toast-msg">' + escapeHtml(message || '') + '</div>' +
      '</div>' +
      '<button type="button" class="wms-toast-x" onclick="dismissWmsToast(this)" aria-label="Schließen">&times;</button>';
    stack.appendChild(toast);
  }

  function dismissWmsToast(btn) {
    var toast = btn && btn.closest ? btn.closest('.wms-toast') : null;
    if (toast && toast.parentNode) toast.parentNode.removeChild(toast);
  }

  function readPersistedStockLock_() {
    try {
      return normalizeStockIdJs(localStorage.getItem(LS_STOCK_LOCK_HELD) || '');
    } catch (e) {
      return '';
    }
  }

  function persistStockLockHeld_(stockId) {
    try {
      var sid = normalizeStockIdJs(stockId);
      if (sid) localStorage.setItem(LS_STOCK_LOCK_HELD, sid);
      else localStorage.removeItem(LS_STOCK_LOCK_HELD);
    } catch (e) {}
  }

  function clearPersistedStockLock_(stockId) {
    try {
      var sid = normalizeStockIdJs(stockId);
      var stored = readPersistedStockLock_();
      if (!sid || !stored || stored === sid) localStorage.removeItem(LS_STOCK_LOCK_HELD);
    } catch (e) {}
  }

  function releasePersistedStockLockOnBoot() {
    var sid = readPersistedStockLock_();
    if (!sid) return;
    localStorage.removeItem(LS_STOCK_LOCK_HELD);
    google.script.run
      .withSuccessHandler(function() {})
      .withFailureHandler(function() {})
      .releaseStockEditLock(sid);
  }

  function stopStockLockHeartbeat() {
    if (stockLockHeartbeatTimer) {
      clearInterval(stockLockHeartbeatTimer);
      stockLockHeartbeatTimer = null;
    }
  }

  function startStockLockHeartbeat(stockId) {
    stopStockLockHeartbeat();
    var sid = normalizeStockIdJs(stockId);
    if (!sid) return;
    stockLockHeartbeatTimer = setInterval(function() {
      if (normalizeStockIdJs(currentStock) !== sid || stockLockHeldId !== sid) {
        stopStockLockHeartbeat();
        return;
      }
      google.script.run
        .withSuccessHandler(function() {})
        .withFailureHandler(function() {})
        .heartbeatStockEditLock(sid);
    }, STOCK_LOCK_HEARTBEAT_MS);
  }

  function releaseStockEditLockClient(stockId) {
    var sid = normalizeStockIdJs(stockId);
    if (!sid) return;
    if (stockLockHeldId === sid) {
      stockLockHeldId = "";
      stopStockLockHeartbeat();
    }
    clearPersistedStockLock_(sid);
    google.script.run
      .withSuccessHandler(function() {})
      .withFailureHandler(function() {})
      .releaseStockEditLock(sid);
  }

  function releaseStockEditLockOnUnload() {
    var sid = normalizeStockIdJs(stockLockHeldId || readPersistedStockLock_());
    if (!sid) return;
    stockLockHeldId = "";
    stopStockLockHeartbeat();
    google.script.run
      .withSuccessHandler(function() {
        clearPersistedStockLock_(sid);
      })
      .withFailureHandler(function() {})
      .releaseStockEditLock(sid);
  }

  function setStockEditInputsBlocked(blocked) {
    var editor = document.getElementById('editAnlieferung');
    if (editor) {
      editor.contentEditable = blocked ? 'false' : 'true';
      editor.setAttribute('aria-disabled', blocked ? 'true' : 'false');
    }
    var sel = document.getElementById('shelfSelect');
    if (sel) sel.disabled = !!blocked;
    var shelfTrig = document.getElementById('shelfDdTrigger');
    if (shelfTrig) {
      if (blocked) shelfTrig.setAttribute('aria-disabled', 'true');
      else shelfTrig.removeAttribute('aria-disabled');
    }
    var btnCarol = document.getElementById('btnCarol');
    if (btnCarol && blocked) btnCarol.disabled = true;
  }

  function hideStockLockBlock() {
    var el = document.getElementById('stockLockOverlay');
    if (el) {
      el.classList.remove('open');
      el.setAttribute('aria-hidden', 'true');
    }
    stockLockBlocked = false;
    stockLockBlockedId = "";
    setStockEditInputsBlocked(false);
  }

  function showStockLockBlock(stockId, email) {
    var sid = normalizeStockIdJs(stockId);
    var mail = String(email || 'unbekannt');
    var el = document.getElementById('stockLockOverlay');
    var stockEl = document.getElementById('stockLockStock');
    var emailEl = document.getElementById('stockLockEmail');
    var msgEl = document.getElementById('stockLockMsg');
    if (stockEl) stockEl.textContent = sid;
    if (emailEl) emailEl.textContent = mail;
    if (msgEl) {
      msgEl.textContent =
        'Bitte im Lager nachfragen und Infos zusammenlegen. Mit Schließen öffnest du die frische Oberfläche für den nächsten Auftrag.';
    }
    if (el) {
      el.classList.add('open');
      el.setAttribute('aria-hidden', 'false');
    }
    stockLockBlocked = true;
    stockLockBlockedId = sid;
    stockLockHeldId = "";
    stopStockLockHeartbeat();
    setHudBusy(false);
    toggleUI(false);
    setStockEditInputsBlocked(true);
    try {
      var ae = document.activeElement;
      if (ae && typeof ae.blur === 'function' && ae !== document.body) ae.blur();
    } catch (e) {}
    setStatus(
      '⚠️ Kollege ' + mail + ' arbeitet gerade an ' + sid + ' – Dialog schließen für nächsten Auftrag.',
      '#F27420'
    );
  }

  function dismissStockLockBlock() {
    hideStockLockBlock();
    resetWmsHudForNextOrder('Bereit für nächsten Auftrag.');
    var search = document.getElementById('searchInput');
    if (search) {
      try { search.focus(); } catch (e) {}
    }
  }

  function isStockEditBlocked(stockId) {
    var sid = normalizeStockIdJs(stockId || currentStock);
    return !!(stockLockBlocked && sid && stockLockBlockedId === sid);
  }

  function claimStockEditLockForCurrent(stockId) {
    var sid = normalizeStockIdJs(stockId);
    if (!sid) return;
    var prev = stockLockHeldId;
    if (prev && prev !== sid) {
      releaseStockEditLockClient(prev);
    }
    google.script.run.withSuccessHandler(function(res) {
      if (normalizeStockIdJs(currentStock) !== sid) return;
      if (!res || !res.success) return;
      if (res.occupied) {
        showStockLockBlock(sid, res.email);
        return;
      }
      hideStockLockBlock();
      stockLockHeldId = sid;
      persistStockLockHeld_(sid);
      startStockLockHeartbeat(sid);
      toggleUI(true);
      setStockEditInputsBlocked(false);
    }).withFailureHandler(function() {
    }).claimStockEditLock(sid);
  }

  function applyShelfUiFromRegal(regalVal) {
    var currentRegal = String(regalVal || "").trim();
    var sel = document.getElementById("shelfSelect");
    if (!sel) return;
    shelfSelectIgnoreChange = true;
    sel.dataset.serverRegal = currentRegal;
    sel.innerHTML = "";
    var allShelves = allRegalShelfList();
    currentShelves = allShelves.map(function(name) { return { name: name }; });
    if (isRegalTagesliste(currentRegal)) {
      sel.innerHTML += '<option value="Tagesliste" selected>Tagesliste</option>';
    } else if (!currentRegal) {
      sel.innerHTML += '<option value="" selected>-- REGAL WÄHLEN --</option>';
    } else if (allShelves.indexOf(currentRegal) === -1) {
      sel.innerHTML += '<option value="' + currentRegal + '" selected>' + currentRegal + "</option>";
    }
    allShelves.forEach(function(name) {
      var selAttr = name === currentRegal ? " selected" : "";
      sel.innerHTML += '<option value="' + name + '"' + selAttr + ">" + name + "</option>";
    });
    applyTageslisteShelfUi(currentRegal);
    shelfSelectIgnoreChange = false;
    var pill = document.getElementById("currentShelfLabel");
    if (pill) {
      if (isRegalTagesliste(currentRegal)) {
        pill.innerText = "";
      } else {
        pill.innerText = "Aktuell: " + (currentRegal || "LEER");
      }
    }
  }

  function handleSaveConcurrencyConflict(res, stockId) {
    var kommentar = String(res && res.currentKommentar != null ? res.currentKommentar : "");
    var regal = String(res && res.currentRegal != null ? res.currentRegal : "").trim();
    var sid = normalizeStockIdJs(stockId || currentStock);
    setBaselines(kommentar, regal);
    if (normalizeStockIdJs(currentStock) === sid) {
      setCommentText(kommentar);
      applyShelfUiFromRegal(regal);
    }
    patchRefurbCacheKommentarRegal(sid, kommentar, regal);
    var msg = (res && res.message) ||
      "Konflikt: Daten von Kollegen neu geladen – bitte prüfen, eigenen Kommentar ergänzen, erneut speichern.";
    setStatus("⚠️ " + msg, "#F27420");
    showStickyToast(
      "err",
      "⚠️ Konflikt — " + sid,
      msg
    );
  }

  function patchRefurbCacheKommentarRegal(stockId, text, regal) {
    if (!refurbCache || !refurbCache.rows) return;
    var sid = normalizeStockIdJs(stockId);
    if (!sid) return;
    for (var i = 0; i < refurbCache.rows.length; i++) {
      if (!cellMatchesStockIdJs(refurbCache.rows[i][0], sid)) continue;
      refurbCache.rows[i][4] = text;
      refurbCache.rows[i][5] = 'Teilweise angeliefert';
      if (regal) refurbCache.rows[i][6] = regal;
      break;
    }
  }

  function applyLocalSaveUiIfCurrent(stockId, regal) {
    if (normalizeStockIdJs(currentStock) !== normalizeStockIdJs(stockId)) return;
    if (!regal) return;
    var pill = document.getElementById('currentShelfLabel');
    if (pill) pill.innerText = 'Aktuell: ' + regal;
    applyTageslisteShelfUi(regal);
  }

  function finishSaveKommentarRegalJob(stockId, token) {
    var job = saveKommentarRegalInflight[stockId];
    if (!job || job.token !== token) return false;
    if (job.timerId) clearTimeout(job.timerId);
    delete saveKommentarRegalInflight[stockId];
    return true;
  }

  function finishCarolMissionJob(stockId, token) {
    var job = carolMissionInflight[stockId];
    if (!job || job.token !== token) return false;
    if (job.timerId) clearTimeout(job.timerId);
    delete carolMissionInflight[stockId];
    return true;
  }

  }

    if(active) {
      try {
        var ae = document.activeElement;

      el.classList.add('open');

      if(tx) tx.textContent = message || '';

      el.classList.remove('open');
      el.setAttribute('aria-hidden', 'true');

  function toggleOverviewDone(index, stockId, cb) {
    if(!cb) return;
    var map = getOverviewDoneMap();
    if(cb.checked) { map[stockId] = true; } else { delete map[stockId]; }
    saveOverviewDoneMap(map);
    var row = cb.closest('tr');
    if(row) { if(cb.checked) row.classList.add('ov-row-done'); else row.classList.remove('ov-row-done'); }

  function getStatusStyle(status) {
    var n = String(status || "").trim().toLowerCase();
    if(n === "herausgegeben") return "color:#56d364;background:rgba(46,160,67,0.14);border-color:rgba(86,211,100,0.2);";
    if(n === "teilweise angeliefert") return "color:#F27420;background:rgba(242,116,32,0.14);border-color:rgba(242,116,32,0.2);";
    return "color:#9da7b3;";
  }

  function getReifenStyle(value) {
    var n = String(value || "").trim().toLowerCase().replace(/\s+/g, '');
    if(n === "werkstatt1") return "color:#56d364;font-weight:800;";
    if(n === "reifennichtvorhanden") return "color:#f85149;font-weight:800;";
    return "color:#d0d7de;";
  }

  function overviewNeedsReifen(entry) {
    return schaedenNeedsReifen(entry.schaeden) || /Reifen Seng/i.test(entry.kommBestellung || '');
  }

  function overviewReifenDelivered(entry) {
    var rStatus = String(entry.regalReifen || '').toLowerCase().replace(/\s+/g, '');
    if (rStatus === 'werkstatt1') return true;
    if (/reifen\s+da\b/i.test(entry.kommAnlieferung || '')) return true;
    if (rStatus === 'reifennichtvorhanden') return false;
    return null;
  }

  function getOverviewReifenLabel(entry) {
    if (!overviewNeedsReifen(entry)) {
      var raw = String(entry.regalReifen || '').trim();
      return raw || '-';
    }
    var delivered = overviewReifenDelivered(entry);
    if (delivered === true) return 'Reifen da';
    if (delivered === false) return 'Reifen nicht da';
    return 'Reifen offen';
  }

  function getOverviewReifenStyle(entry) {
    if (!overviewNeedsReifen(entry)) return getReifenStyle(entry.regalReifen);
    var delivered = overviewReifenDelivered(entry);
    if (delivered === true) return "color:#56d364;font-weight:800;";
    if (delivered === false) return "color:#f85149;font-weight:800;";
    return "color:#F27420;font-weight:800;";
  }

  function overviewPrintSchaedenHtml(text) {
    if (!text || !String(text).trim()) return '-';
    var html = escapeHtml(String(text)).replace(/\n/g, '<br>');
    html = html.replace(/(Reifen VA ersetzen|Reifen HA ersetzen|Reifen \(2\) ersetzen|Reifen \(4\) ersetzen)/gi, '<span style="color:#c00;font-weight:700;">$1</span>');
    html = html.replace(/(Reifen\s+(?:vorne|hinten)\s+(?:links?|rechts?)\s+(?:erneuern|ersetzen))/gi, '<span style="color:#c00;font-weight:700;">$1</span>');
    return html;
  }

  function formatOverviewComment(text, compareText) {
    var s = String(text || "");
    if(!s.trim()) return '<span style="color:#6e7681;">-</span>';
    var matchedWords = getMatchedWords(compareText || "", s);
    return applyWordHighlightsToHtml(escapeHtml(s).replace(/\n/g, '<br>'), matchedWords);
  }

  function renderStockOverview(entries) {
    var body = document.getElementById('overviewTableBody');
    if(!entries || !entries.length) {
      body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#9da7b3;padding:18px;">Keine Einträge gefunden.</td></tr>';
      return;
    }
    var doneMap = getOverviewDoneMap();
    var html = '';
    for(var i = 0; i < entries.length; i++) {
      var e = entries[i];
      var isDone = !!doneMap[e.stockId];
      var statusStyle = getStatusStyle(e.status);
      var reifenLabel = getOverviewReifenLabel(e);
      var reifenStyle = getOverviewReifenStyle(e);
      var schaedenHtml = formatSchaeden(e.schaeden);
      var bestellHtml = formatOverviewComment(e.kommBestellung, e.kommAnlieferung);
      var anlieferHtml = formatOverviewComment(e.kommAnlieferung, e.kommBestellung);
      var isNb = e.source === 'nachbestellung';
      var lblSchaeden = isNb ? 'Art der Nachbestellung' : 'Schäden (Manueller Input)';
      var lblBestell = isNb ? 'Artikelnummer' : 'Ersatzteile Bestellung';
      var lblAnliefer = isNb ? 'Ersatzteil / Bedarf' : 'Ersatzteile Anlieferung';
      html += '<tr class="ov-row' + (isDone ? ' ov-row-done' : '') + '" onclick="toggleOverviewEntry(' + i + ')">'  
        + '<td class="ov-check-cell" onclick="event.stopPropagation();"><input type="checkbox"' + (isDone ? ' checked' : '') + ' onchange="toggleOverviewDone(' + i + ',\'' + escapeJs(e.stockId) + '\',this)"></td>'
        + '<td style="color:#F27420;font-weight:800;width:24px;" id="ov-chev-' + i + '">▶</td>'
        + '<td style="color:#3FA0DB;font-weight:800;">' + escapeHtml(e.stockId) + (isNb ? ' <span style="font-size:10px;color:#F27420;opacity:0.85;">NB</span>' : '') + '</td>'
        + '<td style="color:#E88435;font-weight:700;">' + escapeHtml(e.regal) + '</td>'
        + '<td><span style="padding:4px 10px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;' + statusStyle + '">' + escapeHtml(e.status || 'Offen') + '</span></td>'
        + '<td><span style="' + reifenStyle + '">' + escapeHtml(reifenLabel) + '</span></td>'
        + '<td style="text-align:right;white-space:nowrap;"><button type="button" onclick="copyOverviewStock(event,\'' + escapeJs(e.stockId) + '\')" style="background:rgba(255,255,255,0.04);color:#c9d1d9;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800;cursor:pointer;margin-right:6px;">📋 Copy</button><button type="button" onclick="openOverviewStock(event,\'' + escapeJs(e.stockId) + '\')" style="background:rgba(61,158,220,0.12);color:#3FA0DB;border:1px solid rgba(61,158,220,0.2);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800;cursor:pointer;">Im WMS öffnen</button></td>'
        + '</tr>';
      html += '<tr class="ov-detail" id="ov-detail-' + i + '">'
        + '<td colspan="7">'
        + '<div class="ov-detail-inner">'
        + '<div class="ov-detail-box wide"><div class="ov-detail-lbl">' + lblSchaeden + '</div><div class="ov-detail-val schaeden-list">' + schaedenHtml + '</div></div>'
        + '<div class="ov-detail-box"><div class="ov-detail-lbl">' + lblBestell + '</div><div class="ov-detail-val">' + bestellHtml + '</div></div>'
        + '<div class="ov-detail-box"><div class="ov-detail-lbl">' + lblAnliefer + '</div><div class="ov-detail-val">' + anlieferHtml + '</div></div>'
        + '<div class="ov-detail-box"><div class="ov-detail-lbl">Reifen</div><div class="ov-detail-val"><span style="' + reifenStyle + '">' + escapeHtml(reifenLabel) + '</span></div></div>'
        + '</div>'
        + '</td>'
        + '</tr>';
    }
    body.innerHTML = html;
  }

    var btn = event ? event.target : null;

  function openStockOverview() {
    var modal = document.getElementById('overviewModal');
    var body = document.getElementById('overviewTableBody');
    modal.classList.add('open');
    if(ovSessionActive && ovOverviewReady) {
      renderStockOverview(ovAllEntries);
      return;
    }
    ovSessionActive = true;
    body.innerHTML = hudLoadingRowHtml(7, 'Lade Übersicht…');
    google.script.run.withSuccessHandler(function(res) {
      if(!res.success) {
        body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#f85149;padding:18px;">Fehler: ' + escapeHtml(res.message || 'Unbekannter Fehler') + '</td></tr>';
        return;
      }
      var entries = res.entries || [];
      ovAllEntries = entries;
      ovOverviewReady = true;
      var count = entries.length;
      var kistenWord = count === 1 ? "Kiste" : "Kisten";
      document.getElementById('overviewTotalBadge').innerText = "Insgesamt: " + count + " " + kistenWord + " im Lager";
      renderStockOverview(entries);
    }).getStockRegalOverview();
  }

  function compareOverviewEntries(a, b) {
    var ra = compareRegalShelfNames(a.regal, b.regal);
    if (ra !== 0) return ra;
    return String(a.stockId || '').localeCompare(String(b.stockId || ''), 'de');
  }

  function overviewPrintDateHeader() {
    var today = new Date();
    return (today.getDate() < 10 ? '0' : '') + today.getDate() + '.' + ((today.getMonth() + 1) < 10 ? '0' : '') + (today.getMonth() + 1) + '.' + today.getFullYear();

  function overviewPrintCellText(val) {
    var s = String(val || '').trim();
    return s ? escapeHtml(s).replace(/\n/g, '<br>') : '-';
  }

    var sorted = entries.slice().sort(compareOverviewEntries);

    for (var j = 0; j < sorted.length; j++) {
      var e = sorted[j];
      var reifen = getOverviewReifenLabel(e);
      rows += '<tr>'
        + '<td>' + (j + 1) + '</td>'
        + '<td style="font-weight:700;">' + escapeHtml(e.stockId) + '</td>'
        + '<td style="font-weight:700;">' + escapeHtml(e.regal) + '</td>'
        + '<td>' + escapeHtml(e.status || '-') + '</td>'
        + '<td>' + escapeHtml(reifen) + '</td>'
        + '</tr>';
    }
    var kistenWord = sorted.length === 1 ? 'Kiste' : 'Kisten';
    return '<!DOCTYPE html><html><head><title>Stock-ID + Regal \u00dcbersicht ' + dateHeader + '</title>'
      + '<style>'
      + 'body{font-family:Arial,sans-serif;margin:20px;color:#111;}'
      + 'h2{margin:0 0 4px 0;font-size:18px;}'
      + '.sub{color:#555;font-size:12px;margin-bottom:14px;}'
      + 'table{width:100%;border-collapse:collapse;font-size:13px;}'
      + 'th,td{border:1px solid #999;padding:6px 10px;text-align:left;}'
      + 'th{background:#eee;font-weight:700;}'
      + 'tr:nth-child(even){background:#f7f7f7;}'
      + '@media print{body{margin:10px;}@page{size:A4 portrait;margin:12mm;}}'
      + '</style></head><body>'
      + '<h2>Stock-ID + Regal \u00dcbersicht \u2014 ' + dateHeader + '</h2>'
      + '<div class="sub">' + sorted.length + ' ' + kistenWord + ' im Lager (sortiert nach Regalplatz)</div>'
      + '<table><thead><tr><th>#</th><th>Stock-ID</th><th>Regalplatz</th><th>Status</th><th>Reifen</th></tr></thead>'
      + '<tbody>' + rows + '</tbody></table>'
      + '</body></html>';
  }

  function buildOverviewDetailHtml(entries, dateHeader) {

    var rows = '';
    for (var j = 0; j < sorted.length; j++) {
      var e = sorted[j];

      var isNb = e.source === 'nachbestellung';

        + '<td>' + (j + 1) + '</td>'
        + '<td class="sid">' + escapeHtml(e.stockId) + '</td>'
        + '<td class="reg">' + escapeHtml(e.regal) + '</td>'
        + '<td>' + escapeHtml(e.status || '-') + '</td>'
        + '<td style="font-weight:700;color:' + reifenColor + ';">' + escapeHtml(reifen) + '</td>'
        + '<td class="note">' + (isNb ? overviewPrintCellText(e.schaeden) : overviewPrintSchaedenHtml(e.schaeden)) + '</td>'
        + '<td class="note">' + overviewPrintCellText(e.kommBestellung) + '</td>'

    var kistenWord = sorted.length === 1 ? 'Kiste' : 'Kisten';

      + '<style>'
      + 'body{font-family:Arial,sans-serif;margin:16px;color:#111;}'
      + 'h2{margin:0 0 4px 0;font-size:17px;}'
      + '.sub{color:#555;font-size:11px;margin-bottom:12px;}'
      + 'table{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed;}'
      + 'th,td{border:1px solid #999;padding:4px 6px;text-align:left;vertical-align:top;}'
      + 'th{background:#eee;font-weight:700;font-size:9px;}'
      + 'tr:nth-child(even){background:#f7f7f7;}'
      + 'td.sid,td.reg{font-weight:700;}'
      + 'td.note{word-wrap:break-word;overflow-wrap:break-word;}'
      + 'col.c-n{width:24px;}col.c-sid{width:64px;}col.c-reg{width:56px;}col.c-st{width:72px;}col.c-rf{width:52px;}col.c-sch{width:20%;}col.c-et{width:auto;}col.c-an{width:auto;}'
      + '@media print{body{margin:8px;}@page{size:A4 landscape;margin:10mm;}}'
      + '</style></head><body>'
      + '<h2>Stock-ID + Regal \u00dcbersicht (vollst\u00e4ndig) \u2014 ' + dateHeader + '</h2>'

      + '<table><colgroup><col class="c-n"><col class="c-sid"><col class="c-reg"><col class="c-st"><col class="c-rf"><col class="c-sch"><col class="c-et"><col class="c-an"></colgroup>'
      + '<thead><tr><th>#</th><th>Stock-ID</th><th>Regalplatz</th><th>Status</th><th>Reifen</th><th>Sch\u00e4den</th><th>Ersatzteile Bestellung</th><th>Ersatzteile Anlieferung</th></tr></thead>'
      + '<tbody>' + rows + '</tbody></table>'
      + '</body></html>';

  function sendOverviewPrint(html, btn, idleLabel) {
    if (btn) { btn.disabled = true; btn.textContent = '\u23f3 Drucke...'; }
    fetch(BRIDGE_URL + '/print-html', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ html: html })
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (data.success) {
        if (btn) { btn.textContent = '\u2705 Gedruckt!'; setTimeout(function() { btn.disabled = false; btn.textContent = idleLabel; }, 2000); }
      } else {
        throw new Error(data.error || 'Bridge error');
      }
    }).catch(function() {
      if (btn) { btn.disabled = false; btn.textContent = idleLabel; }
      printRaFallback(html);
    });
  }

    if (!ovAllEntries || !ovAllEntries.length) {
      alert('Keine Einträge zum Drucken.');

    var html = buildOverviewHtml(ovAllEntries, overviewPrintDateHeader());
    sendOverviewPrint(html, document.querySelector('.ov-btn-print'), '\ud83d\udda8\ufe0f Drucken');

  function printOverviewDetailList() {
    if (!ovAllEntries || !ovAllEntries.length) {
      alert('Keine Einträge zum Drucken.');
      return;

  function normalizeStockInput(value) {
    return String(value || "").replace(/\s+/g, '').toUpperCase();
  }

  function escapeJs(text) {
    return String(text || "").replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  var raAllEntries = [];
  var raSessionActive = false;
  var raDataReady = false;

  function openRaModal() {
    document.getElementById('raModal').classList.add('open');
    if(raSessionActive && raDataReady) {
      updateRaBadge();
      renderRaTable(raAllEntries);
      return;
    }
    raSessionActive = true;
    document.getElementById('raTableBody').innerHTML = hudLoadingRowHtml(4, 'Lade Reifenausgabe…');
    var raB = document.getElementById('raTotalBadge');
    raB.className = 'ra-total-badge ra-total-loading';
    raB.innerHTML = '<span class="hud-spin hud-spin--sm"></span><span>Lade…</span>';
    google.script.run.withSuccessHandler(function(res) {
      if(!res.success) {
        document.getElementById('raTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:#f85149;padding:18px;">Fehler: ' + escapeHtml(res.message) + '</td></tr>';
        return;
      }
      raAllEntries = res.entries || [];
      raDataReady = true;
      updateRaBadge();
      renderRaTable(raAllEntries);
    }).withFailureHandler(function(err) {
      document.getElementById('raTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:#f85149;padding:18px;">Serverfehler: ' + escapeHtml(err.message || String(err)) + '</td></tr>';
    }).getHeutigeReifenausgabe();
  }

  function updateRaBadge() {
    var offen = 0, done = 0;
    for(var i = 0; i < raAllEntries.length; i++) {
      if(raAllEntries[i].gestellt) done++; else offen++;
    }
    var badge = document.getElementById('raTotalBadge');
    if(offen === 0 && done > 0) {
      badge.className = 'ra-total-badge ra-total-complete';
      badge.innerText = '✅ Alle ' + done + ' gestellt';
    } else {
      badge.className = 'ra-total-badge ra-total-mixed';
      badge.innerText = offen + ' offen / ' + done + ' gestellt';
    }
    document.getElementById('raAlleBtn').disabled = (offen === 0);
  }

  function minimizeRaModal() {
    document.getElementById('raModal').classList.remove('open');
    var btn = document.querySelector('.topbar-action[onclick*="openRaModal"]');
    if(btn && raAllEntries.length > 0) {
      btn.style.background = 'rgba(61,158,220,0.18)';
      btn.style.borderColor = '#3FA0DB';
      btn.style.color = '#3FA0DB';
    }
  }

  function refreshRaModal() {
    raSessionActive = false;
    raAllEntries = [];
    raDataReady = false;
    document.getElementById('raTableBody').innerHTML = hudLoadingRowHtml(4, 'Lade Reifenausgabe…');
    var raB = document.getElementById('raTotalBadge');
    raB.className = 'ra-total-badge ra-total-loading';
    raB.innerHTML = '<span class="hud-spin hud-spin--sm"></span><span>Lade…</span>';
    raSessionActive = true;
    google.script.run.withSuccessHandler(function(res) {
      if(!res.success) {
        document.getElementById('raTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:#f85149;padding:18px;">Fehler: ' + escapeHtml(res.message) + '</td></tr>';
        return;
      }
      raAllEntries = res.entries || [];
      raDataReady = true;
      updateRaBadge();
      renderRaTable(raAllEntries);
    }).withFailureHandler(function(err) {
      document.getElementById('raTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:#f85149;padding:18px;">Serverfehler: ' + escapeHtml(err.message || String(err)) + '</td></tr>';
    }).getHeutigeReifenausgabe();
  }

  function renderRaTable(entries) {
    var body = document.getElementById('raTableBody');
    if(!entries || !entries.length) {
      body.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#9da7b3;padding:18px;">Keine Reifen für heute/morgen gefunden.</td></tr>';
      return;
    }
    var today = new Date();
    today.setHours(0,0,0,0);
    var todayStr = (today.getDate() < 10 ? '0' : '') + today.getDate() + '.' + ((today.getMonth()+1) < 10 ? '0' : '') + (today.getMonth()+1) + '.' + today.getFullYear();
    var html = '';
    for(var i = 0; i < entries.length; i++) {
      var e = entries[i];
      var isToday = e.date === todayStr;
      var dateClass = isToday ? 'ra-date-today' : 'ra-date-tomorrow';
      var dateLabel = isToday ? e.date + ' (Heute)' : e.date + ' (Morgen)';
      var reifenBadge = e.amount === 4 ? 'ra-badge-4' : 'ra-badge-2';
      var rowClass = e.gestellt ? 'ra-row-gestellt' : '';
      var statusClass = e.gestellt ? 'ra-status-btn ra-status-gestellt' : 'ra-status-btn ra-status-offen';
      var statusLabel = e.gestellt ? '✅ gestellt' : '⏳ noch zu stellen';
      html += '<tr class="' + rowClass + '" id="ra-row-' + i + '">'
        + '<td class="ra-col-date ' + dateClass + '">' + escapeHtml(dateLabel) + '</td>'
        + '<td class="ra-col-stock ra-cell-stock">' + escapeHtml(e.stockId) + '</td>'
        + '<td class="ra-col-qty"><span class="' + reifenBadge + '">' + e.amount + ' Reifen</span></td>'
        + '<td class="ra-col-status"><button type="button" class="' + statusClass + '" id="ra-status-' + i + '" onclick="toggleRaStatus(' + i + ')">' + statusLabel + '</button></td>'
        + '</tr>';
    }
    body.innerHTML = html;
  }

  function toggleRaStatus(index) {
    var e = raAllEntries[index];
    if(!e) return;
    var btn = document.getElementById('ra-status-' + index);
    if(btn) { btn.disabled = true; btn.innerText = '⏳ ...'; }
    var newGestellt = !e.gestellt;
    var newValue = newGestellt ? (e.amount + ' gestellt') : (e.amount + ' Reifen');
    google.script.run.withSuccessHandler(function(res) {
      if(res.success) {
        e.gestellt = newGestellt;
        e.reifen = newValue;
        updateRaBadge();
        renderRaTable(raAllEntries);
      } else {
        if(btn) { btn.disabled = false; btn.innerText = e.gestellt ? '✅ gestellt' : '⏳ noch zu stellen'; }
        var rb = document.getElementById('raTotalBadge');
        rb.className = 'ra-total-badge ra-total-error';
        rb.innerText = 'Fehler: ' + (res.message || '?');
      }
    }).withFailureHandler(function(err) {
      if(btn) { btn.disabled = false; btn.innerText = e.gestellt ? '✅ gestellt' : '⏳ noch zu stellen'; }
    }).updateReifenGestellt(e.row, e.reifenCol, newValue);
  }

  function stelleAlleReifenHud() {
    var offen = [];
    for(var i = 0; i < raAllEntries.length; i++) {
      if(!raAllEntries[i].gestellt) offen.push(raAllEntries[i]);
    }
    if(offen.length === 0) return;
    var alleBtn = document.getElementById('raAlleBtn');
    alleBtn.disabled = true;
    alleBtn.innerText = '⏳ Stelle ' + offen.length + ' Reifen...';
    var payload = offen.map(function(e) { return { row: e.row, reifenCol: e.reifenCol, amount: e.amount, gestellt: false }; });
    google.script.run.withSuccessHandler(function(res) {
      if(res.success) {
        alleBtn.innerText = '✅ ' + res.message;
        setTimeout(function() { refreshRaModal(); }, 1500);
      } else {
        alleBtn.innerText = '❌ ' + (res.message || 'Fehler');
        alleBtn.disabled = false;
      }
    }).withFailureHandler(function(err) {
      alleBtn.innerText = '❌ Fehler';
      alleBtn.disabled = false;
    }).stelleAlleReifen(payload);
  }

  function buildRaHtml(offen, dateHeader) {
    var rows = '';
    for(var j = 0; j < offen.length; j++) {
      var e = offen[j];
      rows += '<tr>'
        + '<td>' + (j+1) + '</td>'
        + '<td>' + escapeHtml(e.date) + '</td>'
        + '<td>' + escapeHtml(e.stockId) + '</td>'
        + '<td style="text-align:center;font-weight:700;">' + e.amount + '</td>'
        + '<td style="width:60px;"></td>'
        + '</tr>';
    }
    return '<!DOCTYPE html><html><head><title>Reifenausgabe ' + dateHeader + '</title>'
      + '<style>'
      + 'body{font-family:Arial,sans-serif;margin:20px;color:#111;}'
      + 'h2{margin:0 0 4px 0;font-size:18px;}'
      + '.sub{color:#555;font-size:12px;margin-bottom:14px;}'
      + 'table{width:100%;border-collapse:collapse;font-size:13px;}'
      + 'th,td{border:1px solid #999;padding:6px 10px;text-align:left;}'
      + 'th{background:#eee;font-weight:700;}'
      + 'tr:nth-child(even){background:#f7f7f7;}'
      + '@media print{body{margin:10px;}@page{size:A4 portrait;margin:12mm;}}'
      + '</style></head><body>'
      + '<h2>Reifenausgabe \u2014 ' + dateHeader + '</h2>'
      + '<div class="sub">' + offen.length + ' Reifen noch zu stellen</div>'
      + '<table><thead><tr><th>#</th><th>Datum</th><th>Stock-ID</th><th>Anzahl</th><th>\u2713</th></tr></thead>'
      + '<tbody>' + rows + '</tbody></table>'
      + '</body></html>';
  }

  function printRaFallback(html) {
    var w = window.open('', '_blank');
    w.document.write(html + '<script>window.print();<\/script>');
    w.document.close();
  }

  function printRaList() {
    var offen = [];
    for(var i = 0; i < raAllEntries.length; i++) {
      if(!raAllEntries[i].gestellt) offen.push(raAllEntries[i]);
    }
    if(offen.length === 0) { alert('Keine offenen Reifen zum Drucken.'); return; }
    var today = new Date();
    var dateHeader = (today.getDate()<10?'0':'') + today.getDate() + '.' + ((today.getMonth()+1)<10?'0':'') + (today.getMonth()+1) + '.' + today.getFullYear();
    var html = buildRaHtml(offen, dateHeader);

    var btn = document.querySelector('.ra-btn-print');
    if(btn) { btn.disabled = true; btn.textContent = '⏳ Drucke...'; }

    fetch(BRIDGE_URL + '/print-html', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ html: html })
    }).then(function(r) { return r.json(); }).then(function(data) {
      if(data.success) {
        if(btn) { btn.textContent = '✅ Gedruckt!'; setTimeout(function(){ btn.disabled = false; btn.textContent = '🖨️ Drucken'; }, 2000); }
      } else {
        throw new Error(data.error || 'Bridge error');
      }
    }).catch(function() {
      if(btn) { btn.disabled = false; btn.textContent = '🖨️ Drucken'; }
      printRaFallback(html);
    });
  }

  var nbFilteredEntries = [];
  var nbDisplayEntries = [];
  var nbLagerortOptions = [];
  var nbStatusOptions = [];
  var nbSessionActive = false;
  var nbDataReady = false;

  var nbPendingFocusStock = '';

  function applyNbPendingFocus() {
    if(!nbPendingFocusStock) return;
    var key = nbPendingFocusStock;
    nbPendingFocusStock = '';
    for(var i = 0; i < nbDisplayEntries.length; i++) {
      if(normalizeStockInput(nbDisplayEntries[i].stockId) === key) {
        var detail = document.getElementById('nb-detail-' + i);
        if(detail && !detail.classList.contains('open')) toggleNbDetail(i);
        var row = detail ? detail.previousElementSibling : null;
        if(row && row.scrollIntoView) {
          try { row.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch(e) { row.scrollIntoView(); }
        }
        break;
      }
    }
  }

  function openNbModal() {
    document.getElementById('nbModal').classList.add('open');
    if(nbSessionActive && nbDataReady) {
      filterNbBySearch();
      applyNbPendingFocus();
      return;
    }
    nbSessionActive = true;
    if(!nbPendingFocusStock) document.getElementById('nbSearchInput').value = '';
    document.getElementById('nbTableBody').innerHTML = hudLoadingRowHtml(8, 'Lade Nachbestellungen…');
    document.getElementById('nbTotalBadge').innerHTML = '<span class="hud-spin hud-spin--sm"></span><span style="margin-left:6px">Lade…</span>';
    closeNbAutocomplete();
    google.script.run.withSuccessHandler(function(res) {
      if(!res.success) {
        document.getElementById('nbTableBody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:#f85149;padding:18px;">Fehler: ' + escapeHtml(res.message) + '</td></tr>';
        return;
      }
      nbAllEntries = res.entries || [];
      nbFilteredEntries = nbAllEntries;
      nbDataReady = true;
      setNbChooserCache(res.entries || []);
      document.getElementById('nbTotalBadge').innerText = nbAllEntries.length + ' offen';
      nbLagerortOptions = res.lagerortOptions || [];
      nbStatusOptions = res.statusOptions || [];
      if(document.getElementById('nbSearchInput').value.trim()) {
        filterNbBySearch();
      } else {
        renderNbTable(nbAllEntries);
      }
      applyNbPendingFocus();
    }).withFailureHandler(function(err) {
      document.getElementById('nbTableBody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:#f85149;padding:18px;">Serverfehler: ' + escapeHtml(err.message || String(err)) + '</td></tr>';
    }).getNachbestellungen();
  }

    openNbModal();

  var nbChooserStock = '';
  var nbChooserCache = [];
  var nbChooserCacheReady = false;

  function setNbChooserCache(entries) {
    nbChooserCache = entries || [];
    nbChooserCacheReady = true;

  function loadNbChooserCache(force) {
    if(nbChooserCacheLoading) return;
    if(nbChooserCacheReady && !force) return;
    nbChooserCacheLoading = true;
    google.script.run.withSuccessHandler(function(res) {
      nbChooserCacheLoading = false;
      if(res && res.success) setNbChooserCache(res.entries || []);
    }).withFailureHandler(function() {
      nbChooserCacheLoading = false;
    }).getNachbestellungen();

    closeNbChooser();
    if(stock) openNbForStock(stock);

  function nbChooserStatusClass(status) {
    var s = String(status || '').toLowerCase();
    if(s.indexOf('angeliefert') !== -1 || s === 'fertiggestellt' || s === 'konsi-lager' || s === 'konsilager') return 'is-green';
    if(s === 'nicht bestellt' || s.indexOf('rückstand') !== -1 || s.indexOf('rueckstand') !== -1) return 'is-red';
    return '';
  }

  function showNbChooser(stockId, entries) {
    nbChooserStock = stockId;
    var stockEl = document.getElementById('nbChooseStock');
    if(stockEl) stockEl.innerText = stockId;
    var prev = document.getElementById('nbChoosePreview');
    if(prev) {
      var html = '';
      for(var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var statusTxt = e.status || '-';
        var teil = String(e.teil || '').trim();
        var artikel = String(e.artikel || '').trim();
        var desc = teil || artikel;
        var meta = '';
        if(e.regal) meta += '<span><b>Lagerort:</b> ' + escapeHtml(e.regal) + '</span>';
        if(artikel && artikel.toLowerCase() !== teil.toLowerCase()) meta += '<span><b>Artikel:</b> ' + escapeHtml(artikel) + '</span>';
        if(e.date) meta += '<span><b>Datum:</b> ' + escapeHtml(e.date) + '</span>';
        html += '<div class="nb-choose-item' + (e.closed ? ' is-closed' : '') + '">'
          + '<div class="nb-choose-item-top">'
          +   '<span class="nb-choose-item-typ">' + escapeHtml(e.typ || desc || 'Nachbestellung') + '</span>'

  function nbEntriesForStock(stockId) {
    var key = normalizeStockInput(stockId);
    if(!key) return [];
    return (nbChooserCache || []).filter(function(e) {
      return normalizeStockInput(e.stockId) === key;
    });
  }

  function maybeShowNbChooser(stockId) {
    if(!stockId) return;
    if(nbChooserCacheReady) {
      var matches = nbEntriesForStock(stockId);
      if(matches.length) showNbChooser(stockId, matches);
      return;
    }
    loadNbChooserCache(false);
    google.script.run.withSuccessHandler(function(res) {
      if(res && res.success && res.entries && res.entries.length
        && normalizeStockInput(stockId) === normalizeStockInput(currentStock)) {
        showNbChooser(stockId, res.entries);
      }
    }).getNachbestellungenForStock(stockId);
  }

  function handleNotFoundNbCheck(stockId, errMsg) {
    function openIt() {
      setStatus('📦 Nicht in Refurbishment – in Nachbestellung gefunden.', '#F27420');
      openNbForStock(stockId);
    }
    if(nbChooserCacheReady) {
      if(nbEntriesForStock(stockId).length) { openIt(); return; }
      searchBelegeFallback({ message: 'FEHLER: ' + errMsg });
      return;
    }
    loadNbChooserCache(false);
    google.script.run.withSuccessHandler(function(res) {
      if(res && res.success && res.entries && res.entries.length) openIt();
      else searchBelegeFallback({ message: 'FEHLER: ' + errMsg });
    }).withFailureHandler(function() {
      searchBelegeFallback({ message: 'FEHLER: ' + errMsg });
    }).getNachbestellungenForStock(stockId);
  }

  function nbTypShouldPrintWerkstattauftrag(typ) {
    var t = String(typ || '').trim().toLowerCase();
    if (!t) return false;

    if (t.indexOf('erstbestellung') !== -1 && t.indexOf('falsch') !== -1) return true;
    if (t.indexOf('mechanik') !== -1 && t.indexOf('nachbestellung') !== -1) return true;
    if (t.indexOf('q-check') !== -1 || t.indexOf('qcheck') !== -1) return true;

  function getNbStatusClass(status) {
    var s = String(status || '').toLowerCase();

    if(s === 'bestellt' || s === 'teilweise angeliefert' || s === 'lieferrückstand' || s === 'lieferrueckstand') return 'nb-box-status-yellow';
    if(s.indexOf('angeliefert') !== -1 || s === 'fertiggestellt') return 'nb-box-status-green';
    if(s === 'b2a1' || s === 'konsi-lager' || s === 'konsilager') return 'nb-box-status-yellow';
    return '';

  function nbNormalizeRegalCountKey(val) {
    var s = String(val || "").trim().replace(/,/g, ".");
    if(!s) return "";
    var m = s.match(/^regal\s+(\d+)\s*\.\s*(\d+)$/i);
    if(m) return "Regal " + parseInt(m[1], 10) + "." + parseInt(m[2], 10);
    m = s.match(/^(\d+)\s*\.\s*(\d+)$/);
    if(m) {
      var a = parseInt(m[1], 10);
      var b = parseInt(m[2], 10);
      if(a >= 1 && a <= 9 && b >= 1 && b <= 8) return "Regal " + a + "." + b;
    }
    return "";
  }

  function nbLagerortOptionsMatch(stored, optVal) {
    var a = String(stored || "").trim();
    var b = String(optVal || "").trim();
    if(a.toLowerCase() === b.toLowerCase()) return true;
    var ka = nbNormalizeRegalCountKey(a);
    var kb = nbNormalizeRegalCountKey(b);
    return ka !== "" && kb !== "" && ka === kb;
  }

  function buildNbRegalOptions(selectedRaw, optionsList) {
    var list = optionsList;
    if(!list || !list.length) {
      list = ["Tagesliste"];
      for(var ri = 1; ri <= 5; ri++) {
        for(var rj = 1; rj <= 8; rj++) {
          list.push(ri + "." + rj);
        }
      }
      list.push("LACK");
      list.push("Exit");
    }
    var html = '<option value="">—</option>';
    for(var k = 0; k < list.length; k++) {
      var opt = list[k];
      var optStr = String(opt != null ? opt : "").trim();
      if(!optStr) continue;
      var sel = nbLagerortOptionsMatch(selectedRaw, optStr) ? ' selected' : '';
      var label = optStr;
      if(/^(\d+)\.(\d+)$/.test(optStr)) label = 'Regal ' + optStr;
      html += '<option value="' + escapeHtml(optStr) + '"' + sel + '>' + escapeHtml(label) + '</option>';
    }
    return html;
  }

  function buildNbStatusSelect(index, currentStatus, sheetRow) {
    var list = (nbStatusOptions && nbStatusOptions.length) ? nbStatusOptions : NB_STATUS_FALLBACK;
    var html = '<select class="nb-edit-input" onchange="saveNbStatus(event,' + sheetRow + ',this.value,' + index + ')" onclick="event.stopPropagation();">';
    var found = false;
    var cur = String(currentStatus || "").trim().toLowerCase();
    for(var s = 0; s < list.length; s++) {
      var opt = String(list[s] != null ? list[s] : "").trim();
      if(!opt) continue;
      var sel = opt.toLowerCase() === cur ? ' selected' : '';
      if(sel) found = true;
      html += '<option value="' + escapeHtml(opt) + '"' + sel + '>' + escapeHtml(opt) + '</option>';
    }
    if(!found && currentStatus) {
      html += '<option value="' + escapeHtml(currentStatus) + '" selected>' + escapeHtml(currentStatus) + '</option>';
    }
    html += '</select>';
    return html;
  }

  function toggleNbDetail(index) {
    var detail = document.getElementById('nb-detail-' + index);
    var chev = document.getElementById('nb-chev-' + index);
    if(!detail) return;
    if(detail.classList.contains('open')) {
      detail.classList.remove('open');
      if(chev) chev.innerText = '▶';
    } else {
      detail.classList.add('open');
      if(chev) chev.innerText = '▼';
      if(document.getElementById('nb-vasold-wrap-' + index)) loadNbVasoldForDetail(index);
    }
  }

  function loadNbVasoldForDetail(index) {
    var wrap = document.getElementById('nb-vasold-wrap-' + index);
    if(!wrap) return;
    var ent = nbDisplayEntries[index];
    if(!ent) return;
    var loading = document.getElementById('nb-vasold-loading-' + index);
    var bodyEl = document.getElementById('nb-vasold-body-' + index);
    var msgEl = document.getElementById('nb-vasold-msg-' + index);
    if(loading) {
      loading.style.display = '';
      loading.innerHTML = '<span class="hud-spin hud-spin--sm"></span> Vasold-Status…';
    }
    if(bodyEl) bodyEl.style.display = 'none';
    if(msgEl) { msgEl.textContent = ''; msgEl.style.color = ''; }
    google.script.run.withSuccessHandler(function(res) {
      applyNbVasoldUi(index, res);
    }).withFailureHandler(function(err) {
      applyNbVasoldUi(index, { success: false, message: err.message || String(err) });
    }).getVasoldWssSyncState(ent.stockId);
  }

  function applyNbVasoldUi(index, res) {
    var loading = document.getElementById('nb-vasold-loading-' + index);
    var bodyEl = document.getElementById('nb-vasold-body-' + index);
    var wssCb = document.getElementById('nb-vasold-wss-' + index);
    var gummiCb = document.getElementById('nb-vasold-gummi-' + index);
    var gRow = document.getElementById('nb-vasold-gummi-row-' + index);
    var btn = document.getElementById('nb-vasold-btn-' + index);
    var msgEl = document.getElementById('nb-vasold-msg-' + index);
    if(loading) loading.style.display = 'none';
    if(bodyEl) bodyEl.style.display = '';
    if(!wssCb) return;
    var gummiVisible = !!(gRow && gRow.style.display !== 'none');
    if(!res || !res.success) {
      wssCb.disabled = false;
      wssCb.checked = false;
      if(gummiCb && gummiVisible) {
        gummiCb.disabled = false;
        gummiCb.checked = false;
      }
      if(btn) btn.disabled = false;
      if(msgEl) {
        msgEl.textContent = (res && res.message) ? res.message : 'Vasold-Status konnte nicht geladen werden.';
        msgEl.style.color = '#f85149';
      }
      return;
    }
    if(res.frontscheibeJa) {
      wssCb.disabled = true;
      wssCb.checked = true;
    } else {
      wssCb.disabled = false;
      wssCb.checked = false;
    }
    if(gummiCb && gummiVisible) {
      if(res.gummileisteDa) {
        gummiCb.disabled = true;
        gummiCb.checked = true;
      } else {
        gummiCb.disabled = false;
        gummiCb.checked = false;
      }
    }
    var allSynced = !!res.frontscheibeJa && (!gummiVisible || !!res.gummileisteDa);
    if(btn) btn.disabled = allSynced;
    if(allSynced && msgEl && !String(msgEl.textContent || '').trim()) {
      msgEl.textContent = 'Bereits vollständig in Vasold erfasst.';
      msgEl.style.color = '#9da7b3';
    }
  }

  function submitNbVasold(event, index) {
    if(event) { event.stopPropagation(); event.preventDefault(); }
    var ent = nbDisplayEntries[index];
    if(!ent) return;
    var wssCb = document.getElementById('nb-vasold-wss-' + index);
    var gummiCb = document.getElementById('nb-vasold-gummi-' + index);
    var gRow = document.getElementById('nb-vasold-gummi-row-' + index);
    var gummiVisible = !!(gRow && gRow.style.display !== 'none');
    var wantWss = !!(wssCb && wssCb.checked && !wssCb.disabled);
    var wantGummi = !!(gummiVisible && gummiCb && gummiCb.checked && !gummiCb.disabled);
    var msgEl = document.getElementById('nb-vasold-msg-' + index);
    var btn = document.getElementById('nb-vasold-btn-' + index);
    if(!wantWss && !wantGummi) {
      if(msgEl) msgEl.textContent = 'Bitte mindestens eine Option wählen, die noch nicht in Vasold steht.';
      return;
    }
    if(btn) btn.disabled = true;
    if(msgEl) msgEl.innerHTML = '<span class="hud-spin hud-spin--sm"></span> Speichern…';
    google.script.run.withSuccessHandler(function(res) {
      if(res.success) {
        if(msgEl) {
          msgEl.textContent = res.message || 'OK';
          msgEl.style.color = res.skipped ? '#9da7b3' : '#56d364';
        }
        google.script.run.withSuccessHandler(function(sync) {
          if(btn) btn.disabled = false;
          applyNbVasoldUi(index, sync);
        }).withFailureHandler(function(err) {
          if(btn) btn.disabled = false;
          if(msgEl) {
            msgEl.textContent = 'Vasold OK, Status lesen fehlgeschlagen: ' + (err.message || String(err));
            msgEl.style.color = '#e3935b';
          }
        }).getVasoldWssSyncState(ent.stockId);
      } else {
        if(btn) btn.disabled = false;
        if(msgEl) {
          msgEl.textContent = res.message || 'Fehler';
          msgEl.style.color = '#f85149';
        }
      }
    }).withFailureHandler(function(err) {
      if(btn) btn.disabled = false;
      if(msgEl) {
        msgEl.textContent = 'Fehler: ' + (err.message || String(err));
        msgEl.style.color = '#f85149';
      }
    }).processNachbestellVasoldWss(ent.stockId, wantWss, wantGummi);
  }

  function openNbInWms(event, stockId) {
    if(event) { event.stopPropagation(); event.preventDefault(); }
    minimizeNbModal();
    document.getElementById('searchInput').value = stockId;
    loadData();
  }

  function showWerkstattPrintStatus(badgeEl, msgEl, text, color, resetBadge) {
    if (msgEl) {
      msgEl.textContent = text;
      msgEl.style.color = color || '#9da7b3';
      return;
    }
    if (!badgeEl) return;
    badgeEl.innerText = text;
    badgeEl.style.color = color || '';
    if (resetBadge) {
      setTimeout(function() {
        badgeEl.innerText = nbAllEntries.length + ' offen';
        badgeEl.style.color = '';
      }, resetBadge);
    }
  }

  function sendWerkstattauftragPrint(printB64, badgeEl, msgEl) {
    if (!printB64) return;
    showWerkstattPrintStatus(badgeEl, msgEl, 'Drucke Auftrag…', '#9da7b3');
    if (badgeEl && !msgEl) {
      badgeEl.innerHTML = '<span class="hud-spin hud-spin--sm"></span><span style="margin-left:6px">Drucke Auftrag…</span>';
    }
    fetch(BRIDGE_URL + '/print-b64', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ b64: printB64, copies: 1 })
    }).then(function(r) {
      return r.json().then(function(data) {
        if (!r.ok || !data.success) throw new Error((data && data.error) || 'Bridge-Fehler');
        return data;
      });
    }).then(function() {
      showWerkstattPrintStatus(badgeEl, msgEl, 'Auftrag gedruckt!', '#56d364', badgeEl && !msgEl ? 4000 : 0);
    }).catch(function(err) {
      var errTxt = 'Druck fehlgeschlagen: ' + (err && err.message ? err.message : 'Bridge nicht erreichbar');
      showWerkstattPrintStatus(badgeEl, msgEl, errTxt, '#f85149', badgeEl && !msgEl ? 10000 : 0);
    });
  }

  function printNbWerkstattauftrag(event, index) {
    if (event) { event.stopPropagation(); event.preventDefault(); }
    var ent = nbDisplayEntries[index];
    if (!ent) return;
    var btn = document.getElementById('nb-wa-print-btn-' + index);
    var msgEl = document.getElementById('nb-wa-print-msg-' + index);

  function startNbCarol(stockId, badge) {

      var win = window.open(nbCarolAutoUrl(fromCache.carolUrl), '_blank');
      if(!win) showErr('Carol-Popup wurde blockiert!');
      else registerCarolWindow(win);
      return;
    }
    var loaderWin = window.open('', '_blank');
    if(!loaderWin) {
      showErr('Carol-Popup wurde blockiert!');
      return;
    }
    try {
      loaderWin.document.write('<title>Carol wird gestartet…</title><body style="background:#05080c;color:#00ffcc;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;"><div style="text-align:center;"><div style="font-size:22px;letter-spacing:2px;">ARASAKA SYS //</div><div style="margin-top:12px;opacity:0.7;">Lade Carol für ' + escapeHtml(stockId) + '…</div></div></body>');
    } catch(e) {}
    google.script.run.withSuccessHandler(function(res) {
      if(res && res.success && res.carolUrl) {
        loaderWin.location.href = nbCarolAutoUrl(res.carolUrl);
        registerCarolWindow(loaderWin);
      } else {
        try { loaderWin.close(); } catch(e) {}
        showErr('Carol-Link für ' + stockId + ' nicht gefunden!');

  function pzExtractKeysFromContext(stock, text) {
    var keys = [];
    var seen = {};
    function add(v) {
      var k = String(v || '').toUpperCase().replace(/\s+/g, '');
      if(k.length >= 4 && !seen[k]) { seen[k] = true; keys.push(k); }
    }
    add(normalizeStockInput(stock));
    var t = String(text || '');
    var n4 = t.match(/N4P\s?\d{4,}/gi) || [];
    for(var i = 0; i < n4.length; i++) add(n4[i]);
    var nums = t.match(/\b\d{6,}\b/g) || [];
    for(var j = 0; j < nums.length; j++) add(nums[j]);
    return keys;
  }

  function copyNbValue(event, value) {
    if(event) { event.stopPropagation(); event.preventDefault(); }
    var el = event ? event.currentTarget : null;
    function showCopied() {
      if(!el) return;
      var orig = el.innerText;
      var origBg = el.style.background;
      var origBorder = el.style.borderColor;
      el.innerText = '✓ Kopiert!';
      el.style.background = 'rgba(63,185,80,0.18)';
      el.style.borderColor = '#3fb950';
      setTimeout(function() { el.innerText = orig; el.style.background = origBg; el.style.borderColor = origBorder; }, 1200);
    }
    if(navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(value).then(showCopied).catch(function() {
        fallbackCopy(value);
        showCopied();
      });
    } else {
      fallbackCopy(value);
      showCopied();
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

    var typedInitials = document.getElementById('dymoInitials').value.trim();

      var dymoCtx = requireDymoLabelPrinter();
      if (!dymoCtx.ok) return;
      printDymoLabelToPrinter(stockId, initials, qty, dymoCtx.printerName, dymoCtx.variant);

  document.getElementById('nbSearchInput').addEventListener('input', function() {
    var search = normalizeStockInput(this.value);
    closeNbAutocomplete();
    if(!search) {
      nbFilteredEntries = nbAllEntries;
      renderNbTable(nbAllEntries);
      return;
    }
    var matches = [];
    var seen = {};
    for(var i = 0; i < nbAllEntries.length; i++) {
      var sid = normalizeStockInput(nbAllEntries[i].stockId);
      var artNr = normalizeStockInput(nbAllEntries[i].artikel || "");
      var matchVal = sid.indexOf(search) !== -1 ? sid : (artNr.indexOf(search) !== -1 ? artNr : null);
      if(matchVal && !seen[matchVal]) {
        matches.push(matchVal);
        seen[matchVal] = true;
        if(matches.length >= 20) break;
      }
    }
    if(matches.length > 0) {
      var list = document.getElementById('nbAutocompleteList');
      list.innerHTML = matches.map(function(m) {

  function renderReifenAutocomplete(value) {

    if(!search || !cachedReifenStockIds.length) return;
    var matches = [];
    for(var i = 0; i < cachedReifenStockIds.length; i++) {
      if(cachedReifenStockIds[i].id.indexOf(search) !== -1) {
        matches.push(cachedReifenStockIds[i]);

    if(!matches.length) return;
    list.innerHTML = matches.map(function(item) {
      var itemClass = 'reifen-autocomplete-item';
      var statusHtml = '';
      if(item.status === 'ja') {
        itemClass += ' booked-ja';
        statusHtml = '<span class="reifen-autocomplete-status status-ja">JA</span>';
      }
      return '<div class="' + itemClass + '" data-value="' + escapeHtml(item.id) + '"><span>' + escapeHtml(item.id).replace(search, '<span class="reifen-autocomplete-hit">' + search + '</span>') + '</span>' + statusHtml + '</div>';
    }).join('');
    list.style.display = 'block';

  function syncReifenAutocompletePool() {
    ensureReifenHudShape();
    var byTab = reifenHudCache.stocksByTab || {};
    var tabs = (reifenHudCache.tabs && reifenHudCache.tabs.length) ? reifenHudCache.tabs : Object.keys(byTab);
    var out = [];
    var seen = {};
    for (var t = 0; t < tabs.length; t++) {
      var list = byTab[tabs[t]] || [];
      for (var i = 0; i < list.length; i++) {
        var entry = list[i];
        var id = entry && entry.id !== undefined ? String(entry.id) : String(entry || '');
        if (!id || seen[id]) continue;
        seen[id] = true;
        out.push(entry);
      }
    }
    cachedReifenStockIds = out;
  }

  function loadStockIdsForTab(tabName, onDone) {
    if (!tabName) {
      cachedReifenStockIds = [];

    if (reifenHudCache.stocksByTab[tabName]) {
      cachedReifenStockIds = reifenHudCache.stocksByTab[tabName];
      if (typeof onDone === 'function') onDone();
      return;
    }
    google.script.run
      .withSuccessHandler(function(res) {
        var ids = (res && res.success && res.ids) ? res.ids : [];
        reifenHudCache.stocksByTab[tabName] = ids;
        cachedReifenStockIds = ids;
        if (typeof onDone === 'function') onDone();
      })
      .withFailureHandler(function() {
        reifenHudCache.stocksByTab[tabName] = [];
        cachedReifenStockIds = [];
        if (typeof onDone === 'function') onDone();
      })
      .getAvailableReifenStockIds(tabName);

  function loadReifenHudCache(onDone, opts) {
    opts = opts || {};
    var showOverlay = !!opts.showOverlay;
    var prefetch = !!opts.prefetch;
    if (prefetch && reifenHudCache && reifenHudCache.tabs && reifenHudCache.tabs.length) {
      if (typeof onDone === 'function') onDone(true);
      return;
    }
    if (reifenHudCacheLoading) {
      if (showOverlay) setReifenModalBusy(true);
      if (typeof onDone === 'function') onDone(false);
      return;
    }
    reifenHudCacheLoading = true;
    ensureReifenHudShape();
    reifenHudCache.paketdienstRows = [];
    if (showOverlay) setReifenModalBusy(true, 'Lade Tabellen & Stock-IDs (heute + 7 Tage)…');
    google.script.run
      .withSuccessHandler(function(res) {
        reifenHudCacheLoading = false;
        setReifenModalBusy(false);
        if (!res || !res.success) {
          updateReifenCacheHud(false);
          if (!prefetch) document.getElementById('reifenTabSelect').innerHTML = '<option value="">Fehler beim Laden</option>';
          if (typeof onDone === 'function') onDone(false);
          return;
        }
        ensureReifenHudShape();
        reifenHudCache.tabs = res.tabs || [];
        reifenHudCache.stocksByTab = res.stocksByTab || {};
        reifenHudCache.version = res.version || Date.now();
        if (!reifenHudCache.tabs.length) {
          reifenHudCache.paketdienstRows = [];
          if (!prefetch) {
            document.getElementById('reifenTabSelect').innerHTML = '<option value="">Keine Blätter (8 Tage)</option>';
            setReifenStatus('Kein Blatt im Zeitfenster (heute + 7 Tage zurück, Datum im Namen).', '#F27420');
          }
          cachedReifenStockIds = [];
          updateReifenCacheHud(true);
          if (typeof onDone === 'function') onDone(true);
          return;
        }
        var tabs = reifenHudCache.tabs;
        var selected = currentReifenTab && tabs.indexOf(currentReifenTab) !== -1 ? currentReifenTab : tabs[0];
        currentReifenTab = selected;
        localStorage.setItem('arasaka_reifen_tab', selected);
        applyReifenHudCacheToUi();
        updateReifenCacheHud(true);
        if (!prefetch) {
          finalizeReifenModalIfOpen();
        } else {
          finalizeReifenModalIfOpen(true);
        }
        if (typeof onDone === 'function') onDone(true);
        google.script.run
          .withSuccessHandler(function(pres) {
            if (pres && pres.success && reifenHudCache) {
              reifenHudCache.paketdienstRows = pres.paketdienstRows || [];
              reifenHudCache.paketVersion = pres.version || Date.now();
            }
          })
          .withFailureHandler(function() {})
          .getPaketdienstReifenCachePayload();
      })
      .withFailureHandler(function() {
        reifenHudCacheLoading = false;
        setReifenModalBusy(false);
        updateReifenCacheHud(false);
        if (!prefetch) document.getElementById('reifenTabSelect').innerHTML = '<option value="">Fehler beim Laden</option>';
        if (typeof onDone === 'function') onDone(false);
      })
      .getReifenWindowStocksCachePayload();
  }

  function applyVasoldWssSyncToModal(res, updateStatus) {
    var sb = document.getElementById('wssSubmitBtn');

      hints.push('Frontscheibe in Vasold ist bereits „Ja“. Gummileiste über den grünen Button in Vasold speichern.');
    } else if (!res.frontscheibeJa && res.gummileisteDa) {
      hints.push('Gummileiste in Vasold ist bereits gesetzt.');

    if (hints.length && st && updateStatus !== false) {
      st.textContent = hints.join(' ');

  function extractHuDateOnlyFromNachuntersuchungSegmentClient(segment) {
    var s = String(segment || "").trim();
    if (!s) return "";
    var mNum = s.match(/(\d{1,2}\.\s*\d{1,2}\.\s*\d{2,4})/);
    if (mNum) {
      var p = mNum[1].match(/(\d{1,2})\s*\.\s*(\d{1,2})\s*\.\s*(\d{2,4})/);
      if (p) return p[1] + "." + p[2] + "." + p[3];
    }
    var reDotMo = /(\d{1,2}\.\s*(?:Jan|Feb|Mär|Mrz|Apr|Mai|Jun|Jul|Aug|Sep|Okt|Nov|Dez|Januar|Februar|März|April|Juni|Juli|September|Oktober|November|Dezember)[a-zä]*\.?\s*\d{4})/i;
    var mDot = s.match(reDotMo);
    if (mDot) return mDot[1].replace(/\s+/g, " ").trim();
    var reSpMo = /(\d{1,2}\s+(?:Jan|Feb|Mär|Mrz|Apr|Mai|Jun|Jul|Aug|Sep|Okt|Nov|Dez|Januar|Februar|März|April|Juni|Juli|September|Oktober|November|Dezember)[a-zä]*\.?\s*\d{4})/i;
    var mSp = s.match(reSpMo);
    if (mSp) return mSp[1].replace(/\s+/g, " ").trim();
    return "";
  }

  function huVasoldValueFromSchaedenTextClient(wText) {
    var dash = "---------------";
    var m = String(wText || "").match(/Nachuntersuchung\s*bis\s*:\s*([^\n\r]+)/i);
    if (!m) return dash;
    var rest = String(m[1] || "").trim();
    if (!rest) return dash;
    var dateOnly = extractHuDateOnlyFromNachuntersuchungSegmentClient(rest);
    if (!dateOnly) return dash;
    return dateOnly;
  }

  function parseReifenSizeQueryParts(query) {
    query = String(query || "").trim();
    var queryParts = query.replace(/\s+/g, ' ').split(' ');
    var sizeQuery = "";
    var lastQuery = "";
    var gwQuery = "";
    for (var q = 0; q < queryParts.length; q++) {
      var p = queryParts[q];
      if (p.indexOf('/') !== -1 || /^r\d+/i.test(p) || /^\d{3}\//.test(p)) {
        sizeQuery += (sizeQuery ? " " : "") + p;
      } else if (/^\d{2,3}$/.test(p) && !lastQuery) {
        lastQuery = p;
      } else if (/^[A-Za-z]{1,2}$/.test(p) && !gwQuery) {
        gwQuery = p.toUpperCase();
      } else {
        sizeQuery += (sizeQuery ? " " : "") + p;
      }
    }
    if (!sizeQuery) sizeQuery = query;
    var sizeNorm = sizeQuery.replace(/\s+/g, '').toUpperCase();
    return { sizeNorm: sizeNorm, lastQuery: lastQuery, gwQuery: gwQuery };
  }

  function filterPaketdienstRowsLocal(rows, query) {
    query = String(query || "").trim();
    if (query.length < 3) return [];
    var parts = parseReifenSizeQueryParts(query);
    var qStock = normalizeStockIdJs(query);
    var out = [];
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var sid = normalizeStockIdJs(r.stockId || "");
      if (qStock && sid.indexOf(qStock) !== -1) {
        out.push(r);
        continue;
      }
      var cellGroesseNorm = String(r.groesse || "").replace(/\s+/g, '').toUpperCase();
      if (parts.sizeNorm && cellGroesseNorm.indexOf(parts.sizeNorm) === -1) continue;
      var cellLast = String(r.lastindex || "").trim();
      var cellGw = String(r.gwIndex || "").trim();
      if (parts.lastQuery && cellLast.indexOf(parts.lastQuery) === -1) continue;
      if (parts.gwQuery && cellGw.toUpperCase().indexOf(parts.gwQuery) === -1) continue;
      out.push(r);
    }
    return out;
  }

      tireSearchResults = list || [];

      var local = filterPaketdienstRowsLocal(reifenHudCache.paketdienstRows, query);

    statusEl.innerHTML = '<span class="hud-load-inline hud-load-inline--compact"><span class="hud-spin hud-spin--sm"></span><span class="hud-load-label">' + escapeHtml('Suche "' + query + '" (Paketdienst-Cache leer, Server…)') + '</span></span>';
    resultsEl.style.display = 'none';
    badge.style.display = 'none';
    google.script.run.withSuccessHandler(function(res) {
      if(!res.success) {
        statusEl.style.color = '#f85149';
        statusEl.innerText = res.message || 'Fehler';
        return;
      }

    }).withFailureHandler(function(err) {

      statusEl.innerText = 'Serverfehler: ' + (err.message || String(err));
    }).searchReifenBySize(query);
  }

  function reifenTodayKey() {
    var d = new Date();
    return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
  }

  function loadReifenBatch() {
    var today = reifenTodayKey();
    try {
      var raw = localStorage.getItem('arasaka_reifen_batch');
      var obj = raw ? JSON.parse(raw) : null;
      if (obj && obj.date === today && obj.items && obj.items.length !== undefined) {
        reifenBatch = obj;
        for (var mi = 0; mi < reifenBatch.items.length; mi++) {
          var mit = reifenBatch.items[mi];
          if (!mit.mengeExpected) mit.mengeExpected = 2;
          if (mit.tyresScanned === undefined || mit.tyresScanned === null) {
            mit.tyresScanned = normalizeReifenMengeExpected(mit.mengeExpected);
          }
        }
      } else {
        reifenBatch = { date: today, items: [] };
        saveReifenBatch();
      }
    } catch (e) {
      reifenBatch = { date: today, items: [] };
    }
  }

  function saveReifenBatch() {
    try { localStorage.setItem('arasaka_reifen_batch', JSON.stringify(reifenBatch)); } catch (e) {}
  }

  function findReifenBatchItem(stockId, tab) {
    if (!reifenBatch || !reifenBatch.items) return null;
    var sid = normalizeStockIdJs(stockId);
    for (var i = 0; i < reifenBatch.items.length; i++) {
      var it = reifenBatch.items[i];
      if (normalizeStockIdJs(it.stockId) === sid && (!tab || it.tab === tab)) return it;
    }
    return null;
  }

  function normalizeReifenMengeExpected(val) {
    var n = parseInt(val, 10);
    if (isNaN(n) || n < 1) return 2;
    return n;
  }

  function reifenTyresComplete(item) {
    if (!item) return false;
    var expected = normalizeReifenMengeExpected(item.mengeExpected);
    var scanned = parseInt(item.tyresScanned, 10) || 0;
    return scanned >= expected;
  }

  function upsertReifenBatchItem(data) {
    if (!reifenBatch || !reifenBatch.items) loadReifenBatch();
    var item = findReifenBatchItem(data.stockId, data.tab);
    if (item) {
      if (data.groesseRaw && !item.groesseRaw) item.groesseRaw = data.groesseRaw;
      if (data.sizeCanon && !item.sizeCanon) item.sizeCanon = data.sizeCanon;
      if (data.lastindex && !item.lastindex) item.lastindex = data.lastindex;
      if (data.gwindex && !item.gwindex) item.gwindex = data.gwindex;
      if (data.mengeExpected) item.mengeExpected = normalizeReifenMengeExpected(data.mengeExpected);
      if (data.incrementTyre) {
        var maxExpected = normalizeReifenMengeExpected(item.mengeExpected);
        item.tyresScanned = Math.min(maxExpected, (parseInt(item.tyresScanned, 10) || 0) + 1);
      }
    } else {
      var mengeExpected = normalizeReifenMengeExpected(data.mengeExpected);
      item = {
        stockId: data.stockId, tab: data.tab,
        groesseRaw: data.groesseRaw || '', sizeCanon: data.sizeCanon || '',
        lastindex: data.lastindex || '', gwindex: data.gwindex || '',
        mengeExpected: mengeExpected,
        tyresScanned: data.incrementTyre ? 1 : 0,
        beleg: '', paketTotal: 0, packetsSeen: [], deliveredSize: '', sizeMismatch: false,
        addedAt: Date.now()
      };
      reifenBatch.items.push(item);
    }
    saveReifenBatch();
    renderReifenBatchList();
    return item;
  }

  function reifenBatchItemIncomplete(item) {
    if (!item) return false;

    if (item.sizeMismatch) return true;
    if (item.paketTotal && (item.packetsSeen || []).length < item.paketTotal) return true;

  function renderReifenBatchList() {
    var panel = document.getElementById('reifenBatchPanel');
