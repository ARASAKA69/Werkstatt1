    function downloadBridgeFile(url, filename) {
      fetch(url, { mode: 'cors', cache: 'no-store' }).then(function(r) {
        if(!r.ok) throw new Error('bad');
        return r.blob();
      }).then(function(blob) {
        var href = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = href;
        a.download = filename;
        a.style.position = 'fixed';
        a.style.left = '-9999px';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function() { URL.revokeObjectURL(href); }, 5000);
      }).catch(function() {
        var w = window.open(url, '_blank', 'noopener,noreferrer');
        if(!w) window.location.href = url;
      });
    }
    function setBridgeHelpVisible(show) {
      var box = document.getElementById('bridgeHelpBox');
      if(!box) return;
      var standalone = document.body && document.body.classList.contains('wms-standalone');
      box.hidden = !standalone || !show;
    }
    function initBrotherPrinter() {
      var sel = document.getElementById('brotherPrinterSelect');
      var dot = document.getElementById('bridgeStatusDot');
      var txt = document.getElementById('bridgeStatusText');
      fetch(BRIDGE_URL + '/printers').then(function(r) {
        if(!r.ok) throw new Error('bridge http');
        return r.json();
      }).then(function(data) {
        if(!data.success || !data.printers || !data.printers.length) throw new Error('no printers');
        setBridgeHelpVisible(false);
        dot.style.background = '#56d364';
        txt.textContent = 'Online';
        sel.innerHTML = '';
        var saved = localStorage.getItem('arasaka_brother_printer') || '';
        data.printers.forEach(function(p) {
          var opt = document.createElement('option');
          opt.value = p; opt.textContent = p;
          if(p === saved) opt.selected = true;
          sel.appendChild(opt);
        });
        if(!saved && sel.value) {
          localStorage.setItem('arasaka_brother_printer', sel.value);
          setBridgePrinter(sel.value);
        }
        if(saved) setBridgePrinter(saved);
      }).catch(function() {
        dot.style.background = '#f85149';
        txt.textContent = 'Offline - Bridge starten!';
        sel.innerHTML = '<option value="">Bridge nicht verbunden</option>';
        setBridgeHelpVisible(true);
      });
      sel.addEventListener('change', function() {
        localStorage.setItem('arasaka_brother_printer', sel.value);
        setBridgePrinter(sel.value);
      });
    }
    function setBridgePrinter(name) {
      fetch(BRIDGE_URL + '/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ printer: name })
      }).catch(function(){});
    }
    initBrotherPrinter();

    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if(e.key === 'Enter') loadData();
    });

    function formatShelfDdLabelHtml(raw) {
      var s = String(raw == null ? '' : raw);
      var m = s.match(/^(.*?)(\((?:AKTUELL )?(\d+|\?)\/(\d+|\?)\))$/);
      if(m) {
        var frac = m[2];
        var nStr = m[3];
        var dStr = m[4];
        var mod = ' shelf-dd-count--open';
        if(nStr !== '?' && dStr !== '?') {
          var n = parseInt(nStr, 10);
          var d = parseInt(dStr, 10);
          if(d > 0 && n === d) mod = ' shelf-dd-count--full';
        }
        return escapeHtml(m[1]) + '<span class="shelf-dd-count' + mod + '">' + escapeHtml(frac) + '</span>';
      }
      return escapeHtml(s);
    }

    function syncShelfTriggerFromNative() {
      var sel = document.getElementById('shelfSelect');
      var t = document.getElementById('shelfDdTriggerText');
      if(!sel || !t) return;
      var opt = sel.options[sel.selectedIndex];
      t.innerHTML = opt ? formatShelfDdLabelHtml(opt.text) : '';
    }

    function closeShelfDd() {
      var wrap = document.getElementById('shelfDdWrap');
      var panel = document.getElementById('shelfDdPanel');
      var trig = document.getElementById('shelfDdTrigger');
      if(!wrap || !panel) return;
      wrap.classList.remove('open');
      panel.hidden = true;
      shelfDropdownOpen = false;
      if(trig) trig.setAttribute('aria-expanded', 'false');
    }

    function openShelfDd() {
      var wrap = document.getElementById('shelfDdWrap');
      var panel = document.getElementById('shelfDdPanel');
      var trig = document.getElementById('shelfDdTrigger');
      if(!wrap || !panel) return;
      rebuildShelfCustomOptions();
      wrap.classList.add('open');
      panel.hidden = false;
      shelfDropdownOpen = true;
      if(trig) trig.setAttribute('aria-expanded', 'true');
    }

    function rebuildShelfCustomOptions() {
      var sel = document.getElementById('shelfSelect');
      var scroll = document.getElementById('shelfDdScroll');
      if(!sel || !scroll) return;
      var val = sel.value;
      scroll.innerHTML = '';
      for(var i = 0; i < sel.options.length; i++) {
        var opt = sel.options[i];
        var div = document.createElement('div');
        div.className = 'shelf-dd-item' + (opt.value === val ? ' is-selected' : '');
        div.setAttribute('role', 'option');
        div.setAttribute('data-value', opt.value);
        div.innerHTML = formatShelfDdLabelHtml(opt.text);
        div.addEventListener('click', function(ev) {
          ev.stopPropagation();
          var v = this.getAttribute('data-value');
          sel.value = v;
          syncShelfTriggerFromNative();
          closeShelfDd();
          sel.dispatchEvent(new Event('change', { bubbles: true }));
        });
        scroll.appendChild(div);
      }
      syncShelfTriggerFromNative();
    }

    var shelfSelectEl = document.getElementById('shelfSelect');
    var shelfDdTriggerEl = document.getElementById('shelfDdTrigger');
    if(shelfDdTriggerEl) {
      shelfDdTriggerEl.addEventListener('click', function(e) {
        e.stopPropagation();
        var wrap = document.getElementById('shelfDdWrap');
        if(wrap && wrap.classList.contains('open')) closeShelfDd();
        else openShelfDd();
      });
    }
    shelfSelectEl.addEventListener('change', function() {
      syncShelfTriggerFromNative();
      applyTageslisteShelfUi((this.dataset.serverRegal || '').trim());
    });
    new MutationObserver(function() {
      syncShelfTriggerFromNative();
      var wrap = document.getElementById('shelfDdWrap');
      if(wrap && wrap.classList.contains('open')) rebuildShelfCustomOptions();
    }).observe(shelfSelectEl, { childList: true, subtree: true });
    syncShelfTriggerFromNative();

    function compareRegalShelfNames(nameA, nameB) {
      var mA = String(nameA || '').match(/^Regal\s+(\d+)\.(\d+)$/i);
      var mB = String(nameB || '').match(/^Regal\s+(\d+)\.(\d+)$/i);
      if (mA && mB) {
        var x1 = parseInt(mA[1], 10);
        var x2 = parseInt(mA[2], 10);
        var y1 = parseInt(mB[1], 10);
        var y2 = parseInt(mB[2], 10);
        if (x1 !== y1) return x1 - y1;
        return x2 - y2;
      }
      if (mA && !mB) return -1;
      if (!mA && mB) return 1;
      return String(nameA || '').localeCompare(String(nameB || ''), 'de');
    }

    function forEachShelfMapKeySorted(shelfMap, fn) {
      var keys = [];
      var k;
      for (k in shelfMap) {
        if (Object.prototype.hasOwnProperty.call(shelfMap, k)) keys.push(k);
      }
      keys.sort(compareRegalShelfNames);
      for (var i = 0; i < keys.length; i++) {
        fn(keys[i], shelfMap[keys[i]]);
      }
    }

    function startShelfRefresh() {
      stopShelfRefresh();
      shelfRefreshTimer = setInterval(refreshShelfCounts, 2000);
    }

    function stopShelfRefresh() {
      if(shelfRefreshTimer) { clearInterval(shelfRefreshTimer); shelfRefreshTimer = null; }
    }

    function isRegalTagesliste(regal) {
      return String(regal || '').trim().toLowerCase() === 'tagesliste';
    }

    function applyTageslisteShelfUi(regal) {
      var sel = document.getElementById('shelfSelect');
      var pill = document.getElementById('currentShelfLabel');
      var wrap = document.getElementById('shelfDdWrap');
      if(!sel || !pill || !wrap) return;
      if(isRegalTagesliste(regal)) {
        pill.style.display = 'none';
        if(sel.value === 'Tagesliste') wrap.classList.add('shelf-dd-tagesliste');
        else wrap.classList.remove('shelf-dd-tagesliste');
      } else {
        wrap.classList.remove('shelf-dd-tagesliste');
        pill.style.display = '';
      }
    }

    function refreshShelfCounts() {
      if(!currentStock || shelfDropdownOpen) return;
      function applyShelfMapFromCounts(shelfMap) {
        if(shelfDropdownOpen) return;
        var sel = document.getElementById('shelfSelect');
        var currentVal = sel.value;
        var serverRegal = (sel.dataset.serverRegal || '').trim();
        var currentRegal = serverRegal;
        if(!currentRegal) {
          var labTxt = document.getElementById('currentShelfLabel').innerText.trim();
          currentRegal = labTxt.indexOf('Aktuell: ') === 0 ? labTxt.replace('Aktuell: ', '').trim() : labTxt;
        }
        sel.innerHTML = '';
        if(isRegalTagesliste(currentRegal)) {
          sel.innerHTML = '<option value="Tagesliste">Tagesliste</option>';
          forEachShelfMapKeySorted(shelfMap, function(name, cnt) {
            if(cnt < 5) {
              sel.innerHTML += '<option value="' + name + '">' + name + ' (' + cnt + '/5)</option>';
            }
          });
          document.getElementById('currentShelfCountBadge').style.display = 'none';
          var restoredSel = false;
          if(currentVal) {
            for(var ci = 0; ci < sel.options.length; ci++) {
              if(sel.options[ci].value === currentVal) {
                sel.value = currentVal;
                restoredSel = true;
                break;
              }
            }
          }
          if(!restoredSel && isRegalTagesliste(serverRegal)) sel.value = 'Tagesliste';
          applyTageslisteShelfUi(serverRegal);
          return;
        }
        if(currentRegal && currentRegal !== '-' && currentRegal !== 'LEER') {
          var cnt = shelfMap[currentRegal] !== undefined ? shelfMap[currentRegal] : '?';
          sel.innerHTML += '<option value="' + currentRegal + '">' + currentRegal + ' (AKTUELL ' + cnt + '/5)</option>';
        } else {
          sel.innerHTML = '<option value="">-- FREIES REGAL WÄHLEN --</option>';
        }
        forEachShelfMapKeySorted(shelfMap, function(name, cnt) {
          if(name !== currentRegal && cnt < 5) {
            sel.innerHTML += '<option value="' + name + '">' + name + ' (' + cnt + '/5)</option>';
          }
        });
        if(currentVal) sel.value = currentVal;
        applyTageslisteShelfUi(currentRegal);
        var badge = document.getElementById('currentShelfCountBadge');
        if(currentRegal && currentRegal !== '-' && currentRegal !== 'LEER' && shelfMap[currentRegal] !== undefined) {
          var c = shelfMap[currentRegal];
          badge.style.display = 'inline-flex';
          badge.innerText = 'In ' + currentRegal + ' ' + (c === 1 ? 'ist' : 'sind') + ' ' + c + ' ' + (c === 1 ? 'Kiste' : 'Kisten');
        }
      }
      if (refurbCache && refurbCache.counts) {
        applyShelfMapFromCounts(refurbCache.counts);
        return;
      }
      google.script.run.withSuccessHandler(function(res) {
        if(!res.success || shelfDropdownOpen) return;
        var shelfMap = {};
        for(var i = 0; i < res.shelves.length; i++) {
          shelfMap[res.shelves[i].name] = res.shelves[i].count;
        }
        applyShelfMapFromCounts(shelfMap);
      }).getShelfCounts();
    }

    function stepQty(inputId, delta) {
      var inp = document.getElementById(inputId);
      if(!inp) return;
      var val = parseInt(inp.value, 10);
      if(isNaN(val)) val = 0;
      val = Math.max(0, val + delta);
      inp.value = val;
    }

    function setStatus(msg, color) {
      var el = document.getElementById('globalStatus');
      el.innerText = msg;
      el.style.color = color || "#3FA0DB";
    }

    function setHudBusy(active, message) {
      var el = document.getElementById('hudBusyOverlay');
      var tx = document.getElementById('hudBusyText');
      if(!el) return;
      if(active) {
        el.classList.add('open');
        el.setAttribute('aria-hidden', 'false');
        if(tx) tx.textContent = message || '';
      } else {
        el.classList.remove('open');
        el.setAttribute('aria-hidden', 'true');
        if(tx) tx.textContent = '';
      }
    }

    function hudLoadingRowHtml(colspan, message) {
      return '<tr><td colspan="' + colspan + '" class="hud-load-cell"><div class="hud-load-inline"><span class="hud-spin hud-spin--sm"></span><span class="hud-load-label">' + escapeHtml(message) + '</span></div></td></tr>';
    }

    function toggleUI(enabled) {
      var grid = document.getElementById('mainGrid');
      if(enabled) {
        grid.classList.remove('overlay-block');
        setHudBusy(false);
      } else {
        grid.classList.add('overlay-block');
        stopShelfRefresh();
      }
    }
    toggleUI(false);

    var ovAllEntries = [];
    var ovSessionActive = false;
    var ovOverviewReady = false;
    var menuPanelPrefetchBusy = false;

    function getOverviewDoneMap() {
      try { return JSON.parse(localStorage.getItem('arasaka_overview_done') || '{}'); } catch(e) { return {}; }
    }
    function saveOverviewDoneMap(map) {
      localStorage.setItem('arasaka_overview_done', JSON.stringify(map));
    }

    function getOverviewSessionButton() {
      if(document.body && document.body.classList.contains('wms-standalone')) {
        return document.querySelector('.wms-nav-inline--standalone .wms-menuitem.topbar-action[onclick*="openStockOverview"]');
      }
      return document.querySelector('.wms-nav-inline--overlay .topbar-action[onclick*="openStockOverview"]') || document.querySelector('.topbar-action[onclick*="openStockOverview"]');
    }

    function minimizeStockOverview() {
      document.getElementById('overviewModal').classList.remove('open');
      var btn = getOverviewSessionButton();
      if(btn && ovSessionActive && ovAllEntries.length > 0) {
        btn.style.background = 'rgba(61,158,220,0.18)';
        btn.style.borderColor = '#3FA0DB';
        btn.style.color = '#3FA0DB';
      }
    }

    function closeStockOverview() {
      document.getElementById('overviewModal').classList.remove('open');
      ovAllEntries = [];
      ovSessionActive = false;
      ovOverviewReady = false;
      var btn = getOverviewSessionButton();
      if(btn) { btn.style.background = ''; btn.style.borderColor = ''; btn.style.color = ''; }
    }

    function refreshStockOverview() {
      ovSessionActive = false;
      ovAllEntries = [];
      ovOverviewReady = false;
      openStockOverview();
    }

    function toggleOverviewDone(index, stockId, cb) {
      if(!cb) return;
      var map = getOverviewDoneMap();
      if(cb.checked) { map[stockId] = true; } else { delete map[stockId]; }
      saveOverviewDoneMap(map);
      var row = cb.closest('tr');
      if(row) { if(cb.checked) row.classList.add('ov-row-done'); else row.classList.remove('ov-row-done'); }
    }

    function getStatusStyle(status) {
      var n = String(status || "").trim().toLowerCase();
      if(n === "herausgegeben") return "color:#56d364;background:rgba(46,160,67,0.14);border-color:rgba(86,211,100,0.2);";
      if(n === "teilweise angeliefert") return "color:#F27420;background:rgba(242,116,32,0.14);border-color:rgba(242,116,32,0.2);";
      return "color:#9da7b3;";
    }

    function getReifenStyle(value) {
      var n = String(value || "").trim().toLowerCase().replace(/\s+/g, '');
      if(n === "werkstatt1") return "color:#56d364;font-weight:800;";
      if(n === "reifennichtvorhanden") return "color:#f85149;font-weight:800;";
      return "color:#d0d7de;";
    }

    function formatOverviewComment(text, compareText) {
      var s = String(text || "");
      if(!s.trim()) return '<span style="color:#6e7681;">-</span>';
      var matchedWords = getMatchedWords(compareText || "", s);
      return applyWordHighlightsToHtml(escapeHtml(s).replace(/\n/g, '<br>'), matchedWords);
    }

    function renderStockOverview(entries) {
      var body = document.getElementById('overviewTableBody');
      if(!entries || !entries.length) {
        body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#9da7b3;padding:18px;">Keine Einträge gefunden.</td></tr>';
        return;
      }
      var doneMap = getOverviewDoneMap();
      var html = '';
      for(var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var isDone = !!doneMap[e.stockId];
        var statusStyle = getStatusStyle(e.status);
        var reifenStyle = getReifenStyle(e.regalReifen);
        var bestellHtml = formatOverviewComment(e.kommBestellung, e.kommAnlieferung);
        var anlieferHtml = formatOverviewComment(e.kommAnlieferung, e.kommBestellung);
        html += '<tr class="ov-row' + (isDone ? ' ov-row-done' : '') + '" onclick="toggleOverviewEntry(' + i + ')">'  
          + '<td class="ov-check-cell" onclick="event.stopPropagation();"><input type="checkbox"' + (isDone ? ' checked' : '') + ' onchange="toggleOverviewDone(' + i + ',\'' + escapeJs(e.stockId) + '\',this)"></td>'
          + '<td style="color:#F27420;font-weight:800;width:24px;" id="ov-chev-' + i + '">▶</td>'
          + '<td style="color:#3FA0DB;font-weight:800;">' + escapeHtml(e.stockId) + '</td>'
          + '<td style="color:#E88435;font-weight:700;">' + escapeHtml(e.regal) + '</td>'
          + '<td><span style="padding:4px 10px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;' + statusStyle + '">' + escapeHtml(e.status || 'Offen') + '</span></td>'
          + '<td><span style="' + reifenStyle + '">' + escapeHtml(e.regalReifen || '-') + '</span></td>'
          + '<td style="text-align:right;white-space:nowrap;"><button type="button" onclick="copyOverviewStock(event,\'' + escapeJs(e.stockId) + '\')" style="background:rgba(255,255,255,0.04);color:#c9d1d9;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800;cursor:pointer;margin-right:6px;">📋 Copy</button><button type="button" onclick="openOverviewStock(event,\'' + escapeJs(e.stockId) + '\')" style="background:rgba(61,158,220,0.12);color:#3FA0DB;border:1px solid rgba(61,158,220,0.2);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800;cursor:pointer;">Im WMS öffnen</button></td>'
          + '</tr>';
        html += '<tr class="ov-detail" id="ov-detail-' + i + '">'
          + '<td colspan="7">'
          + '<div class="ov-detail-inner">'
          + '<div class="ov-detail-box"><div class="ov-detail-lbl">Ersatzteile Bestellung</div><div class="ov-detail-val">' + bestellHtml + '</div></div>'
          + '<div class="ov-detail-box"><div class="ov-detail-lbl">Ersatzteile Anlieferung</div><div class="ov-detail-val">' + anlieferHtml + '</div></div>'
          + '<div class="ov-detail-box"><div class="ov-detail-lbl">Regal Reifen</div><div class="ov-detail-val"><span style="' + reifenStyle + '">' + escapeHtml(e.regalReifen || '-') + '</span></div></div>'
          + '</div>'
          + '</td>'
          + '</tr>';
      }
      body.innerHTML = html;
    }

    function toggleOverviewEntry(index) {
      var detail = document.getElementById('ov-detail-' + index);
      var chev = document.getElementById('ov-chev-' + index);
      if(!detail) return;
      if(detail.classList.contains('open')) {
        detail.classList.remove('open');
        if(chev) chev.innerText = '▶';
      } else {
        detail.classList.add('open');
        if(chev) chev.innerText = '▼';
      }
    }

    function copyOverviewStock(event, stockId) {
      if(event) { event.stopPropagation(); event.preventDefault(); }
      navigator.clipboard.writeText(stockId).catch(function() {});
      var btn = event ? event.target : null;
      if(btn) { var orig = btn.innerText; btn.innerText = '✅ Kopiert'; setTimeout(function() { btn.innerText = orig; }, 1200); }
    }

    function openOverviewStock(event, stockId) {
      if(event) { event.stopPropagation(); event.preventDefault(); }
      minimizeStockOverview();
      document.getElementById('searchInput').value = stockId;
      loadData();
    }

    function openStockOverview() {
      var modal = document.getElementById('overviewModal');
      var body = document.getElementById('overviewTableBody');
      modal.classList.add('open');
      if(ovSessionActive && ovOverviewReady) {
        renderStockOverview(ovAllEntries);
        return;
      }
      ovSessionActive = true;
      body.innerHTML = hudLoadingRowHtml(7, 'Lade Übersicht…');
      google.script.run.withSuccessHandler(function(res) {
        if(!res.success) {
          body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#f85149;padding:18px;">Fehler: ' + escapeHtml(res.message || 'Unbekannter Fehler') + '</td></tr>';
          return;
        }
        var entries = res.entries || [];
        ovAllEntries = entries;
        ovOverviewReady = true;
        var count = entries.length;
        var kistenWord = count === 1 ? "Kiste" : "Kisten";
        document.getElementById('overviewTotalBadge').innerText = "Insgesamt: " + count + " " + kistenWord + " im Lager";
        renderStockOverview(entries);
      }).getStockRegalOverview();
    }

    function normalizeStockInput(value) {
      return String(value || "").replace(/\s+/g, '').toUpperCase();
    }

    function escapeJs(text) {
      return String(text || "").replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    var raAllEntries = [];
    var raSessionActive = false;

    function updateRaBadge() {
      var offen = 0, done = 0;
      for(var i = 0; i < raAllEntries.length; i++) {
        if(raAllEntries[i].gestellt) done++; else offen++;
      }
      var badge = document.getElementById('raTotalBadge');
      if(offen === 0 && done > 0) {
        badge.className = 'ra-total-badge ra-total-complete';
        badge.innerText = '✅ Alle ' + done + ' gestellt';
      } else {
        badge.className = 'ra-total-badge ra-total-mixed';
        badge.innerText = offen + ' offen / ' + done + ' gestellt';
      }
      document.getElementById('raAlleBtn').disabled = (offen === 0);
    }

      document.getElementById('raModal').classList.remove('open');
      var btn = document.querySelector('.topbar-action[onclick*="openRaModal"]');
      if(btn && raAllEntries.length > 0) {
        btn.style.background = 'rgba(61,158,220,0.18)';
        btn.style.borderColor = '#3FA0DB';
        btn.style.color = '#3FA0DB';
      }

    function refreshRaModal() {
      raSessionActive = false;
      raAllEntries = [];
      raDataReady = false;
      document.getElementById('raTableBody').innerHTML = hudLoadingRowHtml(4, 'Lade Reifenausgabe…');
      var raB = document.getElementById('raTotalBadge');
      raB.className = 'ra-total-badge ra-total-loading';
      raB.innerHTML = '<span class="hud-spin hud-spin--sm"></span><span>Lade…</span>';

      google.script.run.withSuccessHandler(function(res) {
        if(!res.success) {
          document.getElementById('raTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:#f85149;padding:18px;">Fehler: ' + escapeHtml(res.message) + '</td></tr>';

    function renderRaTable(entries) {
      var body = document.getElementById('raTableBody');
      if(!entries || !entries.length) {
        body.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#9da7b3;padding:18px;">Keine Reifen für heute/morgen gefunden.</td></tr>';
        return;
      }
      var today = new Date();
      today.setHours(0,0,0,0);
      var todayStr = (today.getDate() < 10 ? '0' : '') + today.getDate() + '.' + ((today.getMonth()+1) < 10 ? '0' : '') + (today.getMonth()+1) + '.' + today.getFullYear();
      var html = '';
      for(var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var isToday = e.date === todayStr;
        var dateClass = isToday ? 'ra-date-today' : 'ra-date-tomorrow';
        var dateLabel = isToday ? e.date + ' (Heute)' : e.date + ' (Morgen)';
        var reifenBadge = e.amount === 4 ? 'ra-badge-4' : 'ra-badge-2';
        var rowClass = e.gestellt ? 'ra-row-gestellt' : '';
        var statusClass = e.gestellt ? 'ra-status-btn ra-status-gestellt' : 'ra-status-btn ra-status-offen';
        var statusLabel = e.gestellt ? '✅ gestellt' : '⏳ noch zu stellen';
        html += '<tr class="' + rowClass + '" id="ra-row-' + i + '">'
          + '<td class="ra-col-date ' + dateClass + '">' + escapeHtml(dateLabel) + '</td>'
          + '<td class="ra-col-stock ra-cell-stock">' + escapeHtml(e.stockId) + '</td>'
          + '<td class="ra-col-qty"><span class="' + reifenBadge + '">' + e.amount + ' Reifen</span></td>'
          + '<td class="ra-col-status"><button type="button" class="' + statusClass + '" id="ra-status-' + i + '" onclick="toggleRaStatus(' + i + ')">' + statusLabel + '</button></td>'
          + '</tr>';
      }
      body.innerHTML = html;
    }

    function toggleRaStatus(index) {
      var e = raAllEntries[index];
      if(!e) return;
      var btn = document.getElementById('ra-status-' + index);
      if(btn) { btn.disabled = true; btn.innerText = '⏳ ...'; }
      var newGestellt = !e.gestellt;
      var newValue = newGestellt ? (e.amount + ' gestellt') : (e.amount + ' Reifen');
      google.script.run.withSuccessHandler(function(res) {
        if(res.success) {
          e.gestellt = newGestellt;
          e.reifen = newValue;
          updateRaBadge();
          renderRaTable(raAllEntries);
        } else {
          if(btn) { btn.disabled = false; btn.innerText = e.gestellt ? '✅ gestellt' : '⏳ noch zu stellen'; }
          var rb = document.getElementById('raTotalBadge');
          rb.className = 'ra-total-badge ra-total-error';
          rb.innerText = 'Fehler: ' + (res.message || '?');
        }
      }).withFailureHandler(function(err) {
        if(btn) { btn.disabled = false; btn.innerText = e.gestellt ? '✅ gestellt' : '⏳ noch zu stellen'; }
      }).updateReifenGestellt(e.row, e.reifenCol, newValue);
    }

    function stelleAlleReifenHud() {
      var offen = [];
      for(var i = 0; i < raAllEntries.length; i++) {
        if(!raAllEntries[i].gestellt) offen.push(raAllEntries[i]);
      }
      if(offen.length === 0) return;
      var alleBtn = document.getElementById('raAlleBtn');
      alleBtn.disabled = true;
      alleBtn.innerText = '⏳ Stelle ' + offen.length + ' Reifen...';
      var payload = offen.map(function(e) { return { row: e.row, reifenCol: e.reifenCol, amount: e.amount, gestellt: false }; });
      google.script.run.withSuccessHandler(function(res) {
        if(res.success) {
          alleBtn.innerText = '✅ ' + res.message;
          setTimeout(function() { refreshRaModal(); }, 1500);
        } else {
          alleBtn.innerText = '❌ ' + (res.message || 'Fehler');
          alleBtn.disabled = false;
        }
      }).withFailureHandler(function(err) {
        alleBtn.innerText = '❌ Fehler';
        alleBtn.disabled = false;
      }).stelleAlleReifen(payload);
    }

    function buildRaHtml(offen, dateHeader) {
      var rows = '';
      for(var j = 0; j < offen.length; j++) {
        var e = offen[j];
        rows += '<tr>'
          + '<td>' + (j+1) + '</td>'
          + '<td>' + escapeHtml(e.date) + '</td>'
          + '<td>' + escapeHtml(e.stockId) + '</td>'
          + '<td style="text-align:center;font-weight:700;">' + e.amount + '</td>'
          + '<td style="width:60px;"></td>'
          + '</tr>';
      }
      return '<!DOCTYPE html><html><head><title>Reifenausgabe ' + dateHeader + '</title>'
        + '<style>'
        + 'body{font-family:Arial,sans-serif;margin:20px;color:#111;}'
        + 'h2{margin:0 0 4px 0;font-size:18px;}'
        + '.sub{color:#555;font-size:12px;margin-bottom:14px;}'
        + 'table{width:100%;border-collapse:collapse;font-size:13px;}'
        + 'th,td{border:1px solid #999;padding:6px 10px;text-align:left;}'
        + 'th{background:#eee;font-weight:700;}'
        + 'tr:nth-child(even){background:#f7f7f7;}'
        + '@media print{body{margin:10px;}@page{size:A4 portrait;margin:12mm;}}'
        + '</style></head><body>'
        + '<h2>Reifenausgabe \u2014 ' + dateHeader + '</h2>'
        + '<div class="sub">' + offen.length + ' Reifen noch zu stellen</div>'
        + '<table><thead><tr><th>#</th><th>Datum</th><th>Stock-ID</th><th>Anzahl</th><th>\u2713</th></tr></thead>'
        + '<tbody>' + rows + '</tbody></table>'
        + '</body></html>';
    }

    function printRaFallback(html) {
      var w = window.open('', '_blank');
      w.document.write(html + '<script>window.print();<\/script>');
      w.document.close();
    }

    function printRaList() {
      var offen = [];
      for(var i = 0; i < raAllEntries.length; i++) {
        if(!raAllEntries[i].gestellt) offen.push(raAllEntries[i]);
      }
      if(offen.length === 0) { alert('Keine offenen Reifen zum Drucken.'); return; }
      var today = new Date();
      var dateHeader = (today.getDate()<10?'0':'') + today.getDate() + '.' + ((today.getMonth()+1)<10?'0':'') + (today.getMonth()+1) + '.' + today.getFullYear();
      var html = buildRaHtml(offen, dateHeader);

      var btn = document.querySelector('.ra-btn-print');
      if(btn) { btn.disabled = true; btn.textContent = '⏳ Drucke...'; }

      fetch(BRIDGE_URL + '/print-html', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ html: html })
      }).then(function(r) { return r.json(); }).then(function(data) {
        if(data.success) {
          if(btn) { btn.textContent = '✅ Gedruckt!'; setTimeout(function(){ btn.disabled = false; btn.textContent = '🖨️ Drucken'; }, 2000); }
        } else {
          throw new Error(data.error || 'Bridge error');
        }
      }).catch(function() {
        if(btn) { btn.disabled = false; btn.textContent = '🖨️ Drucken'; }
        printRaFallback(html);
      });
    }

    var NB_STATUS_OPTIONS = ["bestellt", "nicht bestellt", "teilweise angeliefert", "Angeliefert/Bereit für Tagesliste", "Fahrzeug RR", "Rückstand", "nicht genehmigt"];

    function getNbTypStyle(typ) {
      var t = String(typ || "").toLowerCase();
      if(t.indexOf("exit") !== -1) return "border-left:4px solid #f85149;";
      if(t.indexOf("mechanik") !== -1) return "border-left:4px solid #3FA0DB;";
      if(t.indexOf("q-check") !== -1 || t.indexOf("qcheck") !== -1) return "border-left:4px solid #F27420;";
      if(t.indexOf("verschwunden") !== -1) return "border-left:4px solid #e3935b;";
      if(t.indexOf("falsch") !== -1) return "border-left:4px solid #d972b0;";
      if(t.indexOf("aufgenommen") !== -1 || t.indexOf("entry") !== -1) return "border-left:4px solid #a371f7;";
      if(t.indexOf("lack") !== -1) return "border-left:4px solid #39d0d8;";
      if(t.indexOf("defekt") !== -1) return "border-left:4px solid #e09040;";
      return "border-left:4px solid #303b47;";
    }

    function getNbTypColor(typ) {
      var t = String(typ || "").toLowerCase();
      if(t.indexOf("exit") !== -1) return "color:#f85149;font-weight:800;";
      if(t.indexOf("mechanik") !== -1) return "color:#3FA0DB;font-weight:800;";
      if(t.indexOf("q-check") !== -1 || t.indexOf("qcheck") !== -1) return "color:#F27420;font-weight:800;";
      if(t.indexOf("verschwunden") !== -1) return "color:#e3935b;font-weight:800;";
      if(t.indexOf("falsch") !== -1) return "color:#d972b0;font-weight:800;";
      if(t.indexOf("aufgenommen") !== -1 || t.indexOf("entry") !== -1) return "color:#a371f7;font-weight:800;";
      if(t.indexOf("lack") !== -1) return "color:#39d0d8;font-weight:800;";
      if(t.indexOf("defekt") !== -1) return "color:#e09040;font-weight:800;";
      return "";
    }

    function getNbStatusClass(status) {
      var s = String(status || '').toLowerCase();
      if(s === 'nicht bestellt') return 'nb-box-status-red';
      if(s === 'bestellt') return 'nb-box-status-yellow';
      if(s === 'teilweise angeliefert') return 'nb-box-status-yellow';
      if(s.indexOf('angeliefert') !== -1) return 'nb-box-status-green';
      return '';
    }

    function nbNormalizeRegalCountKey(val) {
      var s = String(val || "").trim().replace(/,/g, ".");
      if(!s) return "";
      var m = s.match(/^regal\s+(\d+)\s*\.\s*(\d+)$/i);
      if(m) return "Regal " + parseInt(m[1], 10) + "." + parseInt(m[2], 10);
      m = s.match(/^(\d+)\s*\.\s*(\d+)$/);
      if(m) {
        var a = parseInt(m[1], 10);
        var b = parseInt(m[2], 10);
        if(a >= 1 && a <= 9 && b >= 1 && b <= 8) return "Regal " + a + "." + b;
      }
      return "";
    }

    function nbLagerortOptionsMatch(stored, optVal) {
      var a = String(stored || "").trim();
      var b = String(optVal || "").trim();
      if(a.toLowerCase() === b.toLowerCase()) return true;
      var ka = nbNormalizeRegalCountKey(a);
      var kb = nbNormalizeRegalCountKey(b);
      return ka !== "" && kb !== "" && ka === kb;
    }

    function buildNbRegalOptions(selectedRaw, optionsList) {
      var list = optionsList;
      if(!list || !list.length) {
        list = ["Tagesliste"];
        for(var ri = 1; ri <= 5; ri++) {
          for(var rj = 1; rj <= 8; rj++) {
            list.push(ri + "." + rj);
          }
        }
        list.push("LACK");
        list.push("Exit");
      }
      var html = '<option value="">—</option>';
      for(var k = 0; k < list.length; k++) {
        var opt = list[k];
        var optStr = String(opt != null ? opt : "").trim();
        if(!optStr) continue;
        var sel = nbLagerortOptionsMatch(selectedRaw, optStr) ? ' selected' : '';
        var label = optStr;
        if(/^(\d+)\.(\d+)$/.test(optStr)) label = 'Regal ' + optStr;
        html += '<option value="' + escapeHtml(optStr) + '"' + sel + '>' + escapeHtml(label) + '</option>';
      }
      return html;
    }

    function buildNbStatusSelect(index, currentStatus, sheetRow) {
      var html = '<select class="nb-edit-input" onchange="saveNbStatus(event,' + sheetRow + ',this.value,' + index + ')" onclick="event.stopPropagation();">';
      var found = false;
      for(var s = 0; s < NB_STATUS_OPTIONS.length; s++) {
        var opt = NB_STATUS_OPTIONS[s];
        var sel = opt.toLowerCase() === String(currentStatus || "").toLowerCase() ? ' selected' : '';
        if(sel) found = true;
        html += '<option value="' + escapeHtml(opt) + '"' + sel + '>' + escapeHtml(opt) + '</option>';
      }
      if(!found && currentStatus) {
        html = '<option value="' + escapeHtml(currentStatus) + '" selected>' + escapeHtml(currentStatus) + '</option>' + html.replace('<select ', '').replace('>', '');
        html = '<select class="nb-edit-input" onchange="saveNbStatus(event,' + sheetRow + ',this.value,' + index + ')" onclick="event.stopPropagation();">' + '<option value="' + escapeHtml(currentStatus) + '" selected>' + escapeHtml(currentStatus) + '</option>';
        for(var s2 = 0; s2 < NB_STATUS_OPTIONS.length; s2++) {
          html += '<option value="' + escapeHtml(NB_STATUS_OPTIONS[s2]) + '">' + escapeHtml(NB_STATUS_OPTIONS[s2]) + '</option>';
        }
        html += '</select>';
      } else {
        html += '</select>';
      }
      return html;
    }

          + '</tr>';

        html += '<tr class="nb-detail" id="nb-detail-' + i + '">'
          + '<td colspan="8">'
          + '<div class="nb-detail-inner">'
          + '<div class="nb-detail-box"><div class="nb-detail-lbl">Beschreibung</div>'
          +   '<div class="nb-detail-val">' + escapeHtml(e.teil || '-') + '</div>'
          + '</div>'

          + '</div>'

    function loadNbVasoldForDetail(index) {

    function applyNbVasoldUi(index, res) {
      var loading = document.getElementById('nb-vasold-loading-' + index);
      var bodyEl = document.getElementById('nb-vasold-body-' + index);
      var wssCb = document.getElementById('nb-vasold-wss-' + index);
      var gummiCb = document.getElementById('nb-vasold-gummi-' + index);
      var gRow = document.getElementById('nb-vasold-gummi-row-' + index);
      var btn = document.getElementById('nb-vasold-btn-' + index);
      var msgEl = document.getElementById('nb-vasold-msg-' + index);
      if(loading) loading.style.display = 'none';
      if(bodyEl) bodyEl.style.display = '';
      if(!wssCb) return;
      var gummiVisible = !!(gRow && gRow.style.display !== 'none');
      if(!res || !res.success) {
        wssCb.disabled = false;
        wssCb.checked = false;
        if(gummiCb && gummiVisible) {
          gummiCb.disabled = false;
          gummiCb.checked = false;
        }
        if(btn) btn.disabled = false;
        if(msgEl) {
          msgEl.textContent = (res && res.message) ? res.message : 'Vasold-Status konnte nicht geladen werden.';
          msgEl.style.color = '#f85149';
        }
        return;
      }
      if(res.frontscheibeJa) {
        wssCb.disabled = true;
        wssCb.checked = true;
      } else {
        wssCb.disabled = false;
        wssCb.checked = false;
      }
      if(gummiCb && gummiVisible) {
        if(res.gummileisteDa) {
          gummiCb.disabled = true;
          gummiCb.checked = true;
        } else {
          gummiCb.disabled = false;
          gummiCb.checked = false;
        }
      }
      var allSynced = !!res.frontscheibeJa && (!gummiVisible || !!res.gummileisteDa);
      if(btn) btn.disabled = allSynced;
      if(allSynced && msgEl && !String(msgEl.textContent || '').trim()) {
        msgEl.textContent = 'Bereits vollständig in Vasold erfasst.';
        msgEl.style.color = '#9da7b3';
      }
    }

    function submitNbVasold(event, index) {
      if(event) { event.stopPropagation(); event.preventDefault(); }
      var ent = nbDisplayEntries[index];
      if(!ent) return;
      var wssCb = document.getElementById('nb-vasold-wss-' + index);
      var gummiCb = document.getElementById('nb-vasold-gummi-' + index);
      var gRow = document.getElementById('nb-vasold-gummi-row-' + index);
      var gummiVisible = !!(gRow && gRow.style.display !== 'none');
      var wantWss = !!(wssCb && wssCb.checked && !wssCb.disabled);
      var wantGummi = !!(gummiVisible && gummiCb && gummiCb.checked && !gummiCb.disabled);
      var msgEl = document.getElementById('nb-vasold-msg-' + index);
      var btn = document.getElementById('nb-vasold-btn-' + index);
      if(!wantWss && !wantGummi) {
        if(msgEl) msgEl.textContent = 'Bitte mindestens eine Option wählen, die noch nicht in Vasold steht.';
        return;
      }
      if(btn) btn.disabled = true;
      if(msgEl) msgEl.innerHTML = '<span class="hud-spin hud-spin--sm"></span> Speichern…';
      google.script.run.withSuccessHandler(function(res) {
        if(res.success) {
          if(msgEl) {
            msgEl.textContent = res.message || 'OK';
            msgEl.style.color = res.skipped ? '#9da7b3' : '#56d364';
          }
          google.script.run.withSuccessHandler(function(sync) {
            if(btn) btn.disabled = false;
            applyNbVasoldUi(index, sync);
          }).withFailureHandler(function(err) {
            if(btn) btn.disabled = false;
            if(msgEl) {
              msgEl.textContent = 'Vasold OK, Status lesen fehlgeschlagen: ' + (err.message || String(err));
              msgEl.style.color = '#e3935b';
            }
          }).getVasoldWssSyncState(ent.stockId);
        } else {
          if(btn) btn.disabled = false;
          if(msgEl) {
            msgEl.textContent = res.message || 'Fehler';
            msgEl.style.color = '#f85149';
          }
        }
      }).withFailureHandler(function(err) {
        if(btn) btn.disabled = false;
        if(msgEl) {
          msgEl.textContent = 'Fehler: ' + (err.message || String(err));
          msgEl.style.color = '#f85149';
        }
      }).processNachbestellVasoldWss(ent.stockId, wantWss, wantGummi);
    }

    function copyNbValue(event, value) {
      if(event) { event.stopPropagation(); event.preventDefault(); }
      var el = event ? event.currentTarget : null;
      function showCopied() {
        if(!el) return;
        var orig = el.innerText;
        var origBg = el.style.background;
        var origBorder = el.style.borderColor;
        el.innerText = '✓ Kopiert!';
        el.style.background = 'rgba(63,185,80,0.18)';
        el.style.borderColor = '#3fb950';
        setTimeout(function() { el.innerText = orig; el.style.background = origBg; el.style.borderColor = origBorder; }, 1200);
      }
      if(navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(value).then(showCopied).catch(function() {
          fallbackCopy(value);
          showCopied();
        });
      } else {
        fallbackCopy(value);
        showCopied();
      }
    }

    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    function closeNbAutocomplete() {
      var list = document.getElementById('nbAutocompleteList');
      list.innerHTML = '';
      list.style.display = 'none';
    }

    document.getElementById('nbSearchInput').addEventListener('input', function() {
      var search = normalizeStockInput(this.value);
      closeNbAutocomplete();
      if(!search) {
        nbFilteredEntries = nbAllEntries;
        renderNbTable(nbAllEntries);
        return;
      }
      var matches = [];
      var seen = {};
      for(var i = 0; i < nbAllEntries.length; i++) {
        var sid = normalizeStockInput(nbAllEntries[i].stockId);
        var artNr = normalizeStockInput(nbAllEntries[i].artikel || "");
        var matchVal = sid.indexOf(search) !== -1 ? sid : (artNr.indexOf(search) !== -1 ? artNr : null);
        if(matchVal && !seen[matchVal]) {
          matches.push(matchVal);
          seen[matchVal] = true;
          if(matches.length >= 20) break;
        }
      }
      if(matches.length > 0) {
        var list = document.getElementById('nbAutocompleteList');
        list.innerHTML = matches.map(function(m) {
          return '<div class="nb-autocomplete-item" data-value="' + escapeHtml(m) + '">' + escapeHtml(m).replace(search, '<span style="color:#3FA0DB;">' + search + '</span>') + '</div>';
        }).join('');
        list.style.display = 'block';
        Array.prototype.forEach.call(list.children, function(node) {
          node.addEventListener('click', function() {
            document.getElementById('nbSearchInput').value = this.getAttribute('data-value');
            closeNbAutocomplete();
            filterNbBySearch();
          });
        });
      }
      filterNbBySearch();
    });

    document.getElementById('nbSearchInput').addEventListener('keypress', function(e) {
      if(e.key === 'Enter') { closeNbAutocomplete(); filterNbBySearch(); }
    });

    document.addEventListener('click', function(e) {
      if(!e.target.closest('.nb-search-wrap')) closeNbAutocomplete();
    });

    function filterNbBySearch() {
      var search = normalizeStockInput(document.getElementById('nbSearchInput').value);
      if(!search) {
        nbFilteredEntries = nbAllEntries;
      } else {
        nbFilteredEntries = nbAllEntries.filter(function(e) {
          return normalizeStockInput(e.stockId).indexOf(search) !== -1
            || normalizeStockInput(e.artikel || "").indexOf(search) !== -1;
        });
      }
      renderNbTable(nbFilteredEntries);
    }

    function renderReifenAutocomplete(value) {
      var list = document.getElementById('reifenAutocompleteList');
      var search = normalizeStockInput(value);
      closeReifenAutocomplete();
      if(!search || !cachedReifenStockIds.length) return;
      var matches = [];
      for(var i = 0; i < cachedReifenStockIds.length; i++) {
        if(cachedReifenStockIds[i].id.indexOf(search) !== -1) {
          matches.push(cachedReifenStockIds[i]);
          if(matches.length >= 30) break;
        }
      }
      if(!matches.length) return;
      list.innerHTML = matches.map(function(item) {
        var itemClass = 'reifen-autocomplete-item';
        var statusHtml = '';
        if(item.status === 'ja') {
          itemClass += ' booked-ja';
          statusHtml = '<span class="reifen-autocomplete-status status-ja">JA</span>';
        }
        return '<div class="' + itemClass + '" data-value="' + escapeHtml(item.id) + '"><span>' + escapeHtml(item.id).replace(search, '<span class="reifen-autocomplete-hit">' + search + '</span>') + '</span>' + statusHtml + '</div>';
      }).join('');
      list.style.display = 'block';
      Array.prototype.forEach.call(list.children, function(node) {
        node.addEventListener('click', function() {

    function loadReifenHudCache(onDone, opts) {
      opts = opts || {};
      var showOverlay = !!opts.showOverlay;
      var prefetch = !!opts.prefetch;
      if (prefetch && reifenHudCache && reifenHudCache.tabs && reifenHudCache.tabs.length) {
        if (typeof onDone === 'function') onDone(true);
        return;
      }
      if (reifenHudCacheLoading) {
        if (showOverlay) setReifenModalBusy(true);
        if (typeof onDone === 'function') onDone(false);
        return;
      }
      reifenHudCacheLoading = true;
      ensureReifenHudShape();
      reifenHudCache.paketdienstRows = [];
      if (showOverlay) setReifenModalBusy(true, 'Lade Tabellen & Stock-IDs (heute + 7 Tage)…');
      google.script.run
        .withSuccessHandler(function(res) {
          reifenHudCacheLoading = false;
          if (showOverlay) setReifenModalBusy(false);
          if (!res || !res.success) {
            updateReifenCacheHud(false);
            if (!prefetch) document.getElementById('reifenTabSelect').innerHTML = '<option value="">Fehler beim Laden</option>';
            if (typeof onDone === 'function') onDone(false);
            return;
          }
          ensureReifenHudShape();
          reifenHudCache.tabs = res.tabs || [];
          reifenHudCache.stocksByTab = res.stocksByTab || {};
          reifenHudCache.version = res.version || Date.now();
          if (!reifenHudCache.tabs.length) {
            reifenHudCache.paketdienstRows = [];
            if (!prefetch) {
              document.getElementById('reifenTabSelect').innerHTML = '<option value="">Keine Blätter (8 Tage)</option>';
              setReifenStatus('Kein Blatt im Zeitfenster (heute + 7 Tage zurück, Datum im Namen).', '#F27420');
            }
            cachedReifenStockIds = [];
            updateReifenCacheHud(true);
            if (typeof onDone === 'function') onDone(true);
            return;
          }
          var tabs = reifenHudCache.tabs;
          var selected = currentReifenTab && tabs.indexOf(currentReifenTab) !== -1 ? currentReifenTab : tabs[0];
          currentReifenTab = selected;
          localStorage.setItem('arasaka_reifen_tab', selected);
          applyReifenHudCacheToUi();
          updateReifenCacheHud(true);
          if (!prefetch) {
            setReifenStatus("Tab '" + currentReifenTab + "' gewählt. Jetzt Stock-ID scannen.", "#3FA0DB");
            reifenStockInput.focus();
          }
          if (typeof onDone === 'function') onDone(true);
          google.script.run
            .withSuccessHandler(function(pres) {
              if (pres && pres.success && reifenHudCache) {
                reifenHudCache.paketdienstRows = pres.paketdienstRows || [];
                reifenHudCache.paketVersion = pres.version || Date.now();
              }
            })
            .withFailureHandler(function() {})
            .getPaketdienstReifenCachePayload();
        })
        .withFailureHandler(function() {
          reifenHudCacheLoading = false;
          if (showOverlay) setReifenModalBusy(false);
          updateReifenCacheHud(false);
          if (!prefetch) document.getElementById('reifenTabSelect').innerHTML = '<option value="">Fehler beim Laden</option>';
          if (typeof onDone === 'function') onDone(false);
        })
        .getReifenWindowStocksCachePayload();
    }

    function extractHuDateOnlyFromNachuntersuchungSegmentClient(segment) {
      var s = String(segment || "").trim();
      if (!s) return "";
      var mNum = s.match(/(\d{1,2}\.\s*\d{1,2}\.\s*\d{2,4})/);
      if (mNum) {
        var p = mNum[1].match(/(\d{1,2})\s*\.\s*(\d{1,2})\s*\.\s*(\d{2,4})/);
        if (p) return p[1] + "." + p[2] + "." + p[3];
      }
      var reDotMo = /(\d{1,2}\.\s*(?:Jan|Feb|Mär|Mrz|Apr|Mai|Jun|Jul|Aug|Sep|Okt|Nov|Dez|Januar|Februar|März|April|Juni|Juli|September|Oktober|November|Dezember)[a-zä]*\.?\s*\d{4})/i;
      var mDot = s.match(reDotMo);
      if (mDot) return mDot[1].replace(/\s+/g, " ").trim();
      var reSpMo = /(\d{1,2}\s+(?:Jan|Feb|Mär|Mrz|Apr|Mai|Jun|Jul|Aug|Sep|Okt|Nov|Dez|Januar|Februar|März|April|Juni|Juli|September|Oktober|November|Dezember)[a-zä]*\.?\s*\d{4})/i;
      var mSp = s.match(reSpMo);
      if (mSp) return mSp[1].replace(/\s+/g, " ").trim();
      return "";
    }

    function huVasoldValueFromSchaedenTextClient(wText) {
      var dash = "---------------";
      var m = String(wText || "").match(/Nachuntersuchung\s*bis\s*:\s*([^\n\r]+)/i);
      if (!m) return dash;
      var rest = String(m[1] || "").trim();
      if (!rest) return dash;
      var dateOnly = extractHuDateOnlyFromNachuntersuchungSegmentClient(rest);
      if (!dateOnly) return dash;
      return dateOnly;
    }

    function parseReifenSizeQueryParts(query) {
      query = String(query || "").trim();
      var queryParts = query.replace(/\s+/g, ' ').split(' ');
      var sizeQuery = "";
      var lastQuery = "";
      var gwQuery = "";
      for (var q = 0; q < queryParts.length; q++) {
        var p = queryParts[q];
        if (p.indexOf('/') !== -1 || /^r\d+/i.test(p) || /^\d{3}\//.test(p)) {
          sizeQuery += (sizeQuery ? " " : "") + p;
        } else if (/^\d{2,3}$/.test(p) && !lastQuery) {
          lastQuery = p;
        } else if (/^[A-Za-z]{1,2}$/.test(p) && !gwQuery) {
          gwQuery = p.toUpperCase();
        } else {
          sizeQuery += (sizeQuery ? " " : "") + p;
        }
      }
      if (!sizeQuery) sizeQuery = query;
      var sizeNorm = sizeQuery.replace(/\s+/g, '').toUpperCase();
      return { sizeNorm: sizeNorm, lastQuery: lastQuery, gwQuery: gwQuery };
    }

    function filterPaketdienstRowsLocal(rows, query) {
      query = String(query || "").trim();
      if (query.length < 3) return [];
      var parts = parseReifenSizeQueryParts(query);
      var qStock = normalizeStockIdJs(query);
      var out = [];
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        var sid = normalizeStockIdJs(r.stockId || "");
        if (qStock && sid.indexOf(qStock) !== -1) {
          out.push(r);
          continue;
        }
        var cellGroesseNorm = String(r.groesse || "").replace(/\s+/g, '').toUpperCase();
        if (parts.sizeNorm && cellGroesseNorm.indexOf(parts.sizeNorm) === -1) continue;
        var cellLast = String(r.lastindex || "").trim();
        var cellGw = String(r.gwIndex || "").trim();
        if (parts.lastQuery && cellLast.indexOf(parts.lastQuery) === -1) continue;
        if (parts.gwQuery && cellGw.toUpperCase().indexOf(parts.gwQuery) === -1) continue;
        out.push(r);
      }
      return out;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeMatchWord(word) {
      return String(word || "").toLowerCase();
    }

    function isHighlightableWord(word) {
      var normalized = normalizeMatchWord(word);
      if (forcedGreenWords[normalized]) return true;
      return normalized.length >= 4 && !ignoredHighlightWords[normalized] && !/^\d+$/.test(normalized);
    }

    function extractWords(text) {
      return String(text || "").match(/[A-Za-z0-9ÄÖÜäöüß]+/g) || [];
    }

    function getMatchedWords(schaedenText, commentText) {
      var schaedenWords = {};
      var matched = {};
      extractWords(schaedenText).forEach(function(word) {
        if(isHighlightableWord(word)) {
          schaedenWords[normalizeMatchWord(word)] = true;
        }
      });
      extractWords(commentText).forEach(function(word) {
        var key = normalizeMatchWord(word);
        if(isHighlightableWord(word) && schaedenWords[key]) matched[key] = true;
      });
      return matched;
    }

    function commentHasWssDaMarker() {
      return /wss\s+da\b/i.test(getCommentText());
    }

    function applyWordHighlightsToHtml(html, matchedWords) {
      return html.split(/(<[^>]+>)/g).map(function(part) {
        if(part.indexOf('<') === 0) return part;
        return part.replace(/[A-Za-z0-9ÄÖÜäöüß]+/g, function(word) {
          var normalized = normalizeMatchWord(word);
          if(normalized === 'wss') {
            if(/wss\s*ers/i.test(currentSchaedenText || '')) {
              return commentHasWssDaMarker()
                ? '<span class="highlight-green">' + word + '</span>'
                : '<span class="highlight-red">' + word + '</span>';
            }
            return '<span class="highlight-green">' + word + '</span>';
          }
          if(forcedGreenWords[normalized]) return '<span class="highlight-green">' + word + '</span>';
          return isHighlightableWord(word) && matchedWords[normalized] ? '<span class="highlight-green">' + word + '</span>' : word;
        });
      }).join('');
    }

    function getCommentText() {
      return commentEditor.innerText.replace(/\r/g, '');
    }

    function setCommentText(text) {
      commentEditor.textContent = text || "";
      refreshCrossHighlights(false);
    }

    function getCaretOffset(element) {
      var selection = window.getSelection();
      if (!selection.rangeCount) return 0;
      var range = selection.getRangeAt(0);
      var preRange = range.cloneRange();
      preRange.selectNodeContents(element);
      preRange.setEnd(range.endContainer, range.endOffset);
      return preRange.toString().length;
    }

    function setCaretOffset(element, offset) {
      var selection = window.getSelection();
      var range = document.createRange();
      var stack = [element];
      var node;
      var remaining = offset;

      while (stack.length) {
        node = stack.pop();
        if (node.nodeType === 3) {
          var textLength = node.textContent.length;
          if (remaining <= textLength) {
            range.setStart(node, remaining);
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);
            return;
          }
          remaining -= textLength;
        } else {
          for (var i = node.childNodes.length - 1; i >= 0; i--) {
            stack.push(node.childNodes[i]);
          }
        }
      }

      range.selectNodeContents(element);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function renderCommentEditor(text, matchedWords, preserveCaret) {
      var caretOffset = preserveCaret ? getCaretOffset(commentEditor) : 0;
      var html = escapeHtml(text || "").replace(/\n/g, '<br>');
      commentEditor.innerHTML = applyWordHighlightsToHtml(html, matchedWords);
      if(!text) commentEditor.innerHTML = "";
      if(preserveCaret) setCaretOffset(commentEditor, caretOffset);
    }

    function refreshCrossHighlights(preserveCaret) {
      var commentText = getCommentText();
      var matchedWords = getMatchedWords(currentBestellungText, commentText);
      document.getElementById('infoSchaeden').innerHTML = formatSchaeden(currentSchaedenText);
      document.getElementById('infoBestellung').innerHTML = formatBestellung(currentBestellungText, matchedWords);
      renderCommentEditor(commentText, matchedWords, preserveCaret);
    }

    function formatSchaeden(text) {
      if(!text || !text.trim()) return "-";
      var reifenHighlight = function(s) {
        var html = escapeHtml(s);
        html = html.replace(/(Reifen VA ersetzen|Reifen HA ersetzen|Reifen \(2\) ersetzen|Reifen \(4\) ersetzen)/gi, '<span class="highlight-red">$1</span>');
        return html;
      };
      var parts = text.split(/\n+/).map(function(p) { return p.trim(); }).filter(Boolean);
      if(parts.length <= 1) {
        parts = text.split(/\s{2,}/).map(function(p) { return p.trim(); }).filter(Boolean);
      }
      if(parts.length <= 1) {
        return reifenHighlight(text);
      }
      var html = '<ul>';
      parts.forEach(function(p) {
        html += '<li>' + reifenHighlight(p) + '</li>';
      });
      html += '</ul>';
      return html;
    }

    function formatBestellung(text, matchedWords) {
      if(!text || !text.trim()) return "-";
      var parts = text.split(/\n+/).map(function(p) { return p.trim(); }).filter(Boolean);
      if(parts.length <= 1) {
        return applyWordHighlightsToHtml(
          escapeHtml(text).replace(/(Reifen Seng)/gi, '<span class="highlight-red">$1</span>'),
          matchedWords || {}
        );
      }
      var html = '<ul>';
      parts.forEach(function(p) {
        html += '<li>' + applyWordHighlightsToHtml(
          escapeHtml(p).replace(/(Reifen Seng)/gi, '<span class="highlight-red">$1</span>'),
          matchedWords || {}
        ) + '</li>';
      });
      html += '</ul>';
      return html;
    }

    function isStockIdFormat(val) {
      return /^[A-Z]{2}\d{3,}/i.test(val.replace(/\s+/g, ''));
    }

    function normalizeStockIdJs(value) {
      return String(value || '').replace(/\s+/g, '').toUpperCase();
    }

    function cellMatchesStockIdJs(cellVal, stockId) {
      var cv = normalizeStockIdJs(cellVal);
      var sid = normalizeStockIdJs(stockId);
      return sid !== '' && cv === sid;
    }

    function normalizeRegalKeyForCountClient(val) {
      if (val === '' || val == null) return '';
      if (typeof val === 'number' && isFinite(val)) {
        var a = Math.floor(val);
        var rest = val - a;
        var b = Math.round(rest * 10 + 1e-6);
        if (a >= 1 && a <= 9 && b >= 1 && b <= 8) return 'Regal ' + a + '.' + b;
        return '';
      }
      var s = String(val || '').trim().replace(/,/g, '.');
      if (!s) return '';
      var low = s.toLowerCase();
      if (low === 'tagesliste' || low === 'lack' || low === 'exit') return '';
      var m = s.match(/^regal\s+(\d+)\s*\.\s*(\d+)$/i);
      if (m) return 'Regal ' + parseInt(m[1], 10) + '.' + parseInt(m[2], 10);
      m = s.match(/^(\d+)\s*\.\s*(\d+)$/);
      if (m) {
        var a2 = parseInt(m[1], 10);
        var b2 = parseInt(m[2], 10);
        if (a2 >= 1 && a2 <= 9 && b2 >= 1 && b2 <= 8) return 'Regal ' + a2 + '.' + b2;
      }
      return '';
    }

    function computeWmsFromCache(stockId, cache) {
      if (!cache || !cache.rows || !cache.counts) return null;
      var sid = normalizeStockIdJs(stockId);
      if (!sid) return { success: false, message: 'Keine Stock-ID' };
      var rows = cache.rows;
      var counts = cache.counts;
      var hitIdx = -1;
      for (var s = 0; s < rows.length; s++) {
        if (cellMatchesStockIdJs(rows[s][0], sid)) {
          hitIdx = s;
          break;
        }
      }
      var availableShelves = [];
      for (var shelf in counts) {
        if (Object.prototype.hasOwnProperty.call(counts, shelf) && counts[shelf] < 5) {
          availableShelves.push({ name: shelf, count: counts[shelf] });
        }
      }
      var result = { success: false, freeShelves: availableShelves };
      if (hitIdx >= 0) {
        var rowData = rows[hitIdx];
        result.success = true;
        result.carolUrl = String(rowData[1] || '');
        result.schaeden = String(rowData[2] || '');
        result.kommBestellung = String(rowData[3] || '');
        result.kommAnlieferung = String(rowData[4] || '');
        result.status = String(rowData[5] || '');
        result.regal = String(rowData[6] || '');
        result.reifenStatus = String(rowData[7] || '');
        result.markeModel = String(rowData[8] || '');
        var curKey = normalizeRegalKeyForCountClient(result.regal);
        result.currentShelfCount = (curKey && Object.prototype.hasOwnProperty.call(counts, curKey)) ? counts[curKey] : (counts[result.regal] || 0);
        result.currentShelfCapacity = 5;
      } else {
        result.message = 'Stock-ID in Refurbisment List nicht gefunden!';
      }
      return result;
    }

    function searchByOrderNumberFromCache(query, cache) {
      if (!cache || !cache.rows || !cache.rows.length) return null;
      query = String(query || '').replace(/\s+/g, '').toUpperCase();
      if (!query) return { found: false, message: 'Keine Suchanfrage' };
      var cleanQuery = query.replace(/^N4P/i, '');
      if (!cleanQuery || cleanQuery.length < 4) return { found: false, message: 'Suchanfrage zu kurz (min. 4 Zeichen)' };
      var rows = cache.rows;
      for (var i = 0; i < rows.length; i++) {
        var cellText = String(rows[i][3] || '').replace(/\s+/g, '').toUpperCase();
        if (!cellText) continue;
        if (cellText.indexOf(cleanQuery) !== -1 || cellText.indexOf(query) !== -1) {
          var st = String(rows[i][0] || '').trim();
          if (st) {
            return { found: true, stockId: st, message: 'Gefunden via Bestellnummer in Kommentar Ersatzteile Bestellung' };
          }
        }
      }
      return { found: false, message: "Bestellnummer '" + query + "' nicht in Kommentar Ersatzteile Bestellung gefunden." };
    }

    function clearRefurbCacheProgressTimer() {
      if (refurbCacheProgressTimer) {
        clearInterval(refurbCacheProgressTimer);
        refurbCacheProgressTimer = null;

    function startRefurbCacheProgressUi() {
      clearRefurbCacheProgressTimer();
      var spin = document.getElementById('cacheLoadSpinner');
      var dot = document.getElementById('cachePulseDot');
      var label = document.getElementById('cacheStatusText');
      if (spin) spin.hidden = false;
      if (dot) dot.style.visibility = 'hidden';
      if (label) {
        label.textContent = 'Cache lädt 0%';
        label.className = 'topbar-cache-live-label topbar-cache-live-label--loading';
      }
      var pct = 0;
      refurbCacheProgressTimer = setInterval(function() {
        var delta = (94 - pct) * (0.1 + Math.random() * 0.07);
        pct = Math.min(94, pct + delta);
        var r = Math.round(pct);
        if (label) label.textContent = 'Cache lädt ' + r + '%';
      }, 90);
    }

    function finishRefurbCacheProgressUi(ok, onDone) {
      clearRefurbCacheProgressTimer();
      var spin = document.getElementById('cacheLoadSpinner');
      var dot = document.getElementById('cachePulseDot');
      var label = document.getElementById('cacheStatusText');
      if (spin) spin.hidden = true;

    function loadRefurbishmentCache(force, onDone) {
      if (refurbCacheLoading && !force) {
        if (typeof onDone === 'function') onDone();
        return;
      }
      var showLoadUi = !refurbCache;
      refurbCacheLoading = true;
      if (showLoadUi) startRefurbCacheProgressUi();
      google.script.run
        .withSuccessHandler(function(res) {
          refurbCacheLoading = false;
          var ok = !!(res && res.success);
          if (ok) refurbCache = res;
          if (showLoadUi) {
            finishRefurbCacheProgressUi(ok, function() {
              updateRefurbCacheHud(ok);
              if (typeof onDone === 'function') onDone();
              if (ok) scheduleMenuPanelPrefetch();
            });
          } else {
            updateRefurbCacheHud(ok);
            if (typeof onDone === 'function') onDone();
            if (ok) scheduleMenuPanelPrefetch();
          }
        })
        .withFailureHandler(function() {
          refurbCacheLoading = false;
          if (showLoadUi) {
            finishRefurbCacheProgressUi(false, function() {
              updateRefurbCacheHud(false);
              if (typeof onDone === 'function') onDone();
            });
          } else {
            updateRefurbCacheHud(false);
            if (typeof onDone === 'function') onDone();
          }
        })
        .getRefurbishmentCachePayload();
    }

        var hasTires = reifenPattern.test(res.schaeden) || sengPattern.test(res.kommBestellung);

        if (hasTires) {
          badge.style.display = 'inline-block';
          var rStatus = (res.reifenStatus || '').toLowerCase().replace(/\s/g, '');
          if (rStatus === 'werkstatt1') {
            badge.innerText = 'REIFEN: SIND DA';
            badge.style.background = 'rgba(86, 211, 100, 0.15)';
            badge.style.color = '#56d364';
          } else {

            badge.style.background = 'rgba(248, 81, 73, 0.15)';
            badge.style.color = '#f85149';
          }
        } else {
          badge.style.display = 'none';
        }

        var badgeWss = document.getElementById('badgeWss');
        var wssAct = document.getElementById('wssCardAction');

        var anl = String(res.kommAnlieferung || '');
        var wssBooked = /wss\s+da\b/i.test(anl);
        if (hasWss) {
          badgeWss.style.display = 'inline-block';
          wssAct.style.display = 'flex';
          if (wssBooked) {
            badgeWss.innerText = 'WSS: EINGETRAGEN';

          badgeWss.style.display = 'none';
          wssAct.style.display = 'none';

        updateB2a1KandidatBadgeFromSchaeden(res.schaeden || '');

        var sel = document.getElementById('shelfSelect');

        sel.dataset.serverRegal = currentRegal;
        sel.innerHTML = '';
        var sortedFree = (res.freeShelves || []).slice().sort(function(a, b) {
          return compareRegalShelfNames(a.name, b.name);
        });
        currentShelves = sortedFree;
        if (currentRegal) {
          if (isRegalTagesliste(currentRegal)) {
            sel.innerHTML = '<option value="Tagesliste" selected>Tagesliste</option>';
            sortedFree.forEach(function(s) {
              sel.innerHTML += '<option value="' + s.name + '">' + s.name + ' (' + s.count + '/5)</option>';
            });

            sel.innerHTML += '<option value="' + currentRegal + '" selected>' + currentRegal + ' (AKTUELL)</option>';

              }

    function loadData() {
      var id = document.getElementById('searchInput').value.trim();
      if(!id) return;

      if(!isStockIdFormat(id)) {
        setStatus("🔍 Suche Bestellnummer '" + id + "'...", "#F27420");
        toggleUI(false);
        setHudBusy(true, 'Suche Bestellnummer…');
        var orderLocal = searchByOrderNumberFromCache(id, refurbCache);
        if (orderLocal !== null) {
          if(orderLocal.found && orderLocal.stockId) {
            setStatus("✅ " + orderLocal.message + " → " + orderLocal.stockId, "#56d364");
            document.getElementById('searchInput').value = orderLocal.stockId;
            setHudBusy(true, 'Lade Auftrag…');
            setTimeout(function() { loadData(); }, 600);
          } else {
            setStatus("❌ " + (orderLocal.message || "Nicht gefunden"), "#f85149");
            toggleUI(true);
          }
          return;
        }
        google.script.run.withSuccessHandler(function(res) {
          if(res.found && res.stockId) {
            setStatus("✅ " + res.message + " → " + res.stockId, "#56d364");
            document.getElementById('searchInput').value = res.stockId;
            setHudBusy(true, 'Lade Auftrag…');
            setTimeout(function() { loadData(); }, 600);
          } else {
            setStatus("❌ " + (res.message || "Nicht gefunden"), "#f85149");
            toggleUI(true);
          }
        }).withFailureHandler(function(err) {
          setStatus("❌ Fehler: " + (err.message || String(err)), "#f85149");
          toggleUI(true);
        }).searchByOrderNumber(id);
        return;
      }

      setStatus("Scanne Datenbank...", "#F27420");
      toggleUI(false);
      setHudBusy(true, 'Scanne Datenbank…');

      var fromCache = computeWmsFromCache(id, refurbCache);
      if (fromCache !== null) {
        applyFetchWmsResult(fromCache, id);
        return;
      }

      google.script.run.withSuccessHandler(function(res) {
        applyFetchWmsResult(res, id);
      }).withFailureHandler(function(err) {
        setStatus("❌ Serverfehler: " + (err.message || String(err)), "#f85149");
        toggleUI(true);
      }).fetchWmsData(id);
    }

    function fireCarol() {
      if(!currentCarolUrl || !currentStock) return;
      var text = getCommentText().trim();
      if(!text) return setStatus("❌ Bitte erst Kommentar eintragen!", "#f85149");
      var dymoResult = sendDymoPrint({ silent: true, requireInitials: true });
      var autoUrl = currentCarolUrl + (currentCarolUrl.indexOf('?') !== -1 ? '&' : '?') + 'arasaka_auto=1';
      var carolWindow = window.open(autoUrl, '_blank');
      if(!carolWindow) {
        setStatus("❌ Carol-Popup wurde blockiert!", "#f85149");
        return;
      }
      document.getElementById('btnCarol').disabled = true;
      toggleUI(false);
      setHudBusy(true, 'Speichere & Carol…');
      setStatus("🚀 Carol gestartet. Sheet wird im Hintergrund aktualisiert...", "#3FA0DB");
      google.script.run
        .withSuccessHandler(function(res) {
          if(!res.success) {
            setStatus("❌ FEHLER: " + res.message, "#f85149");
            document.getElementById('btnCarol').disabled = false;
            toggleUI(true);
            return;
          }

          setStatus("🚀 Setze Tagesliste & triggere Carol...", "#9B59B6");
          setHudBusy(true, 'Tagesliste & Carol…');

          google.script.run
            .withSuccessHandler(function(res) {
              if(res.success) {
                var finalStatus = "✅ Kommentar gespeichert. Auftrag auf Tagesliste gesetzt.";
                if(dymoResult.skipped) finalStatus += " DYMO übersprungen.";
                else if(dymoResult.success) finalStatus += " DYMO Druck gesendet.";
                if(!dymoResult.success && !dymoResult.skipped) finalStatus += " DYMO Fehler: " + dymoResult.message;
                setStatus(finalStatus, "#56d364");
                setHudBusy(false);
                toggleUI(false);
                loadRefurbishmentCache(true);
                document.getElementById('searchInput').value = "";
                document.getElementById('searchInput').focus();
              } else {
                setStatus("❌ FEHLER: " + res.message, "#f85149");
                document.getElementById('btnCarol').disabled = false;
                toggleUI(true);
              }
            })
            .withFailureHandler(function(err) {
              setStatus("❌ Serverfehler: " + (err.message || String(err)), "#f85149");
              document.getElementById('btnCarol').disabled = false;
              toggleUI(true);
            })
            .triggerCarolMission(currentStock);
        })
        .withFailureHandler(function(err) {
          setStatus("❌ Kommentarfehler: " + (err.message || String(err)), "#f85149");
          document.getElementById('btnCarol').disabled = false;
          toggleUI(true);
        })
        .saveKommentar(currentStock, text);

    }
